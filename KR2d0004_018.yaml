body:
  text: 隆平集卷十八宋曽鞏撰武臣魏丕字齊物相州人少業儒周世宗鎮澶淵奏為司法參軍後改授武職太平興國中官至刺史常對太宗願除臺省官上諭之曰知卿本儒生然兩省不若刺史俸優也屢求退以左衛大將軍致仕卒年八十二丕好為歌詩有東亭集六卷常咏山鵲人多誦之安守忠字信臣父審琦為周節度使封陳王五代史有傳守忠以父任仕周至鞍轡庫使兼刺史乾德中蜀平以守忠任漢州刺史每遣使必戒之曰安守忠能律己汝輩當效其為人至道中擢為節度觀察留後久之卒年六十九贈太尉嘗判雄州方宴賓閽吏言有軍校謀變守忠笑顧坐客曰此輩酒狂耳計未及發而就擒焉人服其能鎮物楊允恭漢州綿竹人世富於財乾德中王師平蜀允恭方弱冠率鄉里子弟置寨於清泉為賊所得允恭紿之曰茍活我當相助賊釋之因厚結賊之子一日賊欲加害其子密以告遂遁去以䇿干丁德裕權補為綿竹巡徼賊平赴闕補殿前承旨太平興國間監兵英州入奏海賊官不能制又民販海鹽入嶺北者衆請建大庾縣為軍詔即以大庾縣置南安軍授允恭廣連都巡檢自是冒禁者少而允恭擒捕海賊殆盡詔奬之自殿直特遷供奉官改崇班緣江多盜又命領江南催綱捕盜事至臨江軍擇驛卒具輕舟伺賊所在夜出捕其首者百數又趣通判躡海冦寇張幕設強弩短炮炮傷允恭肩血汚衣神色不動密遣善遊水者以鐵鉤毁其幕進擊之斃於水者大半猶生擒百人江路平遷洛苑副使都大江淮兩浙發運捕賊事賜金帶先是三路轉運各領其事而上供米嵗不過三百萬允恭盡籍三路州卒牙吏自發運所輸泗州自泗州輸京師嵗數遂倍改作坊使充發運使官置𣙜場計置買江淮所産茶舊不較精粗久不售而腐者悉焚之允恭具等色年次而給焉遂絶其弊淮南十八郡而九郡行鹽禁允恭以為行法不一抵冒者衆寇盜之生莫不由此請均禁止三司沮其議而允恭力請不已太宗卒從其請又以廬州廬江縣巢縣去州稍逺故多寇盜詔遂建為軍允恭積官至江州刺史卒年五十六賜其子同學究出身李順之亂其兄自榮據綿竹縣而允恭之兄允升弟允元率鄉子弟擒自榮以獻太宗嘉之授允升本縣令允元什邡縣尉明年並召赴闕除允升贊善大夫允元大理評事云張永德字抱一并州人世以財雄邊父穎在周為防禦使五代史有傳周祖與穎善以女妻永德既為樞密使遂表永德授供奉官押班後二年漢命永德押賜昭義軍節度使常遇生辰禮物遇周祖之外兄弟也周祖時鎮鄴有密詔付遇永德在潞州聞之因謂遇曰郭侍中被讒今日之詔得非蒞殺永德邪永德即死竊恐纍君耳遇驚曰何謂也曰姦邪蠧政郭侍中誓清君側願且以永德屬吏少俟其隙君獨不聞郭侍中事邪請具言之明宗起鄴柴翁以女備掖庭至洛失寵出宫過鴻溝遇雨夫人歎曰業緣在此矣乃出奩中物計直千萬以半奉其父母令歸鄴因請曰溝傍傳舍長郭君貴人也願歸之父母大愧終不能奪既歸周祖而謂之曰妾奩中物五百餘萬以資君時不可失也周祖持賂軍司得主書計遂至通顯柴翁者常獨居室人以為司冥事一日笑不已妻問其故不答翁嗜飲妻醉之以酒乃曰上帝有命郭郎為天子妻頗漏其語遇聞而未甚然之及永德言遂信故止令壯士嚴衛永德未幾周祖使至遇賀且謝曰老夫幾誤大事周祖踐祚除永德左御將軍駙馬都尉從世宗征劉崇高平之戰何徽樊愛能退衄時太祖及永德衙兵各二千人而已太祖曰賊氣方驕公麾下頗能步射可西出陟高而止吾張左掖以應之其勝可必永德亦以為然遂大捷劉崇單騎遁去世宗謂永德曰樊愛能何徽及褊禆七十餘人吾欲盡按軍法何如對曰必欲開拓疆宇威加四海安可已也因曰若非趙某謀出不意則社稷幾殆矣世宗善其言悉誅愛能輩以徇軍聲始振從世宗征淮南破紫金山十八寨吳人樓船蔽川永德擇習水者潛鑽其船引兵擊之溺死者不可勝計以金帶賞鑽船者又以兵絶濠州餉道世宗手詔褒諭太祖即位加兼侍中改武勝軍節度使入覲道舊不名待周之舊臣恩禮無與永德比者常問以下并汾計對曰彼兵雖少而悍加以北虜之援未可遽也姑以間諜離虜心設遊兵以擾其穡事俟其困弊乃可圖耳開寶末王師征江南永德以家財具數千舟助軍糧數十萬石優詔奬之鎮穰下十八年頗有治績永德四嵗時母馬氏被出嫁安邑人劉祚祚卒永德於南陽公宇為二堂繼母劉居其左馬氏居其右問安視膳皆得其歡馬氏嘗得入謁太宗封為莒國太夫人劉先卒永德為起大第買田以聚其族人母之弟劉再思亦縻以官爵永德居睢陽比舍有書生卧疾療之獲痊來謝因曰可市水銀五兩與之即以藥同置鼎中有頃成白金將别欲求其術書生曰吾不吝此慮損君壽耳仍告以太祖受命之兆永德遂潛意推奉焉及駐車下蔡道傍見一僧乃昔書生也召與語復問其訣僧曰昔語君之貴今不謬矣當保富貴五十年安用此為永德涉獵經史頗善吟咏禮賢下士故士夫多從之遊卒於本鎮彰德軍年七十二柳開字仲塗大名人父承翰仕至監察御史開幼警悟豪勇父顯德末為南樂令有盜入其家衆不敢動開十三嵗亟取劍逐之盜踰垣開揮創斷其足二指及就學講説能究經旨開寶六年登進士第官至如京使知欣徙滄州未至卒年五十四子涉遷居荆南仕為隍城使五代學者少尚義理有趙生者得韓愈文數十篇未達乃㩦以示開開一見遂知為文之趣自是屬辭必法韓柳初名肩愈蓋慕之也著書號東郊野夫又號補亡先生作二傳以見意時范杲好古學開與齊名謂之柳范開垂絶語門人張景曰吾十年著一書可行於世景為名之曰默書辭義稍隱讀難遽曉開尚氣自任不顧小節所與交者必時之豪俊太宗征河東開從駕督糧適常潤有小寇遂選開知常州開至治所招誘羣盜以俸金給賞之又解衣與賊酋置之左右或謂不可開曰彼失所則盜不爾則吾民也始懼死故假息鋒創之下今推以赤心夫豈不懷未半嵗境內輯寧雍熙初坐與監軍忿爭貶上蔡令會王師北伐開部糧至涿州遇米信與北敵戰久不解遣使求降開謂信曰兵法約而請和謀也亟攻必勝信不能決後二日復引兵挑戰諜知求降乃以矢盡及幽州取至故復戰耳開因上書願效死邊鄙太宗憐之除殿中侍御史命使河北又上書願賜步騎數千以滅敵上方擇文臣有武略者即授開崇儀使知寧逺軍契丹貴將白萬德本真定人統緣邊七百餘帳開因其親族往來令説萬德許以藩鎮俾挈幽州之衆內屬萬德喜請為期約使未還詔徙知全州州西有溪洞蠻粟氏久為邊患朝廷設峽口香煙等七寨不能禦開至選勇辨吏往説之不踰月㩦老幼至州開賦其居業作時鑑一篇刻石戒之遣其酋赴闕授州上佐邊患遂息詔賜開緡錢三十萬會有黥卒訟非辜州下吏削二官頃之上書自陳復還舊秩知環州為理互市之不直者戎落悅附徙知邠州真宗即位遷如京使上書言時政上嘉納之又徙代州葺城壘戰具諸將沮議因謂其子浩曰吾觀邊星有光雲多從北來寇殆將至諸將見嫉一旦寇至必危我矣即丐小郡得沂州是秋寇犯塞王漢忠字希傑徐州人以材勇給事晉邸太宗踐祚纍擢至觀察使真宗即位進節度使以佐衛上將軍卒年五十四漢忠有識略軍政嚴整所至無盜賊頗涉儒學好為歌詩聚書萬卷尊儒士待賓佐有禮輕財好施得士卒心惟喜矜恃同列多所不悅慕容德豐字日新節度使延釗之子起家如京使開寶中監升州兵澤國富庶使多貪冒德豐獨以修潔稱詔褒之積官至團練使卒年五十五德豐輕財好施世祿之厚而家無餘資王繼忠開封人父為軍校戍邊而死繼忠因得補殿直侍真宗在東宫得給事左右即位纍擢至雲州觀察使咸平末契丹入寇繼忠帥定武出戰於望都之北自以被遇厚恩力戰圖報而服飾稍異戎人識之轉鬬纍日援兵不至遂陷敵中初謂已死贈大同軍節度使録其子懷敏懷德懷政皆加等景德初敵俾繼忠奏章道意請修和好朝廷允其請戢兵息民與有力焉自是朝廷每遣使至契丹必厚賜之繼忠對使臣必泣下常附表請召還上以誓好既定姑詔諭之彼王待之益厚改其姓曰耶律名曰顯忠又曰宗信封為吳王張凝滄州人以親衛𨽻晉邸及即位授武職咸平初契丹入寇從大將康保裔合謀伏於瀛州西背腹奮擊凝陷敵中子昭逺十六嵗從行乃單騎馳突所向披靡遇凝掖之以出見者驚異西鄙有警以凝帥邠寧環慶兼安撫環州轉運使劉綜懼糧不給問計凝曰當深入因敵糧可勿慮也自白豹鎮焚族帳掠畜産以歸因襲慶州蕃族胡家門等破之以其數犯亭徼故乘其不備耳殘羌逺遁邊境遂安景德初詔北邊豫設竒兵寇來則分道深入以牽其勢魏殽首逗撓諸將皆有言凝獨若不知或問之曰殽險悍吾輩公言其過使不自安非計也真宗聞而嘉之久之遷殿前都虞候仍兼寧州防禦使卒年六十二贈節度使凝性資忠義以功名為任善訓士卒所得俸賜均及其下家無餘積昭逺字持正因掖出其父特授左班殿直積官至昭州防禦使卒年五十贈觀察使子克諧克己克忠克從天禧初閣門副使闕樞密院方奏擬人真宗曰朕已有人張昭逺知邊略曹儀習朝廷儀制可用也二人遂並命焉昭逺所至有政績上官正開封人少舉三傳為鄜州攝官雍熙中授殿前承旨屢因鞫獄遷至作坊使蜀賊李順之亂正監兵劍門關出兵擊破其黨斬馘殆盡方朝廷以棧道為憂正孤軍破數萬衆其勢遂沮賞功授六宅使劍門刺史順既誅餘黨匿山澤間正推恩信招來之加峰州團練使代王繼恩為西川招安使至道末叛卒劉旰陷邛漢州又詔正討平之纍擢洺州防禦使以環衛官分司卒年七十五正不畏強禦而性頗急暴多詬辱官吏太宗常手札戒之周審玉開封人周顯德中以父蔭補殿直建隆至雍熙擢為作坊使契丹入寇潘美在定武審玉監軍先鋒劉緒陷賊審玉躍馬趨擊拔緒而還勇冠三軍常知鳳翔府有僧乘傳而西以市木為名威動郡邑審玉按詰盡得其姦狀送闕下時稱審玉非特有武亦通吏術以左千牛衛大將軍致仕卒年七十四田紹斌少為驍武副校建隆初𨽻崔彥進麾下討李筠從李重進平荆湖嶺表又從劉廷讓擊全師雄餘黨從曹彬征江南皆有功太祖伐河東契丹援入於百并紹斌與何繼筠奪賊旗鼓而逐之太平興國初除江州刺史詔討梅山洞蠻斬馘萬餘生擒二萬人邊境遂寧曹彬之出代州也紹斌為先鋒每戰必勝召見便殿靣授溪州團練使加冀州防禦使城清逺軍進會州觀察使為靈州副帥部芻糧金帛赴靈武清逺軍者數十趙繼遷數遣萬騎劫之紹斌必出陳大呼賊聞其名皆潰去一日白守榮馬昭忠護軍儲紹斌自靈武以兵援之數遇敵數勝而守榮昭忠棄輜重與賊戰敗紹斌為擊走賊護糧以行詔褒之俾副李繼隆帥環慶繼隆誣以守榮昭忠落浦河之敗紹斌不救有異志貶率府副率真宗即位復萊州團練使帥延慶有野雞蕃族數寇邊紹斌召其酋豪使斷臂截耳以誓遂不復侵犯紹斌常靣斥劉隱及轉運使宋太初事二人銜之歸朝言其過召赴闕誣獲辨命為鎮定先鋒𨽻傅潛潛屯中山虜至不出戰石普楊嗣渡嚴浮河頗失利獨紹斌擒獲稍衆復觀察使及潛下吏亦同被鞫復貶率府副率後纍敘復左領軍衛將軍康州團練使卒紹斌長於兵頗知戰法惟暴戾無檢好凌犯人屢以誣被黜而不自悔也李重貴河陽人常給事晉邸及即位纍擢至衛州團練使淳化中遣將五路討賊遷重貴帥麟府得對因言賊居沙磧逐水草無定止聞兵勢盛則逺遁矣追之或糧不能繼欲守又彼無堅壘若未能平賊將何顔以見陛下也太宗雖善其言以師期既定強遣之卒無功而還咸平三年戎人入寇范廷召戰退康保裔陷賊獨重貴與張凝力戰卻賊全軍以歸凝議上功狀重貴曰大將陷殁我輩計功是誠何心真宗聞而嘉歎特加階邑以疾求致仕授左羽林大將軍卒年五十九石保吉字祐之中書令守信之子尚太祖第五女延慶公主自諸將軍擢至節度使景德初同平章事是年契丹入寇真宗將行幸澶淵先遣保吉與李繼隆為排陳使對壘以待而敵騎數萬驟至城下保吉不介馬當其前鋒敵甚畏憚駕至衛南師已告捷及振旅舍爵䇿勳特加戶邑大中祥符三年卒贈中書令諡壯武保吉有武幹歷世將相家積不資而治生射利所至侵擾為魏帥葉齊查道皆知名士保吉悉命械頸以督糧運物論少之先是守信鎮宛丘年五十七而卒保吉繼居是鎮卒年與之同談者異之王中正汀州人賈販往來江淮間咸平元年至南康軍逆旅遇異人自言趙姓久之又見於茅山命求鉛盝遇火成金謂中正曰當授以法從及歷陽始得之且俾辨草木藥品而授以小環神劍及密緘之書戒以勿泄中正亟欲獻於上為有司所抑還至上饒佯狂黥竄嶺外未幾逋匿京城樞密承旨謝德權嘗為嶺南官知中正化銀術為奏因得脫軍籍內臣劉承規又以其名聞初名捷為更曰中正賜對特授許州參軍承規於皇城公廨居之凡入市必有人與之語承規詰之不能隱曰即授法者也承規為新堂以祈靈景德四年五月十三日遂降於堂紗幃間服青衣具冠劍自是屢降惟中正喻其旨或其侍童偶語始知乃司命真君也明年天書降改元大中祥符東封畢加真君號曰九天司命天尊五年天尊臨降宫庭上號曰聖祖即改皇城新堂曰元符觀承規私第曰東宅所賜中正通濟坊曰南宅並為聖祖降憩之所中正纍遷加致仕積官至右神武大將軍唐州團練使大中祥符九年中正被疾見聖祖謂之曰慎密類汝者少即塑形景靈宫為吾輔勿憂也卒年五十五其妻施氏封吳郡夫人諸子皆授殿直中正初得神術雖貧苦不以勢利趨告於人及享祿賜所化黃白惟施貧奉道釋而已朝廷舉大禮及營繕必達靈命以藥金銀為獻中正復自以所成者助經費上為制靈遇贊紀其事云石普其先幽州人後徙居太原父通給事晉邸普方十嵗亦留邸中以信謹見親太平興國中補寄班祇候遷供奉官屢以戰功擢至西河節度使知許州大中祥符中上言九月下旬日食者三又言商賈自秦州來言唃厮羅欲酬殺曹瑋請以普所獻陳圖付瑋當決必勝帝謂普妄言樞密使王欽若因言普以邊事動朝廷帝怒命侍御史知雜吕夷簡劾之獄具集百官參驗九月下旬日不食普引伏私藏天文法當死官節度使當議貴除名貶賀州改率府副率房州安置後稍復至右武衛大將軍卒年七十五子仲卿仲武仲舒仲文普有膽略聞敵所在即馳赴親冒矢石前後戰未嘗少却通兵書及陰陽六甲星厯推步之術太宗常令善工製金帶普帶御器械輒靣求解以賜之後雖謫廢當太宗忌日必舉族詣佛寺齋薦嵗以為常淳化中督兵捕永興賊邢槖馳賈秃指百人至則擒之李順之亂為西川行營先鋒與韓守英馬知節合擊遂斬順因馳驛靣陳蜀亂之由賦斂急迫請一切蠲其租賦大宗許之即日還蜀揭榜宣諭莫不感悅咸平二年軍盜王均據益州叛又命為川峽路招安巡檢使雷有終攻城均走普追躡至富順監敗之均自殺獲首以獻餘黨悉平明年契丹寇邊普為保州鈐轄北面行營管神䇿先鋒殺敵騎於炎涼城又敗之於長城為莫州總管建言軍中號令遣人馳告慮為姦詐所誤真宗為制傳令牌又獻禦戎圖掘塹設險以陷敵馬景德初王繼忠為契丹請和以書遺普普為達於上其後因請罷天下醮設嵗可省緡錢七十餘萬貫以贍國用遂忤上意曹克明其先太原人祖為雅州刺史因居百丈縣有賊攻百丈父逺遇害克明尚幼有妾匿之葦薄中得脫既長喜兵法善騎射從父光實領夏州都巡檢破李繼遷繼遷偽降設伏光實赴而殁於葭蘆州克明為衙內虞候從行祕不發哀使人傳光實命回兵銀州乃與其僕潛入敵中獲光實尸還葬京師蜀人於法不許還其鄉克明以母老趨道以歸淳化五年李順反購克明欲用之乃㩦老母遁山谷間及賊陷雅州克明乃集潰兵得七千人又募丁壯三千遂復名山火井夾江等九縣立七寨於嘉眉卭州界分兵以邀擊賊因復雅州太宗令總管王繼恩齎敇奬諭擢西頭供奉官監兵黎州以餘賊未寧徙權雅州駐泊巡檢至道元年峽路潰兵鄧紹等攻雅州克明又討平之積官至西上閣門使知鼎州卒年七十二子元賓元舉景德中溪洞蠻入寇以克明知雍州遺書三十六洞酋長諭以朝廷恩信悉來赴承天節會遺以篋衣咸感泣而去獨洪洞恃險不至克明説左右兩江防遏使黃仲盈領兵攻之斬其首領梟首於市既而宜州澄海軍校陳進反會鬱江暴漲州城摧克明伐木造舟為虛城水上以備守禦仍募溪洞兵趨象州賊遂南去巡撫使曹利用召克明會兵至貴州遇賊斬首四百餘級利用専其功克明亦不自言徙都大提舉江淮兩浙捉賊獲賊必釋其罪豫以私錢使返捕索其黨所獲千餘人知江寧府張詠以其事聞賜錢四十萬撫水州蠻叛以克明為宜容等十州巡撫使兼安撫蠻首乞招安不許與中人楊守珍領兵深入蠻多伏弩窮谷間而磴道險絶克明意士卒有退志命後軍伐大木絶歸路克明踰月才至撫水州知州蒙承貴等出降克明謂曰汝三十年為邊患止謂官軍不能至耳天子好生不欲絶汝類姑許自新皆伏拜感激泣命飲血為誓勒銘奴山而還於是蠻人願內徙者七百餘人散之湖南諸州居焉奏請改撫水州曰安化州分以為上中下三州皆蒙氏為守有區廖潘吳四姓居沿龍江捕魚射生其田有水田其産牛馬豕彘其植麻苧桑柘其兵器木弩標槍環刀藥箭傍牌其語惟懷逺人能釋之克明初至蠻酋獻藥一器曰溪洞藥箭中人可以此解克明曰何以驗之曰請試以雞犬克明曰當試以人乃用箭刺酋股飲之藥而死羣蠻股栗安化既平徙知桂州始置溪洞司而兼領之又奏以廣南兩路土軍並為忠敢嶺外民居結茆而已雖嚴火禁不能弭患克明激水以入城夾道分流以為之備又命北軍教以陶埴民始為瓦舍自是其患遂平李繼宣開封人乾德中以材武補殿直年才十七命捕虎峽州凡殺二十餘生擒二虎一豹以獻遂授以邊任所至有戰功常追北寇於新城斬其賀恩相公監兵高陽率兵入敵境燒聚落獲生口以歸時敵方寇瀛鎮間聞之遂引還初繼宣承受定州路奏事已嘗入北境殺獲甚衆又從崔彥進曹彬李繼隆米信田重進與契丹戰未嘗不捷至是敵畏之惟任鎮州鈐轄而主帥傅潛怯懦有警請行皆為所抑及與高瓊同主軍事遂逐敵衆越界河嘗與秦翰楊嗣楊延昭張斌遇賊於威虜軍臨陳馬中矢凡三易之嗣輩皆引去獨繼宣整所部接戰薄暮至營所詔稱奬之積官至四方館使康州刺史卒年六十四荆嗣河南人少應募為控鶴卒乾德中李繼勳討河東擇勇敢百人開道搗洛陽寨嗣請行斬五十餘級賊遁河賊將楊鄴退保城嗣與衆進焚南門奪其羊馬城賊夜薄寨繼選五百人嗣為其冠及旦斬馘殆盡太宗親征巡師嗣登城手創數賊股貫雙箭又中手炮折二齒太宗亟召賜袍帶常從崔翰征幽州從袁繼忠田欽祚戍三義口從田重進談延美討賊於飛狐口戰無不克賊嘗夜圍重進寨重進問計於嗣嗣曰所領不過五百人彼衆踰二萬計請間道見延美延美曰賊勢如何可解也嗣曰願得數百人延美與之即依山布陳以三百人執白旗於道隅獨率所部趨敵敵見其疾馳而旗幟稍盛疑大軍至遂遁去嗣之用兵凡一百五十餘戰未嘗無功亦未常自伐也積官至虢州防禦使卒垂涕謂其子曰纍世為將者其後不昌汝輩惟益修謹乃免於患子信仁貴隆平集卷十八
