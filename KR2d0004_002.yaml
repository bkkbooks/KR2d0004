body:
  text: 隆平集卷二宋曽鞏撰行幸建隆元年昭義軍節度使李筠叛五月駕幸軍前六月筠自焚澤潞平七月車駕還京時筠子守節據上黨聞筠死亦降是年九月李重進叛十月車駕幸軍前十一月重進自焚十二月車駕還京重進太原人周祖之甥在周為平盧軍節度使判揚州至是以揚州叛開寶二年二月親征太原五月太常博士李光贊上言遂詔班師六月車駕還京太平興國四年二月親征太原先詢曹彬曰周世宗太祖親征何以不能克對曰世宗以史超敗於石嶺關人情驚擾故師還太祖屯兵於甘草地軍人多腹疾遂中止今兵甲精鋭翦孤壘猶拉朽爾上於是決計四月至太原五月墮其城劉繼元始降詔釋之六月駕臨范陽七月還京咸平二年契丹入冦十二月駕幸河北三年正月王師告捷車駕還京景德元年契丹入冦十一月駕幸軍前次衛南縣大將李繼隆奏今月二十四日敗敵衆於澶州城北其將順國王撻覽為王師強弩所斃其衆遂遁時北主及其母同入冦因王繼忠遂乞修好二十六日駕至澶州北使韓把見於行在十二月車駕還京景德四年正月駕幸永安朝拜諸陵二月幸河南三月車駕還京大中祥符元年十月駕幸泰山行封禪禮辛亥享昊天上帝以太祖太宗配三獻畢封金玉匱壬子禪祭皇地祗於社首山十一月幸曲阜縣謁文宣王廟及孔陵林木侵道遂降輿乘馬至宣尼墓設奠再拜又加諡齊太公曰昭烈武成王建廟青州追封周公曰文憲王建廟曲阜縣是月車駕還京往還四十七日未嘗遇雨雪大中祥符四年車駕幸河中府親祠汾隂二月丁巳至寶鼎縣奉祗宫辛酉上服衮冕祀后土祗改奉祗宫曰太寧宫以寶鼎縣為慶成軍隸河中府又改慶成軍寶鼎縣曰榮河縣三月幸西京至永安縣謁諸陵四月車駕還京大中祥符七年正月駕幸亳州太清宫奉加號册寶丙午至真源縣奉元宫上齋於迎禧殿戊申上服通天冠絳紗𫀆進大次己酉行朝謁禮改真源縣曰衛真升應天府為南京以新修聖祖殿為鴻慶宫二月車駕還京取士舊制臺閣近臣每年得以抱文藝者公薦於貢闈知舉官去取不能無所徇建隆四年詔禁止之開寶二年詔西川山南荆湖等路所薦舉人並給往還劵開寶六年初殿試進士自是為定制故事禮部放榜敕下之日醵錢為同喜飲於曲江近世多於名園佛宇太平興國元年吕蒙正等及第始官為供帳仍賜御詩至道二年張洎以儒行篇刻板印賜近臣并新及第人隋大業中始設進士科至唐為盛每歲不過三十人咸亨上元中增至八十人既而復故開成間連歲放四十人俄仍舊制太宗即位旬日之間放進士三十三人經科百九十六人並賜緑袍木簡未命官而釋褐新制也咸平三年放進士四百一十四人并九經而下共一千五百四十六人景德初進士遂至七百八十三人自是取人日益盛矣景德以前進士及第導從過多景德二年貢院乞令狀元用一節呵導餘止雙控馬首遇常參官斂馬側立詔從之大中祥符八年蔡齊殿試第一人及第詔令金吾司差七人許出節前引遂為定制大中祥符五年殿試題始賜印及草紙天聖中初置武舉至皇祐罷治平元年復置制舉自乾德二年至治平應詔人無定數招隱逸道士澄隱字棲真常山人兼通儒釋典太祖征太原還幸其所居問曰師年八十容貌甚少必能飬生宜以教朕對曰臣養生不過精思鍊氣爾帝王養生則異於是老子曰我無為而民自化我無欲而民自正無為無欲凝神太和軒帝陶唐享國永年得此道也上悅厚賜之王昭素酸棗人篤學有至行鄉人有訟不之官府而詣昭素為之辨折無不敬服開寶二年召至命講易年踰八十矣居月餘求歸特授國子博士自李穆而下有聞於時者皆其門人也陳摶居華山靈臺觀太平興國間兩至京師賜號希夷先生上令引至中書宰相宋琪問修養之道摶曰不知也今上言皆究治亂之大旨誠有道仁聖之主正君臣協心治天下之時勤行修煉無大於此時年近百歲居華山四十年端拱二年豫言其卒以表來上云大數有終聖時難戀命弟子賈德升鑿石室於張超谷室成而逝摶能逆知人意有華陽隱士李竒自言開元中郎官年數百歲顔如嬰兒行數百里頃刻而至常與摶酬唱人以為神仙自言二字妙甚布衣潘閬常賣藥京師好結交上左右有言其善吟詩者至道初召對賜進士出身國子四門助教未幾追還所賜潘君行徑正是後來隱士宗𣲖真宗西祀有言陜州魏野河中李瀆皆隱居求志上特召之皆稱疾不起大禧四年二人者繼逝各追贈著作郎仍賜其家粟帛卻貢獻淳化中夏州趙保忠獻鶻謂之海東青上曰朕久罷畋遊無所用也還以賜之景德中文州尚牧獻白御馬一上曰進貢無名命亟還之大中祥符間蒲端國獻崑崙奴上曰異俗離去鄉土可憫也命還之天聖元年乾元節知寧州職方員外郎楊及以繡佛來獻上謂近臣曰及佞人也民安政舉乃守臣之職安用此為命亟還之仁宗諭輔臣曰川路舊貢織繡佛像者悉罷之宰相王曽曰臣恭聞德音所謂不作無益害有益也溫鼎知廣州嵗貢柑橘及蜜煎果實又致其餘於大臣謂之貢餘宰相王曽請加禁止上曰貢且勞矣况其餘乎命亟罷之英宗即位于闐國遣使貢獨峰駝上曰異物非朕所貴命還之右贊善大夫陳世修獻白馬一英宗賜帛五十段仍還其馬慎名器教坊使衛得仁以老乞外官引唐莊宗朝故事冀領郡太祖謂宰相曰伶人為刺史亂世事焉可效宰臣欲以為上州長史司馬上曰此亦不當輕授止令與太常寺大樂令崇儀使尹繼倫端拱二年敗契丹於唐河殺其皮室相公射北將裕悅中臂其衆大潰相蹂踐而死者不可勝計時李繼隆護糧敵騎行將及因是獲免䇿功止加洛苑使長州刺史唐制郊祀行慶止進勳階五代肆赦例遷官秩宋初因之未暇革去右司諌孫何起居郎耿望言其非制真宗嘉納遂定三年磨勘進秩之法郊禮止加散官勳爵景德初李繼隆石保吉敗北兵於澶淵斃其驍將達蘭飲至行賞繼隆而下止加勳階食邑真宗嘗語輔臣欲省費用減吏員宰臣向敏中曰太祖太宗朝閣門祇候止三五員今踰數百除授未巳願慎擇焉上曰相承為例當漸省之魯國長公主以醫官使趙自化醫術有效請授尚食使兼醫官真宗曰元份嘗有請已諭其不可今乃復爾命樞密院召自化戒之樞密副使張士遜求以子友直為館閣校勘仁宗曰館閣所以待英俊可以恩丏乎上命友直於館閣讀書遂詔校勘無得增員仁宗謂輔臣曰圖書之府所以待賢俊而備討論也比來公卿之族多以恩澤為請殆非請延之意也其詔自今輔臣兩省侍從不得陳乞子弟親戚為館閣官其進士及第三人以上亦考所進文召試入等始得除駙馬都尉柴宗慶求為使相仁宗問輔臣曰如何宰相王曽對曰先朝石保吉魏咸信皆歷行陳有勞晚方除使相且將相之任繫國重輕豈容私請上曰朝廷名分何可妄求卿等可召宗慶諭之杜衍為宰相凡內降與恩澤者少積至十數於上前面納仁宗語諫官歐陽修曰外人知杜衍封還內降邪朕居禁中有求恩澤者每以衍不可告之而止者多於所封還也足見仁宗任相之專然人主恩威由已何必諉之臣下章懿太后弟李用和長子璋既為閣門副使次子珣又求任通事舍人仁宗諭之曰朝廷爵賞所與天下共也戚里之家兄弟遷補皆如已欲使朕將何以待諸勳舊乎章惠皇后弟汝州兵馬總管楊景宗乞為郡仁宗以其纍犯法復起曰朕於景宗何愛一郡然貪虐之性老而益甚使為郡則一方受弊矣張堯佐為三司使言者慮其遂大用也力爭攻之上諭輔臣曰自今后妃之家毋得用為執政著以為令翰林侍讀學士張瓌判吏部流內銓其子郾城主簿庖民鎖試未嘗考功補考而又考限未至同判銓翰林侍讀學士范鎮令用例以隨身歷為證而不取審狀書考移令瓌雖礙親不預其事然知其故而弗止英宗以問輔臣皆言瓌可勿劾上曰瓌私其子可不顧銓法耶命特奪一官降知濠州鎮亦坐贖金英宗皇帝患吏員猥多乃詔待制以上六周年中書取旨轉官至諫議大夫止京朝官並四周年與磨勘至前行郎中止少卿監以七十員為額於前行郎中先補官者補其闕酬賞及特恩不在此限革弊五代以來天下郵傳皆役平民建隆二年始命以軍人代之五代時使臣往來及輦運官司皆役僑居人戶謂之遞夫建隆三年詔禁止之五代承唐季亂離之後國用窘蹙故冬服止及將相翰林學士諸軍大校建隆三年初賜文武常參官太平興國二年十月朔詔賜百官諸軍校百夫長以上及遣使齎賜藩鎮州郡冬服自是以為常五代以來領節旄者多武夫悍卒所至必補親吏代判緣是為姦民被其患乾德三年詔諸州長吏或藉人代判者於賔幕內擇公幹官不得復任元從人五代以來衣服旗幟止以綵繢開寶四年郊禋初易以繡衣鹵簿內臣李承進逮事唐莊宗太祖嘗問莊宗時事對曰莊宗好畋獵每次近郊衛士必控馬首曰兒郎輩寒冷望陛下與救接莊宗隨所欲給之如此者非一晚年蕭牆之禍由賞賚無節威令不行也太祖歎曰二十年夾河戰爭不能以軍法約束此輩誠兒戲開寶四年郊禋優賞三班殿直撾登聞鼓援御馬直例上遣中使謂曰朕之所與便為恩澤豈有例邪盡戮撾鼓者四十人餘配諸州驍健自都指揮使尹進而下並杖而降籍初平蜀日選孟昶親兵一百二十人隸殿前司謂之三班殿直至是遂廢堂後官五代以來擇用諸司人吏倚法徇私莫可檢察開寶末始詔流內銓擇選人令録與升朝官判司簿尉與上縣令俾充是選其後止以諸科出身人充漢乾祐以來天下令録判司簿尉並據所請俸折支物每一千分兩戶俾月輸緡錢除二稅外與免徭役謂之俸戶開寶九年太祖即位始詔罷之親從指揮使馬翰稱京城有賊願自緝捕真宗謂輔臣曰朕尹京日聞翰以緝捕為名頗為民害事未彰露姑置之自今捕盜止委開封府可也節儉太祖嘗閲孟昶宫中物有寶裝溺器遽命毁之曰以此奉身不亡何待太宗未嘗御新衣樞密使王顯等侍數視上袴上怪而問之對曰陛下袴紋縷皆倒上笑曰浣濯頻故爾朕念機杼之勞且欲化天下以儉也油衣庫言帟幕損弊者數萬請毁棄之太宗命煮染雜色成旗幟數千它日有司又以營繕棄材請給甄官薪上命擇其可用者成什物數千分賜宰相李昉等咸相顧而歎曰富有天下而猶器微物於已棄之餘則其大者可知矣御馬舊以織成帕覆鞍勒至道二年詔以黃絹代之輔臣嘗因奏事至福寧殿之西閣見仁宗所御幄帟茵衾皆質素暗弊自是大臣之家無復僭侈宰執唐以侍中中書令為真宰相又言故事左右僕射各一人侍中中書令各二人為正宰相武德初李績任左僕射以南省務疏於北省始命帶中書門下三品並平章事者為真宰相其宰相僕射不帶同三品者但釐尚書省務而已貞觀至德間置左右相又有知政事參議朝政參預朝政參知政事參知機務皆宰相之稱也高宗謂參知政事崔知溫曰郭待舉岑長倩郭正一魏元同歷任尚皆淺且令預聞政事未可與卿等同名待舉等並與中書門下同受進止平章事則是平章事亦或居參知政事之下其後方鎮遂有以恩授平章事者然而宰相謂之平章事蓋始於唐矣乾德二年太祖既以趙普為相且欲用薛居正吕餘慶故詢翰林學士陶穀曰下丞相一等何官榖對曰唐有參知機務參知政事翌日並命居正餘慶參知政事不宣制不押班不知印不升政事堂凡上殿庭别設磚位居宰相後敕尾列銜仍下押字太宗始命與宰相更互知印時議者謂榖之對為失而下丞相一等漢御史大夫是也雖然唐參知政事固宰相之任曽何以為百王不易之制殆稱謂適同爾官制因時輕重蓋可見矣僕射侍中皆秦官僕役於射謂之僕射緣所領之事而立名者爾侍中則丞相之史也唐之以為宰相名同而實異甚矣樞密使唐特以宦者處之朱梁改曰崇政院始命敬翔為使後唐同光復其舊稱命宰相兼其任石晉天福中廢樞密而置宣徽南北院至開通初復置樞密院而宣徽之名因以不廢宋興以平章事為宰相以參知政事樞密使副知院同知院簽書院事並為執政官宣徽使居執政官之次或以加前執政或以待勳舊焉宰相並以先後為次出而復任者互存范質王溥魏仁浦趙普薛居正沈義倫盧多遜右自建隆元年正月至開寶九年十月薛居正子平沈義倫盧多遜趙普宋琪李昉趙普呂蒙正聖功李昉張齊賢呂蒙正呂端右自太平興國元年十月至至道三年三月呂端張齊賢李沆太初呂蒙正向敏中寇準平仲畢士安王旦子明向敏中王欽若冦準李迪復吉丁謂馮拯右自至道三年三月至乾興元年二月丁謂馮拯王曽孝先王欽若定國張知白用晦張士遜呂夷簡張士遜李迪王曽王隨子正陳堯佐張士遜章得象杜衍賈昌朝陳執中文彥博宋庠公序龎籍陳執中梁適富弼劉沆沖之韓琦曽公亮右自乾興元年二月至嘉祐八年三月韓琦曽公亮右自嘉祐八年三月至治平四年正月參知政事薛居正呂餘慶劉熙古盧多遜右自乾德二年四月至開寶九年十月竇稱郭贄宋琪李昉李穆呂蒙正李至辛仲甫王沔陳恕張齊賢賈黃中李沆呂端蘇易簡趙昌言冦準向敏中張洎李昌齡溫仲舒王化基右自太平興國元年十月至至道三年三月向敏中李昌齡溫仲舒王化基李至李沆向敏中王旦王欽若畢士安馮拯趙安仁丁謂陳彭年王曽張知白李迪丁謂任中正王曽右自至道三年三月至乾興元年二月任中正王曽呂夷簡魯宗道夏竦薛奎王晦叔晏殊王隋蔡齊盛度韓億程琳石中立王鬷李若谷宋綬鼂宗慤王舉正賈昌朝范仲淹陳執中宋庠吳肓丁度文彥博明鎬高若訥劉沆梁適程戡王堯臣曽公亮張升孫抃歐陽修趙槩右自乾興元年二月至嘉祐八年三月歐陽修趙槩右自嘉祐八年三月至治平四年正月樞密吳庭祚使趙普使李處耘宣兼副李崇矩使王仁贍副楚昭輔副升使曹彬使右自建隆元年正月至開寶九年十月曹彬使加平章楚昭輔使石熙載簽書并副又加使柴禹錫宣兼檢校王顯宣兼副升使張齊賢簽王沔簽升副張宏副趙昌言副楊守一宣兼同知張齊賢副張士遜宣兼簽溫仲舒副升使冦準副改知柴禹錫宣兼副劉昌言同知趙鎔宣兼知向敏中同知錢若水同知李惟清右自太平興國元年十月至至道三年三月曹彬使平章趙鎔知王顯使向敏中副夏侯嶠副錢若水同知李惟清同知楊礪副宋湜副周瑩宣兼知王旦同知王繼英宣兼知升使馮拯同知改簽陳堯叟同知改簽加平章升使丁謂使王欽若同知加平章升使韓崇訓簽馬知節宣兼簽改副寇準使加平章王嗣宗副曹利用副改知升使加平章又加侍中張旻宣兼副任中正平章副馬知節知周起副馮拯使加平章曹瑋簽錢惟演副張士遜副右自至道三年三月至乾興元年二月曹利用使僕射侍中張士遜副張旻使加僕射侍中天聖七年改名耆錢惟演使張知白副晏殊副夏竦副范雍副薑遵副張堯佐副夏竦使趙稹副晏殊副楊崇勳宣兼副升使王晦叔使王德用簽改同知升知又加宣李咨副改知王曽使同平章王隨知韓億同知蔡齊副章得象同知盛度知王鬷同知王博文同知陳執中同知升知張觀同知夏守同知王鬷知晏殊知升使加平章宋綬知王貽永同知改副升使加平章杜衍同知改副升使鄭戩副任中師副任布副韓琦范仲淹副富弼副賈昌朝使吳肓副龎籍副升使丁度副夏竦使高若訥副升使宋庠使梁適副王堯臣副狄青副升使孫沔副田况副王德用使同平章程戡副韓琦使賈昌朝使宋庠使田况使張升副孫抃副曽公亮使歐陽修副趙槩副陳升之副包拯副胡宿副吳奎副王疇副右自乾興元年二月至嘉祐八年三月張升使胡宿副富弼使吳奎副王疇陳升之副文彥博使呂公弼副郭逵同簽右自嘉祐八年三月至治平四年正月宣徽使咱居潤南張美北李處耘北改南兼樞李崇矩北兼樞曹彬南潘美北改南右自建隆元年正月至開寶九年十月潘美南王仁贍北柴禹錫北檢校樞王顯南兼樞弭德超北兼樞郭守文北楊守一北簽樞張士遜北兼樞柴禹錫北兼知樞趙鎔北兼知樞右自太平興國元年十月至至道三年三月趙鎔南兼樞周瑩南兼樞王繼英北兼樞雷有終北馬知節簽樞加北張旻南兼樞曹瑋北兼樞右自至道三年三月至乾興元年二月楊崇勳南兼樞王德用知樞加南夏守斌南李用知南加平章夏竦南程琳北李昭亮北鄭戩北張堯佐南狄青南吳育北富弼南曹佾南程戡右自乾興元年二月至嘉祐八年三月其後不除隆平集卷二
