body:
  text: 隆平集别史類提要臣等謹案隆平集二十卷舊本題宋曽鞏撰鞏字子固南豐人嘉祐二年進士調太平州司法參軍召為集賢校理出知福明諸州神宗時官至中書舍人事迹具宋史本傳是書紀太祖至英宗五朝之事凡分目二十有六體似會要又立傳二百八十四各以其官為類前有紹興十二年趙伯衛序其紀載簡略瑣碎頗不合史法朝公武讀書志摘其記太平御覽與總類為兩書之誤疑其非鞏所作今考鞏本傳不載此集曽肇作鞏行狀及韓維撰鞏神道碑臚述所著書甚備亦無此集據玉海元豐四年七月鞏充史館修撰十一月鞏上太祖總論不稱上意遂罷修五朝史鞏在史館首尾僅五月不容遽撰此本以進其出於依托殆無疑義然自北宋之末巳行於世李燾作續通鑑長編如李至拜罷等事間取其説則當時固存而不廢至元修宋史袁桷作搜訪遺書條例亦列及此書以為可資援證蓋雖不出於鞏要為宋人之舊笈故今亦過而存之備一説焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀隆平集序史官記録其來尚矣雖六史異名職司殊事螭頭柱下操觚載簡為記事之始蘭臺東觀稽文責實為勒撰之所至於研精覃思諟正得失權輿綱紀之論總括經緯之條則必窮神於退食委蛇之間夙興夜寐之際故凡為是官者莫不家有注記自備討論豈不以事重體大君子之所盡心焉哉厥自遷固各有家學楊子山為郡上計猶獻哀牢傳得詔詣蘭臺乃若陸賈魚豢張璠范曄亦復身非史職私撰國書由是言之一代成憲必資草創於前博采羣言於衆乃能究當世之事備後王之鑑故知為史之説皇朝太祖開運立極握符御天聖神相繼緝熙文明之治亮采惠疇官得其人通籍史館尤為慎選凡預論著皆命世大儒博學通識允所謂良史之才者也南豐曽鞏子固為左史日嘗撰隆平集以進自太祖至於英宗五朝聖君賢臣盛德大業文明憲度更張治具之體文武廢置軍政大小之務郡縣戶口風俗貢職之目柴燎祠祀學校科選之設宰相百官降王外彞之事分門列傳凡一百六年為書二十卷當時號為審訂頒付史館副存於家雖非正史亦草創注記之流也世之學者前古之事靡不歷覽至於皇朝典故則往往不知其源或年代差舛或名號錯誤事辭失據前後抵牾蓋其所傳不審而外之故事雜録各附聞見國史法禁世莫得聞每縉紳之士文涉典故則含毫猶豫况於考著譜牒載述碑頌可使是非無凖厚誣當時致惑來世今斯集所載五朝之事炳然在目曽大父淄王昔典宗正嘗授此書不敢顓祕庶幾宦學君子有所考質嗚呼觀臯陶益稷之言知帝堯帝舜之事學者豈不孜孜歟淄國趙伯衛序
