body:
  text: 隆平集卷十四宋曾鞏撰侍從樂黃目字公禮撫州宜黃人父史字子正母夢許真人令吞五色珠而生史史有文辭初仕江南歸朝再舉進士登甲科所至不修謹獲譴官至職方員外郎直史館卒有雜編六百九十餘卷自為文百卷謂之洞仙集黃目淳化中登進士第深沉為吏以靜勝飾以文雅纍擢知制誥給事中卒有文集五十卷雜編六十卷嘗與父史同在儒館人以為榮子理國定國劉筠字子儀大名人咸平元年登進士第補館陶縣令代還詔楊億試選人校勘太清樓書籍筠中選第一纍擢知制誥翰林學士嘗草丁謂李迪罷相制既又命筠草制復留謂筠不奉詔乃更命晏殊為之謂方用事筠遂請治郡以諫議大夫知廬州仁宗即位復翰林學士以疾除禮部侍郎樞密直學士知棣州天聖五年復入翰林加承旨兼龍圖閣待制學士再知廬州乃營塜墓自為志銘刻之卒年六十一子宗憲自景德以來居文翰之任惟筠與楊億齊名號為楊劉筠三典貢舉以䇿論升降天下自筠始其為人不茍合所著有七集錢昆字裕之吳越國王倧之子隨俶歸朝諸從子皆授官獨昆及弟易願從科舉太宗嘉之淳化二年昆登進士第纍官至諫議大夫以祕書監致仕卒年七十七子孟孫孟荀孟回昆喜為詩賦又喜草𨽻書間自畫寒蘆沙鳥於紈扇有幽雅之趣人競藏之有文集十卷弟易字希白十七舉進士御試三題日未中而就言者指其輕俊而黜之太宗嘗語蘇易簡歎不與李白同時對曰有進士錢易能為歌詩不下李白上驚喜曰誠如是吾當白衣召至翰林會盜起劍南乃止咸平二年易登進士第甲科景德中舉賢良方正䇿入第四等纍擢知制誥翰林學士卒年五十九易才俊過人為文數千言頃刻而就又善行草書有金閨集六十卷瀛州集五十卷西垣集三十卷內制集二十卷夀雲總録一百卷新書十卷子彥逺明逸彥逺字子髙以父任太廟齋郎至大理寺丞登進士第至太常博士舉賢良方正䇿入等授祠部員外郎遷起居舍人直集賢院卒年三十七子協燮和父易弟明逸及彥逺皆中制舉世以為盛彥逺屢上封事言事判司農寺因諸路奏大水彥逺言隂氣過盛在五行傳有下謀上之徴請嚴宫省宿衛未幾有挾刃理謻門者上善其奏特賜五品服蘇紳字儀甫泉州人天禧中登進士第初名慶民避章獻太后諱改今名官太常博士舉賢良方正䇿入等授祠部員外郎屢上章仁宗嘉納之擢知制誥翰林學士諫官言紳舉進士馬端非其人改龍圖閣學士喪父服除復翰林學士言者又彈其急于進取改翰林侍讀學士知河陽徙河中府未行感疾醫者誤用藥猶力疾杖之卒年四十八子頌衮梲兗李行簡字易從同州人少苦學坐石誦六經常至夜分雖寒暑不渝又聚木葉學書筆法遒徑舉進士登第纍擢至龍圖閣待制真宗數幸閣命講易因訪大臣能否行簡必稱其所長人以為長者仁宗即位進給事中以疾求外知河中府徙虢州卒年七十一有集二十卷子貺閲兢元畹行簡端重不妄交一介不取諸人雖善奕人莫知者諸子非冠帶莫敢見聚書萬卷多其自録人謂之書樓偶夢緑衣吏持簿至公府自丁謂而下皆録其官夀至行簡云官議大夫及疾歎曰官給事中已踰分矣馬亮字叔明其先茂陵人自祖韜始徙居廬州太平興國五年登進士第屢除外官咸平中王均反除西川轉運副使改使賊平召問蜀事加直史館復還部久之以右諫議大夫知廣州纍遷至兵部侍郎仁宗即位進至工部尚書以太子太保致仕卒年七十三贈右僕射諡忠肅子仲宣仲容仲卿仲謀仲甫亮有治才所至以能稱初置提點刑獄官亮領福建始訊寃獄全活者數十人知饒州有豪右白氏多持吏短長嘗殺人原赦益橫亮發其姦惡誅之部中肅然平王均主將誅戮不已亮救免者千數及械送詿誤者僅九十人至京知樞密院周瑩欲盡誅之亮言脅從者甚衆此特百之一二若不貸之恐益危懼貽朝廷憂從之任中執法請祖父未葬者不許析居以厚風教在蜀奏除廢井鹽逋二百餘萬真宗初政亮嘗上四事皆見施行其一言親王判開封府地尊勢重疑隙易構非保全親親之道皆取為切務其餘督給軍賞趣除逋負及通邉好亦皆仁政之一端楊大雅字子政初名侃避真宗藩邸名而更之唐靖恭諸楊虞卿之後虞卿孫承休唐天佑初為吳越䇿禮副使因家錢塘大雅承休四世孫也端拱二年登進士第久歷外官後與陳從易並命為知制誥二人者皆博學有行義頗愜時論以右諫議大夫集賢院學士知亳州卒年六十九所著有大隱集三十卷西垣集五卷職林二十卷兩漢博聞十二卷子􅀈泳漸沆渢孫甫字之翰許州人天聖五年同學究出身八年再舉登進士第嘗從杜衍辟永興軍司録衍在樞密府又薦之除祕閣校理纍擢天章閣待制河北都轉運使留侍講卒年六十贈右諫議大夫子宣實置著唐史書七十五卷文集七卷每言唐君臣行事以推見當時治亂若身履其間聞者釋然為正言嘗言張修媛寵姿恃恩用物之過上曰用物在省司吾恨不知耳保州兵變前有告者大臣不時發之甫力言樞密使偕副當得罪指杜衍也邉將劉滬城水洛涇原帥尹洙以滬違節制將斬之大臣稍主洙議甫以謂水洛通秦渭為便滬不可罪由是罷洙而滬釋衍屢薦甫甫與洙素善不少假借之范仲淹知杭州多便宜行事甫為兩浙轉運使一切繩之以法司馬池字和中陕州江夏人少好學推家財數十萬與其諸父景德二年登進士第多歷外官纍擢三司副使天章閣待制知杭州徙晉州卒年六十三子旦光池嘗奏名禮部將入試殿廷一日心動不能寐曰吾母素多疾能無恙否及至內門徘徊不能入蓋母亡為友人所匿也因語其友而友止告以聞有疾池遂號慟而歸盛度謫守光州池為光山令大內火詔諸州市竹木州期以三日畢輸池以土不産轉市鄰郡非三日可得度怒甚既而光山為諸邑先池於民有信而民不俟于懲督也曹利用嘗薦為羣牧判官池辭不就朝廷固授之其後利用貶其黨畏罪多從而毁之獨池在朝明利用之枉朝廷卒不問除知諫院表懇免上謂宰相曰人皆嗜進池獨嗜退也加直史館知鳳翔有疑獄上讞大理輒復下掾屬惶懼池曰長吏者政事所係乃獨承其罪詔責之政陽鎮巡檢夜飲富民家所部卒執之而俾為文約不敢復督士卒而後釋其縛池捕首惡誅之巡檢亦坐廢為侍御史知雜言陕西用兵無宿將劉平好自用必誤大事卒如其言在杭州為轉運使江鈞張從革捃托條奏之未謫間吏有盜官銀器為鈞償私費而從革之姻犯稅隂遣人私請或謂可以此報池獨不校張師德字尚賢河南人父去華建隆二年舉進士第一師德大中祥符間復居第一時以為榮纍擢知制誥諫議大夫知汝州卒年四十九子景仙景憲景思景惠師德孝謹有家法守道不回執政不悅在西掖者九年有集十卷謝絳字希深太子賔客濤之子少以父任校書郎大中祥符八年登進士第屢歷省寺館閣擢知制誥久之請補外知鄧州卒年四十六子景溫景平景回有文集五十卷絳初為祕閣校理常上疏謂有宋當以土德王天下下兩制議不從天聖初水旱蝗生河決上疏據洪範京房易傳陳災異之變指切時政上嘉納之又論唐室麗正史官之局並在大明華清宫內太宗肇修三館更立祕閣於升龍門左親飛白題額刻贊閣下景德中積書寖廣又益以內帑四庫二聖常數臨幸親加勞問遞宿廣內者有不時之召人人力道術究藝文知天子尊禮而名臣髙位由此選也往者延燔簡編略盡詔訪舊本是正疑文有司引兩省故事别創外館以從繕寫考校之便直舍卑喧太官衛尉供擬滋削陛下未嘗迂翠華降玉趾寂寥册府不聞輿馬之音曠有日矣議者以為慕道不篤于古待士少損于前士無延訪之勤而不自激䇿文雅漸弊甚為聖朝惜也願闢內館以恢景德之制從之又言號令數變則虧體利害偏聽則惑聰請者務於必行守者患於不一願罷內降凡詔令皆由中書密院然後施行因進聖治針曰紹聖馭臣內戒慎令警變凡五篇李仲容字儀父濟隂人唐郇王禕十三世孫祖濤國初為兵部尚書仲容少好學咸平五年登進士第纍擢知制誥時翰林學士員不足衆謂當次補而不為宰相所喜乃罷知制誥為給事中集賢院學士久之除翰林侍讀學士兼龍圖閣學士官至戶部侍郎卒年七十子景倫景賢景行景仁集制草為冠鳳集十二卷仲容性質醇易喜讀書善記問賔至多命酒笑談而不及勢利馮元字道宗三世為偽漢日官父邴從劉鋹入朝為保章正元少好學崔頥正孫奭授以五經大義祥符中登進士第會詔擇明經補學官自陳通五經謝泌領銓管詰之曰古者治一經或至皓首子能盡通之耶對曰逹者一以貫之泌善其對因問以疑義隨輒辨析遂以為國子監講書仁宗升儲擢太子右諭德即位除龍圖閣直學士兼侍講又判國子監故事國子監必宿儒典領其後頗用貴逰子弟委任與管庫均及元與孫奭並命輿議大服未幾為龍圖閣學士翰林學士護葬章懿太后于洪福院及葬永定陵發壙中有水罷為龍圖閣學士知河陽宰相王曽言元東朝舊臣不宜以細故棄外即召為翰林侍讀學士遷戶部侍郎卒年六十三贈尚書諡章靖無子以兄之子譓為後真宗大中祥符末元常講易泰卦賜五品服除直龍圖閣直閣名官蓋始於此元性簡重非慶弔未嘗通謁公卿執親喪自括髮至祥練皆按禮變服多識今臺閣品式之事所學長於易常患先儒多失揚雄太玄之旨獨唐王淮為稍近為釋文一篇欲因王説補正之卒不能就也孔道輔字原魯初名延魯孔子四十五世孫大中祥符五年登進士第天聖間擢至龍圖閣待制除諫議大夫御史中丞出知泰州徙徐兖州進給事中龍圖閣直學士復為中丞坐鞫馮士元獄以給事中知鄆州未至卒子宗亮宗翰初道輔任左正言嘗言樞密使曹利用御藥羅崇勳皆竊弄天子威柄中外憚之不早斥去無以清朝廷使契丹北主酌以大巵曰方天寒飲此可以致和氣道輔曰不和固無害及還言者以為開夷爭端他日上問之對曰契丹新為黑水所破勢甚戚平時漢使至多以言相侮若不答恐益慢中國上然之在憲府會郭皇后廢率諫官御史伏閣請對上令至中書宰相謂曰廢后有漢唐故事道輔曰大臣當導君以堯舜而漢唐失德可為法耶宰相色沮明日請對不得入遂有泰州之命後雖坐馮士元事貶天下莫不以直道許之也段少連字希逸開封人其母夢鳳集於家庭而少連生大中祥符末舉服勤詞學科中選釋褐知鄂州崇陽縣崇陽劇邑自張詠後未之繼者少連治譽仍出其右纍擢至天章閣待制范仲淹薦可任將帥除龍圖閣直學士知涇州徙渭州卒年四十六子仲堅初郭皇后廢少連為殿中侍御史與臺諫官伏閣不得對孔道輔范仲淹謫出少連等止各罰銅十斤少連上疏以為道輔仲淹出守外郡中外皆謂非陛下之意特宰執假天威以斷來者之説不報又疏伏覩戒諭自今並如故事密上封章不得羣詣殿門請對且伏閣上疏豈非故事昔唐陽城王仲舒伏閣雪陸贄之枉崔元亮叩殿陛理宋申錫之寃今陛下未忍廢黜皇后而兩府列狀議降為妃諫議御史敢廢伏閣之事乎陛下深惟道輔等所言為忠亮乎為阿黨乎不報又上疏去年十二月二府大臣晚出民間喧傳皇后被遣而入道矣又傳降為妃而離宫矣在外莫知其過失無不驚歎且皇后有罪黜則告宗廟廢則為庶人安有隂行臣下之議者乎且皇后有小過可降為妃則臣僚之婦有小過亦當廢為妾矣臣等赴中書時輔弼之臣備言皇后有妬忌之行始議入道終降為妃兼云有上封者恐皇后不利於聖躬故修築髙垣置在别館臣等備陳中外之議翌日詔出乃云中宫有過掖廷具知特示含容俾自修省供給之間一切如故臣未審黜在别館為妃乎為后乎詔書不言安所取信皇后動搖有大不可者二輔弼之臣獨不念之內外臣僚以至戚里豈不萌覬覦之心欲進其人以希選納不憚巧事寵愛以結內援使陛下惑女色而亂紀綱紀綱之亂變故以生社稷可得安乎臣願詔皇后歸宫復位號杜絶非間待之如初陛下茍為邪人所沮不加省察臣恐髙宗皇后之枉必見於他日宫闈不正之亂未測於將來不報葉清臣字道卿蘇州人天聖二年登進士甲科纍擢知制誥龍圖閣直學士權三司使出知江寧府入翰林為學士丁父憂或言其知兵起復守邉宰相陳執中所不悅除翰林侍讀學士知邠州改青州永興軍復為翰林學士權三司使罷知河陽卒年五十贈諫議大夫子均圻垣增有文集一百六十卷清臣初在西掖方陕西用兵急於經費中書進擬三司使獨不在選中上自選任焉及再蒞是職請上河北安撫司錢平糴安撫使賈昌朝固爭而罷其為人爽邁遇事敢言數言事皆當世可施用者在三司始奏編前後詔敕使吏不能欺簿帳之冗者一切刪去內東門御廚凡所呼索省司不敢問此內臣領之故也自是始為合同以檢其出入焉常為兩浙轉運副使疏太湖盤龍滙滬瀆港入於海民賴其利彭乘字利建益州華陽人大中祥符五年登進士第授漢陽軍判官與同年生逰相國寺門顧望皆有從宦之樂乘獨曰親老矣敢舍晨昏之奉乎翌日遂乞侍飬以歸久之有薦其文行者召試除館閣校勘固辭還家天禧初用寇凖薦復召試為校勘遷祕書丞集賢校理懇求便親得知普州舊制蜀人不許赴蜀官特恩自乘始父卒既葬甘露降墓柏上人以為孝感起居注闕中書擬人乘在選中仁宗指其名曰此老儒雅有恬退稱遂用之擢知制誥翰林學士羣牧使卒年六十五子果行景行家聚書萬卷多乘手自校正質重純孝特為文少工王洙字源叔應天府人天聖二年登進士第纍擢知制誥翰林學士以兄子堯臣恭知政事權翰林侍讀學士卒年六十子力臣欽臣陟臣曽臣所著傳十卷雜文千有餘篇洙博覽強記學問過人圖緯方技隂陽五行算數音律詁訓篆𨽻之學無所不通兩為天章閣侍講常與胡瑗定樂制更造鐘磬而無形制容受之别既成卒不可用預修崇文總目集韻祖宗故事五朝武經聖略鄉兵制度在太常主溫成葬事由員外除翰林學士及避親以一學士權二學士故事侍講無兼領者嘗為諫官范鎮論奏之其卒賜諡曰文吳中復等言官不應得諡乃止胥偃字安道潭州長沙人大中祥符五年登進士第屢歷外官景祐初知制誥久之入翰林為學士權知開封府卒年五十七子元衡其家初有田數十頃偃既貴遂以豫族人西邉用兵士卒親屬留京師有犯法抵死者上不忍使就刑言者或欲置毒飲中令得善死偃力諫止天下圭田初無月日之限爭者稍衆偃請限水田以四月終陸田以三月終因著為令常與謝絳試中書吏大臣有私屬者偃不發視其緘牘而焚之曰發而言之不亦傷刻薄乎狄棐字輔之潭州湘潭人唐梁公十代孫也唐末其逺祖避地因家焉咸平二年登進士第多歷外任明道初擢至諫議大夫龍圖閣直學士進樞密直學士卒年六十七子遵道遵度遵禮遵路常守蒲中內臣旁午有自矜權寵者欲引援之棐答以他語退謂人曰吾湘潭一寒士今官侍從豈晚節緣近幸以希進哉知廣州不畜南海物人稱其廉慎及終家無餘資吳遵路字安道父俶字正儀潤州人幼有俊才韓熙載潘佑皆以文章著名江左一見俶深加器重曰吳安道中林之蘭蕙也因問以文皇杜淹論樂異同俶曰志氣未動則聲能致和哀樂既形則樂乃思變熙載佑歎曰足以探禮樂之情矣應江南進士舉徐鉉主文擢在高第補丹陽尉久之進內史歸朝以近臣薦始得對召試學士院充史館編修太平御覽文苑英華大平廣記遷祕閣校理修起居注太宗實録官至職方員外郎卒年五十六有文集二十卷説文及祕閣間談各五卷江淮異人録各三卷遵路大中祥符五年登進士第纍擢至天章閣待制龍圖閣直學士卒年五十六子瑛遵路少頴悟其舅陳彭年以令器許之及長博學慎重寡言尤篤於風義居母喪廬墓側蔬食終制嘗採古今治亂事著皇典數百卷未訖而終家無餘資友人范仲淹分俸賙之周湛字文淵其先汝隂人五世祖宦湖外馬霸圖割據留不敢歸子孫遂為邵州人既又徙居南陽湛天禧二年登進士第歷內外官善治劇初若不留意已而皆得其要纍擢至右諫議大夫知相州卒年七十一子璟玘戎州俗不服藥而救疾以巫湛為通判刻方書於石民始知藥之驗江湖民多略良人鬻嶺外為奴婢湛提點廣東路刑獄許其自陳得還鄉者千數徙京西路罷鄧州美陽堰役夫嵗數十萬前此利止及圭田而不及民故也江西民喜訟多竊去案牘而州縣不能制湛為轉運使為立千文架閣法以嵗月為次嚴其遺失之罪朝廷頒諸路為法至今不易又命諸縣據籍括詭名戶一路推究三十餘萬以免追擾之弊徙夔州路蠲雲安鹽井虛課而省其輸薪之患知襄州鄽中皆以竹居民多侵官衢故多火災湛命驗劵而正其經界仍易竹以瓦後不能改任三司鹽鐡判官立勘同法嵗減天下計帳七千道遷戶部副使覆校軍大將功罪發運司保送而遷者減常之半善隔屋射弩發必中的人服其妙楊察字隱甫其先成都人景祐元年登進士甲科纍擢知制誥龍圖閣待制翰林學士加承旨三入翰林又常兼龍圖學士權知開封府御史中丞兩除三司使卒年四十六贈禮部尚書諡宣懿無子以兄之子登為後察七嵗始能言為文敏贍典內外制有體要吏術簡而中理初為江東轉運使部吏頗易其年少及摘姦伏一路􅋏栗任中執法言臺屬供奉殿中巡糾不法必得通古今治亂良直之臣今舉格太密公坐細故皆所不取恐英偉之士或有所遺知成都餌鍾乳數片癰發內潰而逝有文集二十卷弟置字審賢慶厯二年登進士殿省國學皆選居第一通判潤州以母憂不赴毁瘠嘔血而卒年三十一置嘗曰友人黃孝先嘗夢我為龍首山人蓋逆知其無祿也余靖字安道韶州人天聖二年登進士第又中書判拔萃科授將作監丞稍遷祕書丞集賢校理范仲淹言事忤宰相貶饒州靖上言恐鉗天下口落職筠州管𣙜以母憂服除復職除右正言數言事合上意擢知制誥積官至工部尚書卒諡襄靖常三使契丹曉其語言因為蕃部語詩為御史劾奏貶吉州茹孝標嘗因靖言其不孝廢至是遂詣闕言靖少嘗犯法靖乃自求侍養改將作少監分司居韶州六年起知虔州喪父解官會儂智髙反朝廷以祕書監起復知潭州徙桂州聞智髙自廣還雍靖意其必援交趾而脅諸洞以自固乃檄諭李德政及溪洞諸酋約其破賊會遣狄青孫沔將兵且至與靖合為三將靖嘗迫鈐轄陳曙出關敗走青次賔州戮曙以徇靖懼離席拜青及青破賊靖與有功後知廣州代還至江寧府秦淮亭卒年六十五靖嘗夢人告以官及死所皆驗賈黯字直孺南陽人慶厯六年登進士第纍擢知制誥翰林學士權御史中丞在翰林兩為學士兩以侍讀學士出補郡卒年四十四黯有學少文修潔無所阿附仁宗深重之嘗知襄州父疾請解官就養未報乃棄官而歸責郢州未赴而父卒服除亦不復責權開封府府史額七百人廢而復敘者皆額外補之黯請敘者須有闕乃補在西掖宰相以錢延年為待制黯不草制故罷居憲府與兩制合議請以漢王為皇伯宰執不從會大雨水黯上疏言水不潤下以二三大臣阿諛容悅違背經義故致此災變黯言事雖不皆切中然時論稱其亮直何中立字公南許州人景祐元年登進士第多歷內外官擢修起居注知制誥龍圖閣直學士樞密直學士知杭州卒年五十四子景先景初景山景闓景俶景甫景倩中立嗜酒而為文頗正所至政事亦優權知開封府以賊屬吏不服釋去中立至有復執所釋囚來中立視之曰此真盜也窮治之果不能隱知慶州有卒告大校受贓者中立治告者誣而置於法或曰貸姦可乎曰人人得持短長以制其上將誰使督戰於行陳也陳從易字簡夫泉州人端拱初登進士第踐歷之久始擢知制誥諫議大夫進龍圖閣直學士知杭州卒年六十子紹孫繼孫維孫所著泉山集二十卷中書制稿五卷西清奏議二卷嘗與楊大雅同在西掖俱以文學知名時謂之楊陳從易天禧中坐失舉送宰相寇凖素惡之遂除知吉州及凖貶道州從易為湖南轉運使或謂曰可忘廬陵之命耶凖至從易以故相禮敬之言者為慙素與王欽若善欽若廢居睢陽親舊畏時相無敢見者從易赴河南見之欽若曰無乃為君纍乎卒留數日而行隆平集卷十四
