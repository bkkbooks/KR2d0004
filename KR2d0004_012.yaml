body:
  text: 隆平集卷十二宋曽鞏撰王後周鄭王名訓世宗長子顯徳六年六月封梁王世宗崩即皇帝位明年正月六軍擁戴太祖而王遜居西邸封國於鄭建隆三年王徙房陵開寳六年薨年二十一知制誥張澹請諡曰恭皇帝陵曰順陵周自辛亥嵗建國至己亥而禪位三主共九年偽國吳越錢俶字文徳名上字犯宣祖廟諱故止稱下一字祖鏐曰吳越武肅王父瓘曰文穆瓘卒子佐繼佐卒以弟倧繼倧為牙校胡進思所廢俶時鎮浙東遂渡江襲偽位漢授以東南面兵馬都元帥領鎮東軍節制封吳越國王至周以天下都元帥處之宋興改大元帥開寳八年征江南為招撫使江南平與其妻子来朝待以優禮賜劍履上殿詔書不名封其妻孫氏為妃宰臣言自古異姓諸侯王妻無封妃之制太祖曰行自我朝何拘舊典太平興國三年四月復来朝而陳洪進繼至洪進先納土俶不自安亦上章以國歸有司改封淮海國王子惟濬惟治並除節制諸子弟族人及其将佐或牧守有差錢氏五主共八十一年俶以天下既平八年求去元帥之稱從之雍熙閒改封漢南南陽二國既又辭國號改封許徙鄧俶唐天成四年八月二十四日生端拱元年八月二十四日薨年六十進封秦國王諡忠懿為太師中書令者四十年任元帥者三十年近世處富貴者未有其比俶崇信釋教性謹未常忤物子惟演字希聖俶第十四子也幼有俊才俶常使賦逺山詩有髙為天一柱秀作海三峯之句俶深器之初補職牙門累遷左神武将軍咸平中獻文召試學士院上覽所試稱善特授太僕少卿累擢知制誥翰林學士坐為人於開封府請求奪職久之復學士天禧四年為樞密副使仁宗即位除樞密使太后稱制宰臣馮拯以惟演太后姻家請出之除節度使知河陽請覲加使相判許州屢徙藩鎮鬱鬱不得志及耕籍田求侍祠留為景靈宫使太后崩還河陽請以章獻太后章懿太后同配食真宗廟御史中丞范諷劾奏惟演擅議宗廟落平章事改鎮崇信卒年五十八特贈侍中惟演少富貴能志於學有文章與楊億劉筠齊名常曰學士備顧問不可不該博故其家聚書侔於祕府又多藏古書畫在館閣預修策府元龜凡千篇特詔與楊億分為之序其為人少誠信初附丁謂力排準其後逐謂亦與有力焉所著有典懿集二十卷樞庭擁旄前後集伊川漢上集金坡遺事録飛白書序録逢辰録奉藩書事子暖晦昕昉㬢昞曄曈􅀈㬇曜漳泉陳洪進字濟川其先泗州人曽祖為閩官遭亂因家泉州仙遊縣唐光啓中賊帥王潮陷泉州以福州觀察使王審知為副潮卒審知據其位梁冊審知為閩王二十九年而卒其子延翰繼踰年而被弑其弟延鈞襲八年遂僭帝號十一年卒子昶嗣被逐而叔延義立以其弟延政為建州刺史既而背命僭號商國六年閣門使連重遇推客省使朱文進以奪其位復號閩國時石晉天福七年也文進以黄紹頗為泉州刺史程贇漳州刺史許文稹汀州刺史泉人念王氏為羣逆分據宂員指揮使留從効王忠順董思安以氣義相附謀復王氏於是募敢死士五十人而洪進與焉夜擒紹頗害之立延政從子繼勲而從効忠順思安為統帥洪進為指揮使繼勲欲送紹頗首於建州奉延政為主而道阻賊盛莫敢往者獨洪進請行道遇賊語以泉福已定賊遂潰洪進至建州延政大悦既而程贇立延政從子繼成許文稹又以汀州降而朱文進為連重遇所殺福人亦殺重遇延政遂遣洪進還泉州三年江南李景䧟建州以延政入金陵明年留從効劫繼勲使降江南自領州事李景授從効泉州刺史進節制以洪進佐之進職統軍使建隆三年從効死洪進誣其子紹鎡将叛執送建康推副使張漢思為留後自為副使漢思患其專将圖之洪進一日袖大鎻鎖其府門叩門謂漢思曰軍吏請洪進知郡衆不可違速以郡印見授漢思惶懼亟與之得印復謂軍士曰漢思昏老不能治郡以印付吾将吏皆賀即置漢思别館遣使告江南而李煜遂授以節制太祖既平諸路洪進乃請命於朝李煜屢奏以為不可詔不從遂别授以節制太平興國三年来朝即以國歸朝廷改除節制杞國公授其子文顯團練使文顥文頊並刺史久之進封洪進岐國公卒贈中書令諡忠順南唐李煜字重光其祖昪偽吳将徐温之養子冐徐姓名知誥後唐長興中專吳政為太尉以子景為平章事昪天福間遂僭稱帝國號齊復李姓因改為唐都金陵七年而死景嗣以宋齊丘周宗為相僭郊祀禮遣将校侵福建漳泉之地河中李守政叛永授而景應之聞其敗乃還周初下長沙復失之方中原多事盧文正李金全皇甫暉之徒南奔景據江淮三十年國力富盛潛有窺神器之意聞世宗克揚州始懼而盡割淮南地嵗餘盡去僭號既而忿躁乃殺宋齊丘陳覺李正古及太祖登位益懼遂徙都南昌景死煜嗣表請追尊景立帝號太祖許之廟號元宗及陵名亦禀而後定自是朝廷始改書為詔制西蜀嶺南雖平而江南貢奉不絶故未欲加兵乃遣使諭令入朝煜稱疾而㳂江繕兵備始命曹彬潘美征之初樊若氷獻采石磯浮梁計上從之煜語張垍垍曰古来有之煜曰兒戲耳橋成王師薄城而煜不知也時煜以兵柄任皇甫繼勲以機事屬陳喬張垍傳詔内殿者徐元瑀徐元瑜刁衎邉書告急元瑜等皆匿而不通及兵圍城煜驚且怒而殺繼勲焉陳喬張垍常相謂當死社稷及城䧟喬獨死之垍從煜歸朝後至執政喬字子喬豫章人煜以為門下侍郎兼樞密使煜所遣拒王師皆非習武事者其将帥多佩符印人傳以為笑及戰皆不復還城垂䧟太祖猶遣諭曹彬令招撫之煜惑左右之言卒至就擒開寳九年至闕免宣露布特授左千牛衛上将軍封違命侯太宗即位加特進改封隴西郡公卒年四十二追封吳王自昪至煜三主共三十九年而失國子仲㝢官至刺史㝢之子正言北漢劉繼元其母劉崇之女適薛氏生繼元及其兄繼恩劉崇漢祖之母弟也為太原尹隠帝遇害漢太后遣馮道迎崇之子贇於徐州欲使襲漢位少尹李驤語崇曰觀郭公用心當自取之不若以兵至孟津觀變俟徐州踐祚則無可疑矣崇怒以為驤欲離間父子并其妻殺之且表其事而周祖已登位崇遣人乞贇歸藩始知贇死矣乃為驤立廟遂僭帝號重幣結契丹如晉祖約為父子契丹䇿崇為大漢神武皇帝崇死子鈞繼鈞結李景孟昶為助仍求援於李筠初漢祖以鈞無子命育繼恩為嗣鈞卒繼恩襲而為侯霸榮先所殺郭無為遂援立繼元太祖常遣詔諭繼元無為各許以節制繼元因疑無為而無為復勸使効順又欲叱兵出戰及王師注水其城遂殺無為以狥無為棣州人博學有詞辨初隠武當山為道士鈞以諌議大夫起之太平興國四年太宗親征不欲屠城城垂破繼元始降自崇僭號繼元失國凡二十九年繼元殘忍臣下多被族誅未敗時太宗先命郭進斷契丹之援於石嶺闗進至敵衆果来進擊走之繼元猶以蠟丸帛書求救於敵進得之以狥城下及降上宥其罪授右衛上将軍檢校太師彭城郡公賜第京師嵗時霑賜甚厚又以房州為保康軍授繼元節制卒贈彭城郡王遺奏以六歳子三猪為託上哀之厚䘏其家西蜀孟昶其先太原人父知祥尚唐莊宗妹莊宗遣郭崇韜魏王繼岌平王衍以知祥為成都尹充節度副使莊宗及禍明宗為送公主并二子入蜀安重誨用事以李嚴為西川監軍使圖之知祥遂殺嚴而結東川帥董璋婚媾謀據劍南既而明宗誅璋之家遣使諭之知祥伐蜀出於安重誨重誨既伏誅知祥乃上章謝罪璋疑其貳遂以兵襲知祥璋敗知祥表其事朝廷即付以兩川封為蜀王許行墨制明宗崩即僭號盡得王氏故地知祥卒昶繼立建隆末昶潛結太原劉鈞為援謀起兵乾徳二年十一月詔以昶與河東劉鈞蠟丸帛書将起兵故遣王全斌崔彦進王仁贍曹彬等分路伐蜀所至皆克三年正月十三日全斌次魏城昶上表請降自出師六十六日而兩川平計知祥割據至昶失國凡三十二年晉末光徳亂華中原多事昶負固西南驕縱滋甚聞世宗来秦鳯始有懼意寓書世宗講鄉里之好世宗怒不答愈不自安多積芻粟以鐵為錢禁民私用鐵而自鬻器用以專利民甚苦之以其子元喆為太子王昭遠伊審徵韓保正趙崇韜分掌兵柄其母謂昶曰吾見莊宗及汝父時非有功者不使主兵故人皆畏服樂為之用昭遠微賤特汝初學時給事左右而其餘皆世禄子驟置人上其誰敢言以吾料之惟髙彦疇汝父舊人當不誤爾昶不聴其後髙彦疇以䕫州不守遂死之他悉為降虜昶至闕持授開府儀同三司檢校太師兼中書令秦國公卒年四十七追封楚王昶死其母不哭子元喆除節度使元珏右千牛衛上将軍弟仁贄仁祐仁操並環衛官初王師将及境昶遣元喆率師守劍門自成都攜妓樂嬉戲而行聞劍門已破遂遁歸昭遠成都人少貧為僧童知祥因飯僧昭遠從至知祥見而留以給事昶昶立擢知樞密院兼節度使王師入境昶命總兵拒戰昭逺攘臂曰是行也豈止克敵當定中原矣執鐵如意指揮軍事自比諸葛亮及敗昭遠竄匿東川民舍猶誦羅隠運失英雄不自由之句遂為追兵所執人皆笑之歸朝至節度使卒昶之宰相李昊在王衍時為翰林學士常草衍降表及歸朝授工部尚書荆南髙繼冲曾祖季興渤海蓨人唐末荆南司馬張環逐其節度使陳儒自稱留後環敗而季興守荆南梁開平初遂據有其地封秦王卒諡武信子從誨後唐天成三年襲偽位封南平王卒諡文獻子保融漢乾祐五年襲封平王卒諡正懿無子建隆元年其弟保朂嗣立從誨於諸子中最愛保朂雖甚怒見之則釋然荆南人目之為萬事休建隆四年保朂卒子繼冲正月襲位二月王師援湖南道出荆南繼冲請舉族歸朝自季興至繼沖五主凡五十七年而失國乾徳三年改授繼冲徐州大都督長史武寧軍節度使封渤海郡侯鎮彭門僅十年卒年三十二贈侍中繼冲久以國歸朝廷其袐書監孫光憲因王師至荆南而以理論之俾獻三州之地光憲有學術歸朝特授黄州刺史南漢劉鋹五世祖仁安唐潮州刺史其子孫因家嶺南宰相韋宙以其兄之女妻仁安之子謙謙生隠謙仕至封州刺史昭宗時以嗣薛王知柔鎮廣州表隠為司馬委以兵柄宰相徐彦若卒遺奏請除隠留後隠厚賂梁祖求為郎除南海節度使梁祖開平初封隠南平王隠卒弟陟襲偽位時邕州葉廣略容州龎巨源交州曲承美皆自擅兵賦而陟并之遂盡有嶺表之地聞錢鏐封吳越王正明中陟遂僭稱帝國號大漢改元乾亨更名巖又更龑龑之字無所出龑性酷暴行炮烙刳剔截舌灌鼻之刑為玉堂珠殿飾以金碧翠羽見北人必自言世居咸秦恥為南蠻主呼中朝止曰洛州刺史龑卒子玢為弟晟所弑而晟自立造鑊湯鐵牀聞湖南馬氏兄弟之隙遂遣兵取桂林栁賀之地晟卒子鋹嗣鋹委政閹宦後宫亦令冠帯預政其臣有小過或将大用則加以宫刑及将至敗也星多北流知星者以為北歸之祥初龑命日者筮國祚遇復之豐曰将五十五年乎自梁正明三年龑僭號開寳四年鋹國亡其數無差又龑先名龔有術者筮曰後必有此姓者敗國事及鋹用龔澄樞李托皆為内太師薛崇譽開府儀同三司鋹以托二女為貴妃美人澄樞為鋹置酷法之具因以敗國鋹至闕宣露布訖命盧多遜詰鋹翻覆之由鋹對曰臣年十六而僭位龔澄樞等皆先臣舊人臣不得專遂命戮澄樞托崇譽於千秋門外而釋鋹罪授右千牛衛上将軍封恩赦侯卒年三十九贈太師追封南越王鋹口辯性巧常以珍珠結戲龍於鞍勒以獻尚方工伎莫不駭伏太祖歎曰鋹至京師猶規什一之利移此心計治其國豈至滅亡耶鋹在偽邦於海門鎮募採珠卒二千號媚川都以石鎚足而下有及五百餘尺而後得珠則引綆而出氣不屬且死者不可勝計所積盈府庫而其求無厭及敗悉以焚棄潘美猶於煨燼中得其餘以獻之朝廷於是太祖詔廢媚川都仍禁民間不得以採珠為業湖南周行逢朗州人少亡賴犯法𨽻軍籍久之為禆校唐乾寧初馬霸圖盜據湖南地自置郡守以下官廣順初馬希萼與弟希廣争國率蠻軍殺希廣而自立又為其将陸孟俊所遷而立弟希崇因求援江南李景遣邊鎬赴之馬氏舉族俘於建康景以鎬帥潭而朗州軍亂推牙将劉言為帥以行逢為都校因上章李景求旌鉞不許言遂遣行逢帥舟師陷潭州邊鎬遁去因據其城言請移潭治朗周祖即言帥朗以王進逵帥潭顯徳中禆将潘叔嗣害進逵請行逢帥朗行逢至戮叔嗣以徇世宗因除行逢朗州大都督武平軍節度使兼侍中自是盡有湖南地建隆初加中書令行逢善用人盡心民政其壻求補吏以耒耜與之人服其公性多猜忌喜殺戮将終謂将校曰吾死張文表必叛公等强勉䕶吾兒既而文表果舉兵滅周氏其子保權年十一乞師朝廷詔慕容延釗李處耘率師赴之而保權已平文表王師始至遂嬰城以拒城破竄匿民間太祖以其年幼政不由已詔尋訪赴闕保權上章待罪釋之授右千牛衛上将軍累遷至左羽林統軍卒錢俶所獻州十三縣八十七户三十三萬四千九百三十二口七十二萬四千七百兵十一萬五千三十六陳洪進所獻漳泉二州十二縣共管户一十一萬二十一口三十一萬四千九百三十二兵一萬八千七百二十七曹彬平李煜得州十九軍三縣一百八户六十五萬五千六十五太宗皇帝親征太原劉繼元得州十縣四十一户三十萬五千三百二十王全斌平孟昶得州四十五縣一百八十九户五十三萬四千二十九髙繼冲所獻州三縣一十五户一十四萬三千三百潘美平劉鋹得州四十一縣六十五户七萬五千一百三十九李處耘慕容延釗平周保權得州十四縣五十八户九萬七千三百八十八右八國共得州軍一百四十五縣五百七十五隆平集卷十二
