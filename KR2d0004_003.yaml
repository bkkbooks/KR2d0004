body:
  text: 隆平集卷三宋曽鞏撰祠祭唐臘用辰宋興臘用戌貞觀以前寅蜡百神夘祭社宫辰享宗廟開元以後三祭同用臘辰建隆之制祭百神社稷宗廟同用臘戌祠部令應先代帝王三年一享牲用太牢建隆四年詔來年仲春以羊豕代太牢致饗帝髙辛廟在宋州堯在晋州臨汾以稷契配舜在河中府以臯繇配禹在陜州夏縣以伯益配湯在郾師以伊尹配文王在酆舊配以太公望唐封太公望武成王以廟食今以師鬻熊配武王在鎬以周公配漢髙祖在長陵以蕭何配光武在南陽以鄧禹吴漢賈復耿弇配唐太宗在醴泉以長生無忌房喬杜如晦魏徴李靖配乾徳四年詔先代帝王各置守陵户太皥塟長沙黄帝塟長沙髙陽葬臨河髙辛𦵏濮陽堯葬城陽榖林舜𦵏零陵九疑女媧𦵏趙城禹塟㑹稽湯塟寳鼎文王武王並塟咸陽漢髙祖葬長安世祖葬洛陽唐髙祖葬三原太宗葬醴泉九鬷山並五户每歳春秋長吏以羊代牛奉祀商中宗至隋文帝十陵並三户歳一享秦始皇至石晉髙祖十五陵並二户三歳一享周桓王至後唐清泰帝三十八陵止禁樵採淳化三年祕書監李至上言國初舉藏冰之法於司寒之祭常在四月行之按豳風七月四之日獻羔祭韭蓋周以十一月為正而四月者今之二月也春秋傳曰日在北陸而藏冰謂夏十二月日在虛危也獻羔祭韭謂二月春分始開冰室也火出而畢賦火星昏見謂三月四月中也又月令仲春天子獻羔開冰先薦寢廟詳開冰之祭當在春秋而行之四月乃有司之失也上然之命正其理集賢校理胡宿言火正閼伯之祠在南京乃國朝受命之地自祖宗以來未領於祠官臣切為朝廷惜之事下禮官言閼伯為堯火正實居商丘主祀大火能宿其官後世因之祀為貴神配火侑食國家有天下之號實本於宋五運之次又盛火徳謂其因興王之地商丘之舊作為壇兆秩祭大火配以閼伯以辰戌出納之月詔留司長吏奉祭事上是其議而行之皇祐間上謂大臣曰前世禮神有祭玉燔玉今於祀典無乃闕乎文彦博對曰唐太常卿王起以當時祀事止有燔玉因請下有司求良玉始造璧琮等九器以祀神已事則蔵之而燔玉止用珉蓋唐以來禮神之玉已不備上曰朕奉事天地祖宗豈於寶玉有所愛乎其令有司備制製之時沙州適貢玉乃擇其良者製為璧琮等九器其黝璜尤粹温祭玉之備蓋始於此矣原本第三卷欠一葉自帝三十字起至玉有字止又第九卷弭徳超傳闕尾楊守一張遜二傳全闕曹彬傳闕首段而謬附以王荆公事舛錯失倫初刻注為闕文不免遺憾兹己丑季春忽得六安州楊君希洛千里貽緘從董氏萬卷堂善本録示遂補刻以成全書隔地同心誠快事也有神降於終南山道士劉守真以為天之宗神號黒殺將軍守真每齋戒祈請必至至則室中風肅然聲如嬰兒獨守真能曉開寶九年太祖不豫驛召守真令問焉曰上天宫闕成玉鎖開矣晉王有人心言訖不復降太平興國六年封神為翊聖將軍咸平四年封劔州梓潼神順濟王為英顯王王張亞子也生越巂仕晉戰殁郡國志云亞子常至長安見姚萇謂之曰别後九年君入蜀梓潼七曲山頭有叢林僕所居也叩樹當有應者及苻堅命萇入蜀因此至七曲山訪得其處舉䇿叩樹有閽人出曰此神君仙室也萇曰神君可得見乎入白有頃數吏前導見堂宇壯麗侍御擁神君出乃張君也叙舊設席張樂酒酣萇辭神敕左右授以一杖曰有兵革事所指如意萇得之戰無不克唐明皇入蜀神迎於萬里橋僖宗播遷亦有㝠助故封爵順濟王咸平三年蜀寇王均叛有登城指賊大呼曰梓潼神遣我來九月二十日城陷矣賊射之不見及期果驗帥臣以聞故改是封焉劉云梓潼神來厯如此其說已荒唐况又増以文昌化書等乎即此所紀以武事著聞並非文事也續文獻考載倪文毅上正祀典疏略云按圖志英顯王廟在劒州即梓潼神姓張諱亞子其先越巂人因報母讐徙居劔州之七曲山仕晉戰殁人為立廟唐𤣥宗西狩追封左丞僖宗入蜀封順濟王宋咸平中改封英顯又按文昌六星在北斗魁前為天之六府道家謂上帝命梓潼神掌文昌府事及人間禄籍元加號為輔元開化文昌司禄宏仁帝君以二月初三日為誕生之辰至於文昌之星與梓潼無干今乃合而為一誠出傅㑹所有前件祭祀乞罷免刑罰諸州大辟舊皆藩臣專決枉濫者衆時務姑息不復究問建隆三年詔自今郡國斷大辟並録案朱書格律及禁勘月日官典名銜以聞委刑部覆視仁宗哀矜庶獄官失入死罪者終身不得改官吏部甞引對選人韓中正以失入人罪報罷後刑部引為詳斷官上見其奏謂王欽若曰此豈常引對者耶欽若對曰然上曰既常用法不當乃可以為法官乎詔劾引用者罪沈徳妃之弟惟恭樂安郡主之壻張承衍同管勾㑹靈觀觀燔坐黜惟恭蔡州承衍汝州並管庫妃主交為言乞畱京師仁宗曰已行之命為貴戚所回則法徒設矣命趣行燕樂酺飲起自秦法三人㑹飲則罰金故因事賜酺吏民㑹飲過則禁之太宗甞謂輔臣曰朕讀唐史書每見睿宗以後賜酺或連夜七日九日亦或彌月無乃太甚乎娯樂不可過三日為得宜矣𤣥宗令三百里内刺史縣令各率音樂集都下能無勞擾耶雍熙九年冬南郊禮畢詔賜大酺三日丙申自丹鳳樓至朱雀門張樂遷四市物貨㑹五方士女旱車水船往來御道為魚龍曼延之戲又集開封府縣及諸軍樂人列御樓前音樂間發觀者溢路上御樓燕羣臣賜畿甸耆老酒食列坐於下大中祥符以後屢講是制上元張燈舊止三夜乾徳五年太祖謂宰臣曰今朝廷無事稼穡豐稔當縱士庶俾之行樂詔開封府更增兩夜遂為定制故事學士赴任有敕設獼猴之戲其禮久闕張洎蘇易簡除翰林學士特命設教坊雜伎樞宻直學士知制誥以上咸與其集太宗因謂侍臣曰學士清切貴重朕常恨不得為之聖祖降後上謂王旦等曰先天降聖節欲設齋醮止刑罰屠宰其日聽士庶以延夀帶續命縷保生酒更相贈遺因示帶縷一奩皆金銀珠翠繒綵為之旦曰陛下製此非止崇奉蓋欲均福衆庶臣等不勝大慶湯敦實曰此數語便是逢迎豈待受美珠而後不敢諫耶愛民方藥附嶺南旣平太祖因覽桂陽監歳入白金數謂宰相曰山澤之利雖多頗聞採納不易自今減舊額三分之一以寛之太平興國二年有司奏江南諸州𣙜茶於㳂江州軍置八務民有匿而不聞許鄰里告給賞詔從之自唐建中四年趙贊判度支始稅竹木茶漆其後户部侍郎張滂遂請移山茶根於茶園舊茶悉焚棄天下怨之九年王涯誅令狐楚代涯請入其租於戸部人莫不恱乾徳後雖禁民私賣而茶之利盡入縣官民不以為擾太宗覽福建版籍謂宰相曰陳洪進以漳泉二州贍軍數萬無名科歛民所不堪比朝廷悉已蠲削煩苛稅名吾民當小康矣端拱二年河北屯軍乏糧度支使李惟清𤼵河南十七州民運送上曰今已春深農事正急豈宜更興此役惟清固請乃遣左正言馮拯乗傳與轉運使規度止請𤼵貝冀州餘糧輸邊它俟農隙上因召惟清語之曰掌邦計者當以民為本軍食雖少民力不任計司須務變通自今冝以利民為先無致厚斂且財貨所以濟用度取不以道豈朕愛民之意耶淳化二年許商人納粟麥分江淮官茶以給其直謂之折博倉商人甚便之國初有折中倉或言其弊而罷之及端拱初以折中倉罷歳失國用百萬之入遂欲復置以歳歉而止至是始復而更其名曰折博公私以為便至道元年八月知開封縣裴麗正言畿縣見欠夏稅蠶鹽三司令折納大麥今已過時上曰三司害政甚矣八月課民輸大麥價益踴貴欠稅皆下戸是重困小民也即日下詔聽從便雜輸粟豆以官鹽貨於民蠶事既畢即以絲絹償官謂之蠶鹽又有食鹽即隨租賦納其直景徳中河北轉運使李士衡奏方春民不足可給以錢使至夏輸絹民甚便之詔推其法於天下謂之和預買景徳中有司言京師民僦官舎居人獲利多而輸官少乞増所輸許奪賃若人重遷必自増其數上曰豈不太刻耶先帝屢常止絶其申戒之大中祥符五年三司請民販茶違法許家人告上曰是教犯義非朝廷所宜言不許上封者言川陜官鹽價賤民間倍之請増其直免失厚利上曰官直賤民間尚貴上更増直下益闕矣不許陜西轉運使張象中言安邑縣兩池鹽見貯三億餘萬斤尚虞遺利請申條約真宗曰過求羡餘當慮有時而闕不許蜀人以鐵錢重私為文券謂之交子以便貿易既久而或不能償民訟不已天聖中知益州寇瑊請禁之上曰蜀民用交子久矣罷之可乎下使者議以為官置務則可以利民而止其欺上曰果利民其行之仁宗即位以真宗時常遣使江浙蠲放逋欠因登極赦恩命知制誥張師徳侍御史知雜事蔡齊詳定天下欠負悉蠲除之其後命官放欠負蓋自此始淄州東冶舊以衙前主之冶久廢州請均其課於諸縣仁宗曰利出於冶冶既廢矣他縣力田之民何預而使之輸耶命罷之太平興國中編成方書賜諸道州郡謂之太平聖恵方一百二十卷仁宗謂輔臣曰近時方伎之學廢故世無良醫人多横夭乃命太醫較定黄帝内經素問難經巢氏病源等模以頒天下銅人鍼多圖經一節合次於此以脫落今補於後仁宗以福建奏獄多蠱毒害人者福建醫工林士元能以藥下之詔録其方又命太醫集諸方之善治蠱毒者為慶厯善救方命參知政事丁度序之以頒天下言者云雖有方書逺方或闕藥材不能自致詔許以官錢治善救方諸藥以濟民皇祐四年上以方書雖多或藥品之衆昧者用之寡要貧者困於無資命太醫集諸家已試之方删去浮冗而標脈證兼叙病源名之曰簡要濟衆方且令崇文院分作上中下三冊印頒諸色樞密院韓琦言朝廷雖頒方書以救民疾而貧民力或不能及請令諸節鎮及益幷慶渭四州歳賜錢二十萬餘州軍監十萬委長吏選官合藥以時給散上如𤦺奏至今行之仁宗謂輔臣曰鍼砭之法世傳不同腧穴少差或害人命其令太醫王惟一考明堂氣穴經絡之㑹鑄腧穴銅人式一置醫官院一置大相國寺惟一又纂集所聞糾正訛謬為銅人鍼灸圖經以進上命夏竦為之序而模以頒天下典故乾徳三年宰相范質王溥魏仁浦同罷翌日制書以趙普為相無宰相書敕上召學士問故事陶榖曰自來輔相未甞虛位唯太和中甘露事數日無宰相命僕射令狐楚奉行制書今尚書亦南省官可以書敕竇儀曰榖所陳非承平之事不足為比今皇弟開封尹同平章事即宰相之任也上曰儀之言是即令晉王書敕故事節度使不帶平章事者在大卿監下乾徳五年始陞節度使班在龍墀内金吾上將軍之上太平興國二年詔常參官知節鎮者借紫餘緋罷日仍舊淳化元年益王元傑授揚潤大都督府長史學士張洎言唐以揚益潞幽荆五郡為大都督府置長史司馬為上佐其大都督非親王不授或親王遙領别令大臣領郡除長史副大使節度事今益王正大都督之任復為長史乃是自為上佐也吕蒙正以為襄王越王皆領長史矣今呉王獨領大都督非便上曰業已錯誤俟别除授並正之淳化二年詔百官次對又御文徳殿羣臣入閣復舊制也來年五月羣臣入閣設黄麾杖新制也三班使臣舊不免杖罰户部尚書張齊賢編敕始請以贖論咸平六年詔河北東陜西轉運使副按邊經費勞於他路其月俸共給實錢至今行之大中祥符六年陳世卿知廣州詔歳給添支錢七十萬公用錢五十萬遂著為令真宗謂宰臣曰何承矩甞請與藩臣封户何如王旦對曰唐朝將帥富貴驕蹇往往陷於不道良由事勢强大朝廷姑息太過每移一帥未有帖然奉命者至於五代餘風未殄太祖制之有術迄今藩臣有兼相印提禁旅及久當邊任者詔㫖亟召則夙夜奔命好談古者特思慮未至耳上然之王欽若言比見石普奏章用新州觀察使印上顧宰相問其事王旦對曰普以河西節度使知許州此必許州觀察之印耳欽若之言謬矣凡節鎮有節度使印隨本司闕則州本吏用本州觀察使印又有州印文曰某州之印晝則州録事叅軍掌用暮則納長吏所節度使在本鎮兵刑甲仗即節度判官掌書記推官連書用節度使印民田租賦事即觀察判官支使推官連書用觀察使印州司下符用本州印故命將必曰某軍節度使得專制其軍旅也曰某州觀察使得亷問其風俗也曰某州刺史得刺舉其州軍也天聖中都官員外郎呉耀卿言景徳中江淮漕米歳不過四百五十萬石其後増至六百五十萬故江淮之間榖常貴而民益貧請約咸平景徳中數立為中制上詔發運使歳減漕米五十萬石仁宗謂輔臣曰日者三司請以轉運使漕事集否為昇黜之法意欲修舉其職非誘之為聚斂也邇聞貪冒之人僥倖恩賞肆為侵尅豈朝廷之意也轉運使考課法其亟除之梁惟吉知懐安軍其弟惟遜已任屬官惟吉母老乞改任仁宗命有司自今如是者悉免遂為定制河渠至道元年上問汴河疏鑿之始張洎上言曰昔大禹導河自積石至於龍門南至于華隂東至于砥柱又東至于孟津東過洛汭至于大伾即成臯是也或云黎陽山禹以大河流泛中國為害最甚乃於頓丘郡界疏二渠以分水勢一渠自陽武縣東引入漯水東北流至千乗縣入海即今黄河是也一渠疏畎引竝西山以山東地形髙敞穰束水勢不使流溢夾右碣石入于渤海書所謂北過洚水至于大陸洚水即濁漳也大陸即邢州鉅鹿澤也播為九河同為逆河入于海河自魏郡貴鄉界為九道下至滄州合為一河言逆河者謂與海水往復相承也齊桓公霸塞河廣田居惟一河水存焉今貝冀東界王莽枯河是也禹又於滎澤下分大河水為隂溝引注東南以通淮泗至大梁浚儀縣西北復分二渠一渠東經陽武縣南中牟臺下為官渡水一渠始皇疏鑿以灌魏郡謂之鴻溝莨菪渠自滎陽五出池口來注之其鴻溝即出河之溝亦曰莨菪渠漢明帝時樂浪人王景謁者王吳始作浚儀渠故以浚儀為名靈帝建寧四年於敖城西北壘石為門以遏渠口故世謂之石門渠水東合濟與河渠渾濤東注至敖渠水至此又兼入邲即春秋時晉楚戰於邲是也邲又音汳汳即汴字古人避反字故改從卞云飰字亦去反従卞同此義也渠水又東經滎陽北旃然水自縣東流入汳水鄭州滎陽縣西二十里三皇山上有二廣武城相去百餘步汴水自兩城間東流而去其濟流自兹而絶唯汴渠首受旃然水謂之鴻溝晉太和中桓温北伐前燕將通之不果義熙十三年劉裕西伐姚秦復浚此渠始有湍流奔注兩岸渠潰塞劉公更疏鑿而漕運隋煬帝大業三年詔尚書左丞皇甫誼𤼵河南男女百萬開汴水起滎澤入淮千餘里仍自汴河為通濟渠又發淮南兵夫十餘萬開邗溝自山陽淮隂至揚子江三百餘里水面廣四十步而後行幸焉自是天下利於轉輸昔孝文時賈誼上言漢以江淮為奉地謂魚鹽榖帛多出自東南也至五鳳中耿夀昌奏云故事歳漕關東榖四百萬斛以給京師亦多自此渠漕運唐初改通濟渠為廣濟渠開元中裴耀卿上言江南租船自長淮西北泝鴻溝轉相輸納於河隂獲嘉太原等倉凡三年運米七百萬石實利渉於此開元末汴州刺史齊澣以江淮漕運經淮水波濤有沉損遂開廣濟渠下流自泗州虹縣至楚州淮隂縣北八十里合於淮踰時畢功既而水流迅急行旅艱險尋乃停廢復由舊河徳宗朝嵗漕江淮米四十萬石以益闗中時叛將李正已田恱皆分軍守徐州臨渦口梁崇義阻兵襄鄧南北漕引皆絶於是水陸轉運使杜佑請改漕路由浚儀西十里疏其南涯引流入琵琶溝經蔡河至陳州合潁水是秦漢故路以官漕久不由此道故填淤不通若畎流培岸則功用甚寡又廬夀之間有水道而平岡亘其中曰鷄鳴山佑請疏其兩端皆可通舟其間登陸四十里而已則江湖黔嶺蜀漢之粟可方舟而下由白沙東關經廬夀浮潁涉蔡厯琵琶溝入汴河不復經揚楚沂淮之險徑於舊路二千餘里功寡而利博朝議將行淮路通乃止今天下甲卒百千萬人戰馬數十萬匹萃在京師仍以七亡國之士民集於輦下比漢唐京邑十倍其人矣雖甸服時有水旱不致艱歉者恵民金水五丈清汴四渠派引脈分咸㑹天邑舳艫相接給贍公私所以無匱乏也唯汴横亘中國首承大河漕引江湖利盡南海半天下之財賦悉由此路而進昔大禹疏鑿以分水勢煬帝開畎以奉廵遊雖數堙廢而通流不絶終為國家之用者其天意乎天聖初右班殿直劉達言解州安邑縣自後魏正始中都水校尉元清平坑水西入大河以運鹽號永豐渠周齊之間其渠遂廢大業中都水監姚暹決堰浚渠自陜郊西入解縣民賴其利唐末渠復湮沒請濬之上下其議轉運使王博文以為利遂命開浚渠成公私便之户口建隆元年版籍之數州百一十一縣六百三十八户九十六萬七千三百五十三開寶九年州二百九十七縣一千八十六户二百五十萬八千九百六十五至道三年户四百五十一萬四千二百五十七大中祥符八年户八百四十二萬二千四百三口一千八百八十萬一千九百三十夏秋稅錢帛糧斛二千二百七十六萬四千一百三十三絲綿禾草二千二百八十三萬六千六百三十六茶鹽酒稅錢帛金銀二千八百萬二千寶元元年户一千一十一萬四千二百九十雜録平蜀得鑄印官祝温集自言祖思言為唐禮部鑄印官世習籒篆即漢藝文志所謂屈曲纒繞以模印章者遂命重鑄中書門下樞密院省臺寺監等印樊若冰初在江南舉進士不第因常漁釣采石江上以漁船載絲繩度江之廣狹上書言江南可伐之狀太祖用其計下荆湖造大橋聯巨艦江南不守采石王師徑度遂破池陽初除舒州推官及計既行遂領池州事積官至給事中太祖常問其名出何典記對曰臣慕唐右丞倪若冰故名焉上笑曰可改名知古蓋上惡其聲近弱兵也唐右丞相乃倪若水謂之若冰謬矣日本國奝然太平興國九年自其國來因得召見言其國王傳襲六十四世矣文武僚吏亦皆世官太宗歎謂羣臣曰朕不敢自逸以冀運祚永久更賴忠良輔朕不逮無俾逺夷獨享斯慶有宋大臣生享王封者符彦卿王景錢俶殁而追封者孟昶椘王慕容延釗河南郡王王審𤦺瑯邪郡王錢俶秦國王李繼勲隴西郡王劉繼元彭城郡王劉鋹南越王李煜吳王趙普真定郡王曹彬濟陽郡王錢惟濬邠王魏仁浦齊王石守信衞王劉美魏王李用和隴右郡王以時政記進御自宰相李昉始以起居注進御自起居郎梁周翰始御史中丞得從逰宴自趙昌言始集賢校理陪宴京師許乗馬入禁門自李宗諤始以執政判禮儀院自丁謂始將帥在外遇大禮賜賚自王徳用程琳李昭始董遵誨世居幽州其母在契丹太祖令人賂邊民使迎其母送於遵誨遣外弟劉綜貢馬以謝上解所服真珠盤龍衣命齎賜之綜曰遵誨人臣豈敢當此上曰吾委以方面不此嫌也太祖甞命有司治第將賜郭進令蓋以㼧瓦有司言舊制非親王公主之第不用㼧瓦上曰郭進控扼西山十餘年使我無北顧憂我視進豈減兒女耶髙敞國太平興國六年入貢其土即後漢戊巳校尉之地其俗好騎射戴油㡌謂之蘇幕遮隆平集卷三
