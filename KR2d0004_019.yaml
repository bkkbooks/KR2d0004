body:
  text: 隆平集卷十九宋曽鞏撰武臣楊嗣殿前指揮使信之子以父任為殿直數有戰功累擢至深州團練使以左龍武軍大將軍致仕卒年八十一子承憲淳化二年嗣知保州有詔褒其治狀咸平三年敗契丹之衆於亷良除保州刺史召見特授團練使嗣言久與楊延昭聨事臣不逮延昭一旦驟居其上臣所未安願仍舊真宗嘉其亷退竝命為團練使令嗣因持延昭誥與之李溥始為三司小吏太宗論及財賦必召以問利害頗納用之擢為左侍禁自是進至宫苑使團練使兩以贓貶責授右千牛衞將軍致仕卒年八十四子居簡文仲景徳二年以溥制置江淮等路鹽茶礬税兼𤼵運使江淮米運至京舊止二百五十萬至溥遂增至六百餘萬石擢為𤼵運副使高郵軍新開湖風濤多覆舟溥課官舟還及泗州者載石積湖中成兩狹岸其患遂絶正除𤼵運使既又進為修玉清昭應宫都監溥既久顓利權内恃丁謂為之助又林特為其姻家故贓汚不法以及於罪盧鑑字正臣金陵人淳化四年舉進士不中授三班奉職積官至西上閣門使知秦州卒年七十子咸盛初鑑鄜延路走馬承受就除本路駐泊都監屢擊走繼遷焚族帳積聚而獲其畜産以數萬計繼遷聲言石隕帳前有文曰天戒汝勿為中國患因入奏曰賊偽為此以紿朝廷宜益設備後果陷靈州鑑知儀州諜者言繼遷將由制勝闗入寇詔徙老幼芻粟於内地鑑奏以為揺民心且民弱不可徙已而賊亦不至周美字之純靈州人城陷棄其族閒行詣京師𨽻軍籍從駕幸澶淵自陳願假三數騎係契丹首領獻闕下真宗壯之特㫖令入宿衞累以戰功遷天武都虞候監兵延州元昊破金明美請於安撫使范仲淹曰金明地當邊衝不可不早完之仲淹因屬美董其役既而元昊兵數萬陳於延州城北美領衆二千決戰㑹屯山北多設疑兵賊以為救至引去復攻艾蒿寨又夜出戰多設炬張旗幟山上賊棄鎧甲牛馬而遁遂募工築萬安城而還龐籍留之改東路都巡檢使又敗賊於金陽城明年昊賊據永平寨諸將㑹議种世衡欲直擣賊美以為賊料吾來必設伏不如間道出其不意世衡不從果無功而美趨芙蓉谷大破之復擊賊於野家店逐北至拓拔谷還屯永平寨勸士卒墾田嵗收六千斛築柵葱梅官道谷以搤賊路徙鄜延路都監破賊於無定河乘勝焚金州廬帳殺首領獲牛羊兵械甚多城龍口平寨賊精兵數千來襲美以百騎破其衆累擢至觀察使馬步軍副都指揮使卒年七十六贈節度使諡忠毅自陜西用兵宿將數不利獨美前後十數戰皆有功焚寨復城堡四十二招種落内附十一族所得俸賜悉分士卒子利涉永清永正焦守節字秉節以父彰武軍節度使繼勲遺奏補殿直累擢至四方館使榮州刺史以右神武大將軍致仕卒年七十六子宗説宗簡宗慶宗彛宗諒宗信初高溪州蠻寇邊命守節往議攻取計以為山川阻險非大軍之利遂招撫之三司常奏守節監香藥𣙜易院嵗課増八十萬遷閤門副使真宗謂宰相曰以財利羨餘遷横行何以勸邊陲効命者止命以宫苑副使兼通事舍人常使契丹館伴丁求説頗易之指逺山曰此黄龍塘也應聲問曰燕然山距此幾許求説慙乃加禮焉黄龍塘即徳光置晉少帝之所閻守恭并州人繼元敗徙其民於大名府因家焉少負販并汾閒聞郭進被人王優遇慨然曰使進不遇亦一行伍耳吾顧不能逮邪乃應募𨽻拱聖軍累以戰功擢徳州刺史并代路鈐轄卒年七十五子繼恩守恭既仕宦見士大夫必訪郭進平日所行以為法其慕之如此故馭軍嚴飭所得俸賜悉以散施雖居家如對賓客張綸字公信棣州人淳化中舉進士不中補奉職累擢至乾州刺史知潁州卒年七十五子孝先紹先辰州溪峒蠻寇邊以綸知辰州築蓬山驛路賊不得通方遁去又修新興寨天禧五年為江淮𤼵運使增米八十萬復置監場於杭秀海州增嵗課百五十萬疏五渠導太湖入於海復租米六十萬開長蘆西河以避覆舟之患築高郵北漕河隄二百里旁錮以巨石為十闥以泄横流又修復泰州捍海堰因命兼權知泰州堰城復逋戸三千六百州民為立生祠安俊字智周其先太原人以儒家子得給事資善堂仁宗即位補殿直累擢至步軍都虞候陵州防禦使卒年六十四贈觀察使子介愈弇合俊歴邊任有威名戰功家藏書數千卷婚姻多擇士人常曰吾家集坐有文士過半平生足矣王信字公亮太原人初應募潞州軍籍常生擒七十賊以功補龍衞指揮使遷都虞候劉平石元孫三川之敗信獨以所部兵獲數千級知保安軍以二千兵破西賊數萬衆為高陽副都總管明鎬奏充恩州四靣都總管賊黨三百餘人鼓噪而出信悉捕戮之擢留後召為步軍副都指揮使卒年六十一子繼恩信持重用兵未嘗沮䘐劉平字士衡開封人景徳三年登進士第真宗愛其才將用之為丁謂所惡以為平將家子可委以邊事仁宗即位章獻太后思謂言乃自侍御史換以衣庫使累擢至步軍都指揮使靜康軍留後鄜延路副都總管兼鄜延環慶兩路同安撫使又兼管涇原路兵馬石元孫字善長中書令守信之孫父保興官防禦使元孫以守信恩補供奉官累擢至邕州觀察使鄜延路副都總管兼安撫使寳元初元昊發兵攻保安軍自土門路入寇知延州范雍書召劉平元孫合軍趨土門既又有告賊兵數萬趨金明圍延州雍復召二帥還軍救延州平督騎兵先𤼵步卒繼進夜至三川口西十里營令騎兵先趨延州奪門詰朝步兵未至元孫與平還逆之行二十里遇步兵及鄜延駐泊都監内臣黄徳和碎金谷巡檢万俟政郭遵所將兵皆至步騎萬餘結陣東行至三川口遇賊是日官軍殺賊鐵騎六七百人及蔽盾為陣者八九百人平左耳右脛皆中流矢薄暮賊復以輕兵來戰官軍少卻黄徳和居陣後遂走保南山追之不止遣軍校以劍遮士卒得千餘人轉鬬三日夜衆寡不敵遂皆被執平不復食仍數罵賊遂遇害年六十八元孫不死及元昊納欵乃得歸徳和既遁輒誣平及元孫降賊朝廷以禁卒圍其家命殿中侍御史文彦博内臣梁致械詣河中府置獄遣知同州待制龎籍往訊焉具得其狀延州吏民亦詣闕訴平等實戰殁遂釋二家惟戮徳和梟首延州城下賜平家信陵坊第一區贈平節度使平妻南陽郡夫人子慶孫宜孫昌孫貽孫孝孫季孫及三弟四孫咸贈賜官謂元孫已死亦贈節度使子孫贈秩賜官者八人及歸言者請誅其辱國之罪上特貸之安置全州還卒年七十二子宗道宗易宗尹宗亮宗廣宗求平剛直任俠善弓馬初知果州南充縣以父喪解官還任安州道中遇賊十數以刃臨之平引弓三矢斃三人餘遂遁去其帥鄜延初上攻守之䇿不為不知邊事特志常輕賊而自處以必勝又衆因徳和而潰遂至陷殁聞者傷之王珪開封人初應募為親從官累以戰功擢至禮賓副使涇州駐泊都監餘并耿桑事見任福傳耿傅字公弼祖昭化以不屈於賊而死傅以蔭補累官將作監丞知河南府永寜州知州宋綬薦其才除通判儀州徙慶州桑懌雍丘人舉進士不中移居汝潁間諸縣多盜自請補耆老殺獲殆盡其鄰因之無盜京西轉運使表其事授郟縣尉徙澠池而朝廷特改右班殿直積官内殿崇班涇原路兵馬都監任福開封人初補御士由諸班遷至刺史始擢邊任以功遷至賀州防禦使知慶州兼環慶路都副總管慶厯元年詔福往涇原路計議邊事適安撫使韓琦行邊趨涇原聞元昊閲兵折薑㑹謀入寇遂以兵萬八千人命福統諸將擊賊以耿傅叅軍事桑懌為先鋒王珪及涇原都監禮賓副使武英各以所部兵從福節制𤦺靣授福及諸將方略俾併兵合勢自懐逺城趨徳勝寨至羊牧隆城出賊之後諸寨相距僅四十里道近且易照應糧草足供如未可戰則據險設伏待其歸然後邀擊之福等就道𤦺又至城外重戒之福自新壕引輕騎數千趨懐逺城撩龍川遇鎮戎軍都同巡檢常鼎劉肅與賊戰於張家堡斬首數百級賊偽北桑懌以為然遂引騎趨之福亦踵其後㑹合軍屯好水川朱觀武英耿傅屯籠絡川相距五里諜者言賊兵少故福等輕之追奔三日芻糧不繼人馬饑乏至籠竿城北遇賊距羊牧隆城五里結陣以抗官軍諸將見其兵勢之衆方知墮賊計中勢不可留遂前接戰桑懌劉肅先戰殁福繼之珪及武英而下皆陷焉獨朱觀保民垣四向縱射㑹暮獲免自主將叅軍至偏禆死者十數軍校又數倍之士卒踰六千人福等貪功輕敵不能稟韓琦併兵合勢之言以至覆敗奏至上甚悼之贈福節度使兼侍中賜第一區三子一姪一孫贈秩咸賜官王珪贈觀察使三子賜官耿傅贈右諫議大夫五子賜官三人為京秩桑懌贈防禦使子湜推恩加等其餘褒贈有差福之子曰懐徳懷譽懐謹姪懐玉孫惟恭珪之子曰光祖光世光嗣傳之子曰瓊璩璋珪琬康定初元昊寇鎮戎軍珪將三千騎為先鋒自瓦亭至師子堡賊圍之數重珪奮擊多獲首級乘間叩鎮戎軍請益兵不許止縋糧與之士卒既飽珪語之曰兵法以寡撃衆必在暮我兵少乘其暮氣之衰可得志也乃馳入賊一將以鎗直其胷傷右臂珪左手以杵碎其腦一將復以鎗進珪挾其鎗運鐵鞭擊死之敵驚遂引去上聞特遣使奬諭以其下死傷多止賜名馬金絹仍暴其功以勵諸將珪以所得二鎗植山上及珪死邊人即其所為立廟焉珪通陰陽術數好水之戰自知其不得還將行謂其家人曰可速去無為敵所仇也及敵攻瓦亭果購其家人屬如珪之言珪所將兵止五千連鬭三日諸將俱殁珪望福陷賊猶欲援出之軍校顧望多不從珪斬以徇乃復入戰擊殺數百人鐵鞭撓曲手掌破裂三易馬猶馳擊數百人矢中目還軍中卒武英常勸耿傅曰君非主兵者柰何欲與英俱死也朱觀亦戒傅少避鋭鋒傅不答於軍中指顧自若求與英俱死或謂福之敗由傅督諸將稍急韓琦得傅為朱觀貽書戒以持重尹洙亦作閔忠辨誣二篇其謗遂息懌善用劍及鐡簡有智略謹畏常若不足所至寇盜衆所不能獲者必獲之其功賞推之居己上者或譏其好名歎曰若欲避名皆不可為也益自信葛懐敏開封人感徳軍節度使霸之子以霸蔭補供奉官其妻王徳用之妹也懐敏通時事善希合故多薦其才者積官眉州防禦使涇原副都總管慶厯二年元昊寇鎮戎軍懐敏領養馬城㑹將聞賊兵徙壕外遂帥諸將趨定州劉賀以蕃兵五千與賊戰不勝而潰懐敏入保定川寨曹英又敗於寨之東北隅懐敏所部人奔駭懐敏為衆所擁幾蹂踐死輿至甕城乃蘇賊遂聚火圍其城懐敏召諸將謀來日結陣赴鎮戎軍因諭其親軍聴中軍鼓乃得行及鳴鼓懐敏上馬大軍未動馭者勸未可去有頃復上馬又不從拔劍將擊之士衆遂散乃䇿馬至長城壕賊周圍斷其歸路與諸將皆遇害餘兵為賊所隔及保他寨堡不赴者獲存賊遂長驅直抵渭州六七百里民受其患初懐敏除鄜延而主帥范仲淹言其怯儒不知兵遂徙涇原卒敗事如仲淹言定川奏至贈懐敏節度使諡忠隠子宗晟宗壽宗禮宗師皆贈秩或賜官郭恩開封人初𨽻諸班出為左侍禁累有戰功積官崇儀使并代鈐轄管句麟府軍馬事初夏人嵗侵屈野河地至耕穫時輒屯兵河西以誘官軍經略使龎籍戒邊將勿與戰月餘食盡去如是屢矣是嵗正月出屯三月始去并州通判司馬光行邊至河西白草平數十里無寇跡時知麟府州武戡通判夏倚已築一堡又與光議乘寇之去出其不意别創二堡據其地使不得耕功畢則廢横戎臨塞二堡徙兵實新堡列烽燧自衙門紅樓下視其地如指掌堡成三十里外田宼必不敢耕矣籍從光議遂築二堡恩與武戡及走馬承受内臣黄道元以巡邊為名往按視之諜者言寇兵屯沙黍浪十五里不絶恩欲止道元怒以言逼恩恩遂夜率步騎千四百人循屈野河北行見卧牛峰舉火戡曰敵知吾輩出矣道元曰此若輩之為也俄聞鼓聲亦不信比明遇賊自旦戰及食時敵四靣合撃武戡走東山趨城東掖門以入恩與道元皆陷賊恩死之贈觀察使子中言中彦中良中謹弟思竝贈秩或賜官給恩舊俸三年馬遂開封人初補散職為北京指揮使聞王則叛中夜叱咤晨興詣留守賈昌期請與行陣命持榜招降則盛服見之與坐遂諭以禍福則不答遂扼其喉擊之流血賊徒驍㨗卒石慶斷其一臂遂詬之曰妖賊吾恨不斬汝萬段即被害時張得一侍賊側上聞遂死深嗟惜之贈遂宫苑使五子竝賜官得石慶付其子使剖心祭遂景泰字周臣普州人天禧三年登進士第累官至都官員外郎知成州元昊反有薦泰知兵召到換左藏庫使知寜州泰通判慶州日常上章言元昊包藏禍心主將任福無長䇿凡三上不報及元昊寇鎮戎軍敗葛懐敏初入攻渭州泰率兵五千閒道赴援戮先鋒殿直張向逗遛而行遇賊於彭陽西依山為陣陰選三百騎為左右翼張旗幟為疑兵賊愕視不敢進而遁士卒請追擊泰止之搜山果得伏兵與戰斬首千餘級以功遷西上閤門使久之加忠州刺史秦鳳路都總管卒年五十八子思問思安思忠思立思誼趙滋字子深開封人以父戰死補奉職累擢至端州防禦使步軍都虞候卒年五十七滋常為涇原儀渭州巡檢得勝寨主姚貴殺監押崔詢刧宣武神威騎卒千數叛攻羊牧隆城滋領兵至餘人降獨貴走出寨招討使命滋給賜降者及遷補將吏滋曰是誘其亂也藏其檄不下招討使怒之功遂不及賞范仲淹韓𤦺舉滋可將領滋在京東數獲盜不自言知青州富弼言於上獲躐等遷官管句河東經略司公事建言代州寜化軍有地萬頃可募種田作敎以戰射令護塞從之其利甚博契丹人數乘小舟漁界河者吏莫敢禁更造大舟十數運鹽海口滋捕殺之移文涿州遂不復至後因虜使言朝廷乃擢使管軍故事邊州米出外界不許過三㪷滋知雄州契丹大饑滋曰彼亦民也米出無所禁滋剛果有才特矜傲自譽人多誚之李緯字仲文以父廣東提㸃刑獄遺恩補借職累擢至西上閤門使卒年七十贈引進使陵州團練使子師中積中純中緯常知渭州請修籠竿城瓦亭寨及以籠竿為徳順軍范仲淹韓𤦺遂舉緯知徳順軍招蕃部内屬者數百帳葛懐敏既陷殁元昊因攻瓦亭籠竿皆不能下雄州未有常平倉緯知州以賜公使錢置焉及民饑遂獲均濟范恪字許國開封人𨽻軍籍選行門歴龍旗直散員押班試換内殿崇班積官至兩使留後卒年五十贈節度使子愈愿總愬恕愚應隠懿億恪驍勇善射臨敵敢前初為慶州北路都巡檢預攻破白豹城兵還賊襲其後恪設伏擊之殺獲甚衆常㑹諸道兵攻十二盤暨咄當述子寨中流矢神色自若至暮以言激衆士卒爭奮遂得其城有弓勝二石一㪷其箭鏃如鏵臨陣必中間有一矢貫二人者敵畏之從奪蕉蒿寨歸恪殿後敵以數千騎來襲恪止有二鏵箭引滿不發賊欲相及輒復避去終莫能近張亢字公壽濮州人天禧二年登進士第以通判鎮戎軍常上言元昊喜誅殺勢必難制宜為邊備又論西北攻守繼而契丹聚兵幽涿間遂擢如京使知安肅軍因入奏言其主孱而嵗歉方藉金帛之賜特懼中國見伐而為此耳卒不敢動如亢言自是數歴西北邊任積官至客省使眉州防禦使徐州總管卒年六十三子杰黯焄烈儻寳元間夏賊破豐州圍府州及解去屯瑠璃堡縱游騎擾邊鄜府閉壘二年矣亢受命為并代都鈐轄麟府軍馬事至城下示以敕始開闗亢入命不復閉縱民庶出入時雖有禁卒數千皆畏怯無鬬志亢乃募役卒取敢戰者得數百人使擊賊有以首級獻者必厚賞之禁卒慙始請効死亢度其可用遂命擊瑠璃堡而破之士氣益振明年詔遣中使督亢護麟府郊賞物錢賊鈔略不得乃悉衆邀其歸路亢以三千敗賊數萬衆既而亢築建寜寨度賊必至虎翼軍驍勇賊人所畏而萬勝軍疲怯敵常易之故更去兩軍旗幟賊果出爭亟趨萬勝而先犯之不知乃虎翼也賊大潰斬首二千餘級不敢復出未踰月築成清塞百勝中候建寜鎮川五堡而麟府之路始通亢復奏以所通特一徑請更增竝邊諸柵以安河外議未下徙知瀛州復除并代副總管御史梁堅劾亢以庫金於成都市易奪官降為鈐轄夏人與北敵戰河外乃復副總管知代州范仲淹宣撫河東因奏使亢就總前議增築諸柵事經略使明鎬移文止之亢不聴不閲時諸寨成遂自劾違鎬節制朝廷不問蕃漢歸者數千戸嵗減戍卒萬人徙知瀛州言城小而人衆請廣其東南闗為緩急備安撫使夏竦惡其在陜西不附己遂沮止其後卒城之如亢議徙渭州陜西轉運使奏亢擅減三司郊賞物估值㑹竦入為樞密使遂奪亢防禦使御史宋禧又以市易事言奪引進使久之陜西轉運使言亢市易非自入始還將作監復防禦使遷客省使知環州坐與鄰守會境上經夕降曹州鈐轄亢輕財好施不拘小節宴賞過侈雖市易猶不能給然軍政嚴整所至有風力蕃漢多圖其像瞻祀之仁宗常語侍臣曰夏人陷豐州麟府之間震擾亢築堡寨以䕶民耕牧築城以包水泉又增大高陽城使民有以自保民思愛之不忘宜特贈亢遂州觀察使种世衡字仲平放兄元子也以放蔭授將作監主簿累遷太子中舍通判鄜州建言築青澗城其左可致河東粟其右可捍延安其北可圖銀夏詔從其議特換内殿崇班知城事積官東染院使環慶路鈐轄卒年六十一子詁謲詠諮諤記訢誼世衡在青澗城開營田二千頃又募商賈貸以緡錢使通貨賄人爭歸焉城初無水穿井百五十尺至石乃曰能屑石一畚者酬百錢居數日及泉民甚頼之知環州蕃部有牛家族奴訛者崛彊不出見郡官聞世衡至郡郊迎約詰朝往勞其族晨興雪三尺左右曰地險不可行世衡曰信不可失比至奴訛大驚率其族拜馬前因請内屬凡邊民有過則使之射四𤼵二中者釋其罪兩辭疑而不決者亦因射中否而與決之境内之人因多善射者臨邊數年積榖通貨撫養士卒能得死力在環慶病告中得范仲淹檄與蔣偕同築細腰城力疾奔命城成而卒羌酋相率朝夕臨之仍圖其像永以瞻慕劉滬字子濬保州人父文質任連州刺史子十六人渙滬有聞滬以父任為奉職積官内殿崇班知水洛城卒年四十八滬頗習書傳有智略韓琦范仲淹薦其才武擢閤門祇候常為瓦亭寨監押權靜邊寨又破穆寜生氐西南去略陽二百里中有城曰水洛川平土沃有水輪銀銅之利環城族帳多聚漢民之逋逃者曹瑋在秦州常經營久之未能得滬密使説其城主鐸厮那令内附㑹四路招討使鄭戩行邊滬遂召鐸厮那及戎落尊屬來獻結公水落露羅甘地乞冠帶為屬戸戩許之因令滬以兵往受地既而氐情中變滬深入無援獨以千人擊潰氐兵數萬其酋請服因盡驅𨽻麾下通秦渭路涇原帥尹洙檄令罷役不從益增版趣役召之屢亦不至洙令狄青械滬及董士亷付獄戩雖已罷四路而論奏不已朝廷遣魚周詢程戡相視乃復以滬訖役而任以城事城既成猶坐違帥臣命降一官首𤼵瘍卒水洛居人留葬而立廟城隅嵗時祀之有碑紀其事今存焉朝廷從蕃官等請嘗命其弟淳為水洛城兵馬監押張君平字士衡磁州人以父戰殁補三班差使黔州指揮使獠寇邊君平領兵設伏奪寨斬首百餘級遷三班奉職為施州監押積官至作坊使卒子造遜達君平有榦才明水利朝廷議河事必訪之守官汒口建言請審擇口地嵗省役渠工百餘萬雖役不嵗興而可免堙塞之患又請沿河令佐植榆柳萬株者書為課又請以時疏導宋陳宿亳蔡潁單滑州溝洫與畿内相接者以免水患令州縣官吏兼管句溝洫河道言皆施行孟元字善長洺州人少𨽻禁兵以挽彊補殿侍累擢至眉州防禦使卒年六十贈觀察使子防隨王則據貝州叛元為真定府路鈐轄領兵攻討被數十鎗又中飛石墜壕中既出益鋭更募敢死士由永濟渠穴地以進賊平進右騏驥使御史中丞郭勸言賞未當功擢普州刺史知滄州其民以鹽為生歉嵗商賈不行元度軍食之餘以榖易鹽民頼以濟元雖出行伍好讀書流輩鮮及馬懐徳字得之開封人父玉東頭供奉官常自言懐徳可試武藝補奉職累擢至步軍副都指揮使留後卒年五十六景祐二年懐徳為延州東路巡檢數以少擊衆徙青澗城監押入賊境焚二寨親射殺其酋狗兒廂主又率蕃漢兵焚蕩賊海滿申州茶山五十寨三百餘帳斬馘百餘級奪獲畜産萬計用范仲淹韓𤦺舉為閤門祇候知延州龐籍奏為東路巡檢使殄黑神厥堡等大寨又以兵數千敗賊四萬騎於僕射谷徙鄜延路東巡檢都監破賊青化押班吃當三寨殺擄其人物甚衆元昊納欵與國子博士高良夫㑹西人畫地是時用兵之久人民流散懐徳招輯有方經畧使梁適奏請推其法諸路詔從之許懐徳字師古開封人以父任為東西班殿侍累擢至寜逺軍節度使又歴保寜建雄兩鎮殿前都指揮使卒年八十四贈侍中諡榮毅子士平士宗士端士寜士勤士臻士演士先士溫初懐徳為鄜延路副總管賊以三萬騎圍永平寨止率勁兵千餘人突圍破之賊有出陣前據鞍慢罵者懐徳引弓射之應弦而斃未幾賊攻延州懐徳領兵間道出其不意左右奮擊賊遂解去其後以不赴援而失賊及理財産三被降徙慶厯間遂入總禁旅典司宿衞凡十四年以老乞身上未之許後復自言恐為御史所彈不得善罷上特詔有司為減嵗數懐徳雖老習軍旅之事然戰功所可見者一二而故事節度使移鎮加恩皆再表辭翰林學士歐陽脩以為慢朝廷詔以修章示懐徳雖悚息謝罪而終亦不復别進表上亦不加責隆平集卷十九
