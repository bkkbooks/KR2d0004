body:
  text: 隆平集卷十三宋曽鞏撰侍從張昭字潛夫河間人舊名昭遠避漢祖諱故去其下字十嵗誦書數十萬言及長經史罔不該洽仕後唐至中書舍人在周為兵部尚書建隆初遷吏部尚書未幾以本官致仕開寶末卒嶺南平太祖遣就家問獻俘之禮昭卧疾口占皆有所據當時服其博記昭所修有後唐莊宗實録及功臣列傳周祖實録續唐愍帝漢隱帝實録又撰漢六廟諡册樂章在晉為翰林學士日常與吕琦崔稅集唐義寧終天祐末史成書二百卷扈蒙字日用范陽人與從弟載皆以文學顯鄠杜間有道士魚又玄善知人常謂蒙曰君家兄弟當繼典誥命其後皆驗蒙仕周已居顯宋興亦入翰林為學士積官至工部尚書卒年九十二贈右僕射自張昭竇儀卒朝廷典故儀制皆蒙所裁定博洽長厚多笑雖侍上前亦不能自止陶穀字秀實邠州人北齊尚書令唐雍唐內史侍郎唐儉皆其遠祖姓因避晉祖諱而更為陶遂不復其舊父渙唐末仕至刺史為邠州帥楊崇本所害穀隨母育崇本家幼有俊才漢相李嵩竒之自單州判官擢為集賢校理未幾遂知制誥在周為翰林學士承旨宋興厯禮刑户部三尚書卒年六十八贈右僕射宋之南郊法物制度皆其所定博記美詞翰滑稽好大言佛老之書陰陽之學亦能詳究傾險巧詆為時論所薄其進緣李嵩嵩之及禍穀自謂有力焉周世宗召魚崇諒為學士未至穀譖以為顧望世宗遂令代其任世宗語趙上交多謁告穀乃及其受門生名園事而上交被黜若是者蓋不可遍録戚綸字仲言應天府楚丘人篤於古學喜談名教太平興國八年登進士第父同文字文約幼孤事祖母以孝聞從邑人楊懿受經懿隱居不仕而以女弟妻同文遇疾因託以家事同文為葬其三世之未葬者遭世喪亂亦不復仕聚徒講學相繼登科者五十六人踐臺閣者亦至十數尚信義喜賙人急所與交皆當世之名士楊徽之因使至郡多所酬唱及卒徽之及其門人追號曰堅素先生長子曰維仕至户部郎中綸其次子也大中祥符二年應天府言民有曹誠者即同文舊居廣舍百五十楹聚書千餘卷以延學者真宗嘉之賜名曰應天府書院命綸之子奉禮郎舜賓主之補試為府助教綸與兄維友愛甚至真宗初置龍圖閣待制首以任綸久之進樞密直學士大中祥符初祥文薦降歌誦日興綸恐流俗託朝廷嘉瑞事詐為闕靈木石之異幻惑愚衆如少君欒大者上疏亟論上嘉納之出知杭州發運使胡則李溥惡其修潔相與捃托徙揚徐青鄆州復為勸農使王遵誨李仲容所誣奏謂常訕朝廷降太常少卿分司卒年六十八徐鉉字鼎臣廣陵人十嵗能屬文與韓熙載齊名江東謂之韓徐仕李煜至吏部尚書歸朝屢遷至散騎常侍坐纍貶邠州行軍司馬卒年七十六鉉恬淡無矯偽不喜釋氏而好神怪有以此獻者多遂其所請布衣蒯亮事夸誕年逾九十鉉延至門下稽神録之事多亮之言也初自江南入使人報城陷太祖厲聲責之鉉對曰臣為江南大臣而其國滅亡此死有餘罪不必他問太祖歎曰忠臣也命坐賜豫甚厚鉉至京師見披毛褐者輒哂之邠州苦寒終不御毛褐冷氣致腹疾而卒李穆常使江南見鉉及其弟鍇文章曰二陸不能及也鍇死於江南鉉好李斯小篆尤得其妙𨽻書亦工尺牘為士大夫所得皆珍藏之有文集二十卷又有質論稽神録行於世常受詔與句中正重定説文楊徽之字仲猷建州蒲城人世尚武力父澄始業儒徽之少好學同邑有江文蔚善賦江為善詩皆延置客館未期遂與齊名聞廬山學舍盛即往肄業周顯德中登進士甲科建隆初監方城商稅因故人出使訪問謡俗徽之為言海內寧一宜崇儒術以厚風教太祖疑以訕黜為天興令蜀平徙峨眉令太宗嗣位召還纍擢至諌議大夫為張洎劉昌言所誣貶鎮安軍司馬真宗尹京驛召復舊官為開封府推官即位除工部侍郎兼祕書監遷樞密直學士翰林侍讀學士卒年八十無子一女適宋氏時外孫綬才十嵗特授太常寺太祝姪孫偃集皆同學究出身徽之清素重名教尚風義常言溫仲舒寇準以搏取貴位使後進趨競禮俗寖薄矣與石熙載李穆賈黃中為文義之友多識典故唐之士族人物悉能詳記尤工吟詠有集二十卷景祐二年詔以徽之先帝官僚特贈太子太師諡文莊王禹稱字元之濟州巨野人家世微賤九嵗能為歌詩州從事畢士安見而異之勉其勤業及長善屬文太平興國八年登進士第太宗聞其名召試相府擢詞館獻端拱針上深嘉納趙普尤器重之端拱二年廷試貢士詔使作歌援筆立就太宗謂侍臣曰此歌不踰月遍天下矣以左司諌知制誥駕幸瓊林苑召至御榻前顧問語宰相曰禹稱文章獨步當世其將大遇如此因抗疏為徐鉉雪誣貶商州團練副使久之復知制誥召入翰林為學士孝章皇后崩梓宫遷主第禹稱語賓客后常母儀天下當用舊典坐訕謗罷職知滁州真宗即位遷刑部郎中召知制誥咸平初求補外守本官知黃州卒年四十八初境內有二虎鬭其一死而食其半又羣雞夜鳴經月不止禹稱以其事聞上遣中貴人乘驛問勞且為禳醮詢日官云守土當其咎亟命遷蘄州力疾上道卒上聞訃嗟悼賜一子出身禹稱辭章敏贍喜談世事臧否人物以正道自持故屢被擯斥所與遊必儒雅稱奬後進如孫何丁謂遂名重一時有小畜集三十卷奏議十卷後集詩三卷田錫字表聖其先京兆人唐末遠祖徙蜀因居嘉州楊徽之在峨眉宋白在玉津延譽之遂有聲稱太平興國三年登進士第纍擢諌議大夫史館修撰知制誥卒年六十四贈工部侍郎有咸平集五十卷錫好學至老不倦以盡規獻替為已任耿介寡合恭敬好禮上疏皆焚其稿趙普作相有司受羣臣章疏必先白而後敢進錫上書於普以為失至公之體真宗即位錫因對言舊有御覽但記分門事類不若以經史子集為御覽三百六十卷日覽一卷經嵗而畢又取經史切要之言為御屏風十卷置御座側則治亂興亡之鑒常不忘矣上詔史館借以羣書乃先上御覽三十卷御屏風五卷其序御屏風之略曰湯之盤銘曰德日新又日新太公之金匱云武王欲造起居之戒乃銘於几杖曰安無忘危存無忘亡熟惟二者後必無凶墨子云堯舜禹湯書其事於竹帛琢之盤盂曰君子福大而愈懼爵隆而益恭遠察近視俯仰有則軒堂輿几皆有銘焉曰吾居民之上惴惴恐不及武王户席必有戒焉席之銘曰無行可悔户之銘曰名難得而易失唐黃門侍郎趙智為高宗誦孝經曰天子有諍臣七人雖無道不失其天下微臣敢以此言上獻憲宗採史漢三國以來經濟要事撰書十四篇曰前代君臣事迹書之六扇屏風置御座之右焉邢昺字叔明濟隂人太平興國初舉九經廷試日召升殿講易二卦又取其羣經發題太宗稱其精博擢上第纍擢至右諌議大夫國子祭酒咸平二年初置翰林侍讀學士首以授昺積官至禮部尚書卒年七十九贈左僕射國朝舊制非宗室將相無省疾臨喪禮惟昺與郭贄以恩舊上特臨問其疾為時之榮昺在東宫及內庭講孝經禮記者二論語十書十三易三詩左傳各一據經敷釋仍多引時事為喻世為農家尤悉民事上訪民間疾苦必俚語為證以專經進強為詩人多傳笑之孫何字漢公蔡州人幼嗜學為文必本經與丁謂同為王禹稱所題奬時謂之孫丁淳化三年舉進士殿試及省闈俱為第一纍擢起居舍人知制誥卒年四十四性卞急常任京西兩浙轉運使頗事苛察然獨喜稱譽後進有文集四十卷子言弟僅僅字鄰幾咸平初登進士第兄弟皆冠天下士學者榮之僅復舉賢良方正科入等纍擢知制誥集賢院學士給事中卒年四十九僅端懿無競篤於儒學士大夫髙其履尚有文集五十卷子和路振字時發唐相巖四世孫巖貶死嶺外其子孫避地湖湘遂為永州人振幼頴悟十嵗聽誦陰符經裁百言而止父使終業振曰百言演道足矣父異其對淳化中舉進士殿試卮言日出賦獨振知所出而文亦典贍遂登甲科纍擢知制誥詞命溫雅深愜物論卒年五十八振淳厚無臧否恂恂如也作詩有唐人風有文集二十卷子綸朱昂字舉之其先京兆人父葆光寓潭州遂家於衡山昻少好學有朱遵度者時謂之朱萬卷目昻曰小萬卷常遊廬陵遇術士謂昻曰中原當有真主矣君仕可至四品遂北遊江淮時周世宗南征韓令坤統兵揚州昻謁令坤陳治亂方略令坤器之以權知永正縣有政績令坤遂表授本縣令改衡州録事參軍知州李昉見其文深加歎賞既又為薛居正所知二人遂薦引之太宗朝擢知水部郎中直祕閣真宗即位除知制誥入翰林為學士屢表乞骸骨敦諭彌確乃授工部侍郎致仕仍令俟秋涼南還故相張齊賢而下皆賦詩贈行詔從臣祖於東門南省試貢士遂以為詩題弟協仕至主客郎中雍王府翊善亦告老而歸時以比之二疏陳堯咨知荆南表其居曰東西致政坊昻所得俸常以三之一購竒書於所居為二亭曰知止幽棲自稱曰退叟卒年八十二門人諡之曰靜裕先生詔録其孫適同學究出身昻方正恬淡十五年為洗馬不遷非公事不至兩府有文集三十卷宋白字素臣開封人十二善屬文建隆二年登進士第又舉拔萃科中髙等釋褐授著作佐郎賜襲衣犀帶求補外授嘉州玉津令久之從太宗征太原劉繼元降白獻平晉頌太宗奬諭還京遂除中書舍人賜金紫入翰林為學士至道初加承旨真宗即位擬陸贄榜子集以獻上察其意希大用遂命尹京無政事才不任劇乃自求罷以疾請老授兵部尚書致仕進吏部卒年七十七贈右僕射諡文安白之文頗事浮麗而理致或不工善諧謔不拘小節典貢舉得王禹稱田錫胡旦時謂之得人至他所取有納賂者伶人舉為戲言又髙年不能決退多致譏誚然能贍濟親族而恤其孤幼是亦其所長也杜鎬字文周世仕江南舉明經中選李煜任為集賢校理開寶末從煜歸朝太平興國初除崇文院檢討景德初置龍圖閣待制鎬與戚綸首預其選久之除閣學士積官至禮部侍郎卒年七十六子楃杞植椿初鎬應舉將就試有鼠銜孝經疏置榻前鎬怪之取以熟誦果試題出其中遂預選鎬博學善記問兄為法官有毁其父之畫像為近親所訟疑不能決鎬曰僧道毁天尊佛像似可比也兄從之衆服其審太宗將祀南郊彗星見趙普以問鎬對曰當祭而日蝕猶廢祭况彗乎普以白禮遂寢太祖問西漢賜豫多用黃金何近世不能也鎬曰當時佛事未興故耳真宗即位有司舉故事三月上已金明池習水戲上以太宗忌月問鎬鎬據唐憲宗朝奏議禮有忌日無忌月遂從之景德初駕自澶淵凱旋遇忌日疑軍中鼓吹馳騎問鎬鎬對曰武王載木主伐紂前歌後舞可據也上凡得古器異書必詢之皆能究其本末令人檢閲必某事在某書幾紙幾行未嘗少差鎬雖髙年四鼓起誦春秋遲明且數卷日以為常杞字偉長以鎬廕將作監主簿性豪邁遇事劇易奮然敢為慶厯四年廣西區希範誘白崖山酋豪蒙趕反自京西轉運使授杞刑部員外郎直集賢院為廣南西路轉運安撫使杞至宜州得州人吳香及獄囚區世宏往説諭之而勒兵攻破白崖黃泥丸居山等寨及其五洞斬首千餘級復環州焚其積聚蒙趕等大恐隨香出降獨希範走荔波洞杞曰蠻依險阻威不能制則恩不能招所以數叛今特以窮蹙而降若啖以利後必復動乃犒以牛酒而六百餘人悉誅之後三日得希範醢以賜諸溪洞御史梅摰言杞殺降為國失信上置而不問止戒諭之徙兩浙路明年徙河北路頃之擢天章閣待制知慶州蕃首孟香率千餘衆內附夏人以兵索香因劫邊户掠馬牛有詔責杞還之杞言彼違誓舉兵香不可與因移檄夏人不償所掠則香亦不可得既而兵亦解去未幾把卒杞博覽強記通陰陽術自推其數曰吾年四十九死矣卒如其言有奏議十二卷子劭杞之將死一日據厠若見蒙區希範叱之曰若狂僭叛命於法當誅尚敢來訴邪張詠字復之濮州人太平興國中登進士第纍擢至樞密直學士御史中丞禮部尚書卒年七十贈右僕射詠為文尚氣不事雕飾自號乖崖公有文集十卷知杭州遇嵗歉民私鬻鹽者輒寬之使獲安濟有與其姊壻訟家財者壻言婦翁疾篤子才三嵗遺書明言異日資産以十之三付子餘悉與壻詠曰汝婦翁智人也茍以七與子子死汝手矣知益州恩威並著其政令法度後人不能增損知升州州數遭火詠亷知民之不逞者為之懲以峻罰其患遂息少學擊劍頗得其妙兼通術數好為大言喜事竒節常有士人遊宦遠郡不能制其僕詠假以出郊趨深林斷其首而還詠卞急中嵗苦腦痬御下益峻不喜人拜有拜之則速拜不已或倨坐忿罵少以介潔稱晚節頗以營産侵刻失其故步种放字明逸京兆人父卒於長安放才七嵗能屬文與其母隱於終南山豹林谷結茅為廬博通經史士大夫多從之學得束修以養著蒙書十卷人多傳之淳化中詔起之其母恚曰常教汝勿講學今為人所知不復得安處我當棄汝入深山矣放遽辭疾不應召盡焚其筆硯轉居窮寂上亦不強致而命京兆府時存問之放常幅巾短褐攜琴酒坐盤石以自適豹林谷至州郭七十里徒步從樵夫往返不以為勞其學不喜釋氏常裂佛書以製幃帳著嗣禹説表孟子上下篇善為歌詩自稱退士作退士傳又號雲溪醉叟咸平中母卒詔賜錢助其葬不受廬墓終制張齊賢蒞長安表其節行詔召放即起賜對便殿授右司諌直昭文館賜居第什器大官食翌日又賜緋魚遂謁告還山間來朝覲其後又居嵩少數遣使問勞賜豫久之除起居舍人擢諌議大夫祀汾陰恩加工部侍郎一日召從學諸生飲曰與汝輩訣酒數行而卒終身不娶無子詔録其姪世雍同學究出身放在朝廷有所啓奏必據經義時無知者或譏其循默真宗乃以放議十三篇示輔臣曰放為朕言事甚衆但外廷不知耳其奏常焚稿故也上常欲大用之詔詢治道放固辭晚年日縱酒西祀頓盛飾輿服或以劵直親詬驛吏頗貽譏誚放在京師王嗣宗除京兆守屢造放不為禮嗣宗怒語及其進取放曰不猶愈於角力而中第者乎嗣宗試藝講武殿日常程力以冠甲科故放及之嗣宗深銜其言及主京兆又間乘醉慢罵嗣宗嗣宗因其弟姪強市田産興訟遣人詰責放又條上其不法事詔問狀會赦釋因别賜第嵩山命徙避嗣宗焉楊億字大年建州浦城人祖文逸常夢一羽衣自稱懷玉山人覺而億生有毛被體其長盈尺踰月始墮能言母口授以孝經隨即記誦六嵗學吟詩七嵗善屬文太宗聞之詔江南轉運使李去華以所試文同送赴闕繼三日賜對面試詩賦五篇援筆立成時才十一嵗上大嗟賞命內侍送至中書令賦詩一章宰臣等剡章稱賀詔授祕書省正字有進修不已砥礪彌堅越景絶塵一日千里之句既謝即求歸鄉里喪父服除從祖徽之知許州往依焉徽之間與語歎其學問該博曰興吾門在汝矣淳化中詣闕獻文命讀書祕閣召試賜進士出身久之除直集賢院徽之在襄即幕下書疏一以委億及真宗即位纍擢知制誥景德三年入翰林為學士母有疾謁告不俟報而行因以疾求解官授太常少卿分司疾愈知汝州會加玉皇聖號表請陪祠召為寶册參詳儀制副使久之遷工部侍郎知貢舉坐譴降祕書監母喪詔起復工部侍郎翰林學士卒年四十七子紘給俸終喪景祐元年樞密使王晦叔上億天禧四年代寇準草奏請皇太子親政斥丁謂等姦邪事準既逐億亦憂畏而卒仁宗嘉歎下詔褒顯之特贈禮部尚書賜諡曰文有司舉故事非常任二府及事東宫賜四品無贈官上曰億為國竭忠有君子之大節可拘以常典乎億初為光祿寺丞太宗賞花後苑召命賦詩座側對輔臣誦其警䇿句明年苑中曲宴億復獻詩上詔有司不時召對曰非貼職制不與立命除直院表求歸里中迎母特賜錢十五萬太宗知其貧故屢有霑賚時之公卿箋翰皆出其手在西掖有詔以吏部主事為大理評事億封還詔書同王欽若修册府元龜詔書局衆論取決於億修太宗實録八十卷億獨成五十六卷於厯代典章制度尤為該洽故朝廷議論必取正焉經傳子史百家之學罔不通貫為文敏贍起草細字一幅數千言不加點竄對客談笑揮毫無滯論治道談世務必稽古驗今究切利病厚風義重名教誘進後學樂道人善賢士大夫翕然宗之然評品人物黑白大分姦邪之所疾惡讒毁因以聞母病不俟報而行皆以為慢朝廷又有以詆時政之語達於上上愛之有素而又且力為開釋故僅免焉在翰林常以疾告上遣使挾太醫診視表謝上批紙尾賜詩有副豫前席待名賢之句其顧遇如此晚年留意釋典臨終有空頌一章其文有括蒼武夷潁陰韓城退居汝陽蓬山冠鼇內外制刀筆集共一百九十四卷又别出西崑酬唱虢郡文齋潁陰聨唱南陽釋苑等集又手録時人所作為儒苑時文録數千篇真宗常謂王旦億詞學無比後學多所法則如劉筠宋綬晏殊而下比比相繼文章有正元元和風格自億始也旦曰後進皆師慕億惟李宗諤久與之遊終不能得其鱗甲蓋李昉詞體弱不宗尚經典故也隆平集卷十三
