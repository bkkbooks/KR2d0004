body:
  text: 隆平集卷六宋曽鞏撰叅知政事劉熙古字義淳睢陽人唐僕射仁軌十一代孫少通經史避祖諱不應進士舉後唐長興中以三傳賜第太祖領宋州節制熙古為節度判官及受禪累擢至叅知政事求退授户部尚書致仕卒年七十四熙古好學明隂陽象緯書雖通顯自奉養若寒素有厯代紀要五十卷行於世子䝉叟竇偁字日章其先漁陽人父禹鈞在周為諌議大夫避亂徙居河南禹鈞五子儀儼僖偁侃皆有文學中進士第馮道嘗贈詩曰燕山竇十郎教子以義方靈椿一樹老丹桂五枝芳世多誦之儀字可象晋天福中登進士第在周為翰林及端明殿學士建隆初授禮部尚書翰林學士時御史臺議欲以左右僕射為表首太常禮院以東宫三師合為表首儀援典故以僕射合為表首者六而謂三師無所據朝廷以儀之議為定五代喪亂之間儀儼乃以文章學問自見於一時所謂豪傑之士也儼字望之建隆初終於禮部侍郎翰林學士儼博物洽聞通音律厯數宋興禮樂皆所裁定周世宗觀大水泗州記以問儼儼以為天地有五徳曰潤曰暵曰生曰成曰動五徳隂陽之使隂陽水火之本隂陽有常數水火有常分竒耦相半盈虛有凖謂之通正羡備過皇極無不至謂之咎證隂之始主於淵獻水之行紀於九六凡千七百二十有八嵗為浩浩之㑹雖堯舜在上不能免者數也若夫辟狂臣專乂昏不明苦雨數至不潤下乃政之所致非數也唐正元壬申之水是以徳宗闇蔽篤於自疲陸䞇盡忠而斥逺裴延齡專利而信用常雨之應夫豈虚生偁周廣順初登進士第其後同與賈琰在開封府晋王席下一日晋王燕射偁琰同預而琰贊美偁偁叱之曰賈氏子𨗳諛豈不自媿坐客皆失色王亦不樂因罷燕尋白太祖出之太平興國四年駕幸魏郡召偁至行在上方議北征偁抗疏極諌而止遂除樞宻直學士七年叅知政事入謝上曰汝何由至此偁曰陛下不忘藩邸之舊爾上曰乃賞汝面折賈琰也未㡬薨於位時明日燕羣臣以偁䘮故罷李穆字孟雍開封人與弟肅皆中進士第累擢知制誥中書舍人翰林學士太平興國八年叅知政事雍熙元年薨於位年五十七贈工部尚書太祖曰非斯人不幸乃朕之不幸也穆端謹自持言行無玷文學操履為上所知太祖嘗遣使江南諭朝㫖煜辭以疾穆曰朝與否惟自處之朝廷繁富兵甲精銳恐不易當爾太祖謂其所諭要切太平興國七年盧多遜竄朱崖穆以同門生罷制誥責司封員外郎明年殿試預考較上見其容貌謂曰憂畏所致耶穆流涕上為之動容詔盡復舊官命知開封事豪右屏迹權幸不敢干以私是冬遂大用上稱曰名臣也弟肅字恭叔仕至佐衛上將軍時以為有知人之鑒賈黄中字媧民滄州人唐相耽四世孫漢乾祐初年六嵗中神童選十六進士甲第建隆間判太常禮院累擢知制誥翰林學士淳化二年叅知政事四年罷除禮部侍郎兼秘書監卒年五十六贈禮部尚書上因念翰林無良醫詔天下并大臣各薦能醫者黄中在翰林嘗召詢時政對曰軄當書詔思不出位上益重其周慎知京朝官考課銓量平允掌吏部選品藻精當揀㧞寒俊號為無私性端重守家法多知臺閣故事朝廷典禮資以損益當時知名士皆出其門談論亹亹聽者忘倦特常憂畏而執政循嘿時論少之太宗嘗召見其母因謂侍臣曰朕念黄中終日憂畏必先其母老矣及黄中卒母果猶無恙賜白金仍官其三子王沔字楚望齊州人太平興國二年登進士第八年簽書樞宻院雍熙三年改副使端拱元年叅知政事淳化元年罷卒贈工部尚書沔辯慧苛刻尚數多詐視士大夫猶視吏卒惟以甘言悅人而進退皆非物望初與張齊賢同在樞府不協及齊賢同叅知政事頗不自安因王禹偁請中書本㕔不得接見賔客許於政事堂同見沔喜即奏行謝泌疏駁而止上知沔意因切責罷之沔冒貨雖親舊未嘗毫末相及唯聲音清暢上親試舉人多命近臣讀之所讀常得八九蘇易簡字太簡梓州人父協仕至光祿寺丞易簡弱冠舉進士甲科累擢知制誥翰林學士加承㫖淳化四年叅知政事與張洎不協為洎所攻至道元年張洎進而易簡罷未㡬卒年三十九贈禮部尚書易簡警悟初屬文未工及掌誥命能自刻勵在翰林多振舉故事太宗為飛白書院額曰玉堂及以詩賜以御書宋玉大言賦易簡因擬賦以獻曰皇帝以白龍牋書大言賦賜玉堂詞臣易簡御筆煌煌雄辭洋洋瓌瑋博達不可備詳詔易簡陞殿躬指其理且歎宋玉之竒怪也因伏而奏曰恨宋玉不得與陛下同時帝曰噫何代無人焉卿為朕繼之易簡拜手稽首曰聖人興兮告成功登崑崙兮展升中地為席兮饗祖宗天作籟兮調笙鏞日烏月兎耀文明也參旗井鉞嚴武衛也執北斗兮奠𤣥酒也削西華兮為石䃭也飛雲涌震騰㷈燔也刳鵬脂鯨代牲魚也迅雷三發山神呼也流電三激爟火舉也禮再獻兮淳風還君百拜兮三神歡四時一周兮萬八千年泰山融兮滄海乾圓蓋穴兮方輿穿君王夀兮無窮焉時殿上皆呼萬嵗太宗覽而嘉之賜手詔褒寵易簡嗜酒上嘗以詩戒之入直雖不敢飲在私第未嘗不醉子耆仕至直集賢院耆子舜欽舜欽字子美以父耆任太廟齋郎景祐元年登進士第因范仲淹薦除集賢校理監進奏院用故紙錢祠神召妓樂㑹賔客除名後二年得湖州長史卒年四十子泌液激初杜衍愛其才以女妻之衍在相位以直道自任言者因舜欽連及衍故衍遂罷政事舜欽慷慨有大志好學工文章廢居蘇州買水石作滄浪亭時見其志於歌詩又善書酣醉落筆人競収以為寳當時偉人如歐陽修輩皆相友善亦數嘗上書論時事張洎滁陽人李景開貢登進士第景徙豫章畱洎掌李煜記室累擢至清輝殿學士叅預機宻煜歸朝太祖責之曰汝教李煜不降又草蠟丸詔召上江救兵洎對曰臣所為也犬各吠非其主此特其一耳詞色不動釋之授太子中允太宗即位頗知其在江表讒毁善良潘佑之死與有力焉待詔尹熙古因對以為煜怒佑諌太直非洎譖也始晋擢厯中書舍人翰林學士與蘇易簡同在北扉易簡被遇獨厚仍先大用洎惡之力排易簡遂代叅知政事至道三年以疾求解軄為刑部侍郎捧詔嗚咽十餘日卒年六十四贈本曹尚書洎舊字師黯煜令改為偕仁王師圍金陵與樞宻使陳喬引符命勸勿降又云茍有不虞當先死社稷及城陷喬獨死焉洎語煜曰所以不死將有報也煜歸朝貧甚洎猶丏索之而怒其所與之薄煜子仲瑀死亦不弔始諂事㓂準準力推挽至大用及上眷準稍衰乃面奏準退有誹謗準不辨遂罷機務上有所著述必為文解釋其㫖以茍悅辛仲甫字之翰汾州人初從郭崇辟建隆初為右補闕累擢至給事中雍熙三年叅知政事淳化二年罷以太子少保致仕遷少傅卒贈太子太保子若冲若愚仲甫器局沈厚數按詔獄多伸雪非辜嘗知彭州課種栁䕃行路郡人謂之補闕栁奉使契丹北主問党進何如人仲甫曰國家異人間出党進何足言也知益州政尚寛簡民有去思及大用自守而已李至字言㡬真定人初為内臣李知審養子太平興國初登進士第甲科累擢知制誥翰林學士太平興國八年叅知政事以目疾五表求罷不許雍熈三年以禮部侍郎罷疾愈令復舊任懇辭遷吏部祕書監真宗升儲為左丞與李沆並兼太子賔客即位並叅知政事踰年除武勝軍節度使判西京卒年五十五贈侍中子惟允惟則初至執政太宗於禁中造閣藏四庫書數萬卷御書飛白題額製贊親書刻石召近臣縱觀駕臨幸至因薦潘慎修舒雅杜鎬吳淑入充直館校理又請購逸書命羣官校正時賜上尊酒大官珍膳令召館閣燕集賜詩間奉新書奏御必便坐延見恩顧甚厚久之兼判國子監又薦杜鎬崔偓佺輩充軄西面請直講孫奭重校五經孜孜忘倦或謂至既貴盡逐知審養子而取其所積似與其辭位不受俸之行相反是豈或然孫奭字宗古即疏孟子者李昌齡字天錫應天府人太平興國二年登進士第累擢樞宻直學士御史中丞至道二年叅知政事真宗即位為户部侍郎坐交結中人貶許州行軍司馬昌齡嘗知廣州無亷譽及起廢御史屢彈其宿負除知梓州改河陽又改光州以秘書監致仕卒年六十二子虞卿趙昌言字仲謨汾州人太平興國二年登進士第雍熙三年知天雄軍曹彬岐溝之敗昌言請誅之詔褒答除御史中丞駕幸金明池召與焉時河北用兵樞宻副使張宏循嘿即除昌言諌議大夫樞宻副使以宏代為中丞坐胡旦翟馬周事責久之淳化四年叅知政事蜀王小波李順之亂命昌言為招安使既行或言其無嗣鼻折山根恐握兵難制即詔知鳯翔府蜀平改户部侍郎罷政事咸平三年復為御史中丞坐獄失實又貶既而起知鄂孟天雄河南真定從封泰山卒年六十五贈吏部尚書子慶嗣凡三蒞天雄初豪家有峙蒭茭者時誘姦人穴隄昌言㢘知一日隄吏告急亟取豪家所積給用自是遂絶其弊淳化中京城大水請出廐馬外牧或云以馬備胡不可闕昌言謂塞下積水胡必不至從之果如所料嘗薦李沆有公輔之量又以女妻王旦二人皆賢相也昌言臨事果斷無所顧避雖屢擯斥不少抑損惟對僚吏倨慢時論少之王化基字永圖真定人太平興國二年登進士第累遷至左拾遺抗疏自薦太宗曰化基自結人主誠可賞也召試知制誥明年除御史中丞嘗夣物一奩啓皆小栢樹俄有是命上澄清畧十事知樞宻院柴禹錫僕受人金叅知政事陳恕諭令及禹錫而禹錫實不知一日引囚詣便殿上頗怒化基降殿令囚袒以見其箠掠且遍曰豈有受此而隠情不言太宗益以為長者久之出知杭州至道三年叅知政事咸平四年罷守工部尚書進禮部卒年六十七贈左僕射化基不䕃補子弟其子舉正舉元皆進士及第善筆札有文集三十卷嘗作南行詩百韻好事多傳誦之知杭州書記張賀頗傲忽之太宗知而面詢化基苐薦其才語不及它居官俸多施及親舊王舉正字伯中㓜重厚嗜學寡言化基以為類已尤器愛之以化基遺恩補授校書郎大中祥符八年登進士第仁宗即位累擢知制誥妻父陳堯佐為相換龍圖閣待制堯佐罷復知制誥又為翰林學士康定三年叅知政事御史臺舉其女壻李徽之為御史舉正以親嫌格不行徽之訟舉正内不能制其悍妻不可以謀國事慶歴三年罷為資政殿學士知許州皇祐元年除御史中丞遷觀文殿學士禮部尚書兼翰林侍讀學士在經筵二年以太子太傅致仕卒年七十贈太子太保諡文簡有文集三十卷中書制書集十卷子誨說初舉正除執政入謝上曰卿未嘗干朝廷以私故不次用卿時陜西用兵吕夷簡以宰相判樞宻院舉正曰判名太重不可不避也乃改兼樞宻使張堯佐授淮康軍節度使宣徽使羣牧使景靈宫使舉正任中執法言堯佐庸人緣妃家一日領四使賢士大夫無所勸不報因退朝留百官班廷議上聞而遣中使諭止之尋罷堯佐宣徽景靈二使居半年復除宣徽使舉正家居七上疏論之又言河北朝廷之根本雄州河北之喉咽先朝用何承矩累年止遷刺史李元則㡬二十年亦不過引進使今使用未盡得人而尅日待遷何以懋有功者又言在許州應天府六年更轉運使十六人數易如此豈能究宣朝廷恵澤乎除狄青樞宻使力爭不能奪固請解言軄上稱其風憲之體賜白金三百兩侍讀每及前代治亂之際必再三以達諷諭之意郭䞇字仲儀開封人應進士為開封首薦太宗任京尹得侍讀藩邸即位擢著作佐郎七年四遷至叅知政事太平興國八年晨朝被酒責授祕書少監稍復積至禮部尚書卒年七十六贈左僕射䞇長者喜延譽後進宋白趙昌言輩皆所薦也嘗對太宗曰臣受遇不次惟以愚直上報上曰愚直何益曰猶勝姦邪爾晩節頗以治生為物論所惜子昭度昭升昭用温仲舒字秉陽河南人太平興國三年登進士第嘗擯廢久之因言稱㫖進用累擢諫議大夫淳化二年樞宻副使改同知院四年罷至道二年叅知政事咸平初罷久之兼御史中丞以户部尚書判昭文館卒年六十七贈左僕射仲舒有應用才屢與㓂準同進謂之温㓂始廢黜吕蒙正當路力援進之及驟用反攻蒙正為士論所薄陳彭年字永年建昌軍人㓜好學母惟一子愛之禁其夜誦書彭年置燈宻室晝夜忘倦嘗師事徐鉉為文喜嘲誚為宋白所惡白知貢舉屢加黜落雍熈三年始登進士第累擢至翰林學士大中祥符九年叅知政事天禧元年卒於位年五十七贈左僕射子佺期孫彦先大中祥符間朝廷典禮無不叅預凡儀制沿革刑名之學皆所常練雖談笑間屬辭不費當時制度雖前世所未有必推引依據以成就之時政大小日有諮訪應答該辯一無凝滯上之眷遇尤厚加以慎宻外無知者資性敏給博聞强記應舉時京城賜酺與同學出逰自東華門搆思至闕前已成一賦其後雖出通顯奉養無異貧約時所得俸唯市書籍㓜而篤學老亦不倦左右給使之人有彌年不知其姓名者所著文集百卷唐記四十卷趙安仁字樂道河南人生而穎悟十三嵗通經傳雍熈初登進士第累擢知制誥翰林學士景徳三年叅知政事大中祥符五年罷知禮儀院兼宗正卿改御史中丞宗正如故積官至尚書右丞卒年六十贈吏部尚書諡文定子温瑜良規承裕以遺恩各遷官安仁七子各授以一經居宗族以雍睦稱雖家人未嘗見其喜愠操履純正外晦内明畏慎謙退無事浮飾有所獻納退必焚槀致身貴顯無改儉素尤練達典故近世衣冠人物制度悉能記之在翰林從幸澶淵北戎請和令學士各進答書上獨用安仁所撰亦以其能備記太祖朝書問規式因獲預聞通貨之議北使至首命安仁接伴其覲見儀制皆所裁定敏於酬酢仍切事機時論以為得體在宗正請依唐故事置修玉牒官奏以劉筠楊億夏竦宋綬為之又為仙源積慶圖皆統類精簡善議論好誨誘後生學士大夫以清徳宗之有同學宋元與者篤學而早卒安仁力賙其後裔任中正字慶之曹州人雍熙初登進士第厯外官多效翰林學士錢若水嘗薦其才累擢至樞宻直學士知益州并州開封府大中祥符九年樞宻副使改同知院又復為副使天禧四年叅知政事兼太子賔客仁宗即位為兵部尚書與丁謂善謂敗力營救之謂竄降中正太子賔客知鄆州復禮部尚書丁母憂哀毁過以疾卒年六十六贈左僕射諡康懿中正以孝行稱於鄉黨事親盡敬衣服簡質而飲食極於豐美子易弟中師任中師字祖聖大中祥符二年登進士第累擢至右諌議大夫加集賢院學士龍圖閣直學士樞宻直學士任布守河陽數上書論塞下事稱㫖上欲用之吕夷簡素知中師上前數稱中師才不在布下慶厯初遂並召為樞宻副使求補郡三年以禮部侍郎資政殿學士知永興軍徙陳州請曹州踰年遂請老以太子少傅致仕卒年七十七贈太子少保諡安惠初益州稅及薪芻蔬果之屬中師知州奏盡蠲之性樂易家財素封雖處通顯自奉甚約其踐厯與中正多同上數賜飛白書歸休於里中建御書閣鄉人榮之子昱拱之魯宗道字貫之亳州人少孤苦學嘗袖所為文謁戚綸綸器賞之咸平二年登進士第徧厯州縣天禧元年詔兩省置諫官六員不兼他軄考所言以為殿㝡宗道與劉曄同選擢為正言仁宗升儲除户部員外郎兼右諭徳踰年改正左諭徳及即位遷户部郎中龍圖閣直學士兼侍讀詔與吕夷簡按視雷允恭擅移山陵皇堂事還是年叅知政事天聖七年薨於位年六十四贈兵部尚書諡肅簡時太常禮院言禮無廢朝特輟視朝一日宗道質直遇事敢言不為勢所屈為諭徳時真宗一日遣中人詔之至其家俟之久方從酒家還使者曰即上訝遲將何以對宗道曰第直言之及宗道見帝詢其所之對曰有鄉人来貧乏桮盤就酒家飲之也帝善其無隠而知其可大用初為秀州海鹽縣令疏治東南舊港口導海水至邑下人以為利號魯公浦在諫垣時諫章由閤門始得進而罕嘗賜對宗道請得面論而上奏通進司自是為故事因言守宰與民至近而未見有區别能否豈朝廷所以為民之意今除一知州補一縣令雖甚庸暗有司無敢擯斥舉天下親民之官黷貨害政十常二三介然自守孳孳政事殆未易得尚何裕民美化之可冀乎昔漢宣帝除刺史守相必親見而考察之今命知州通判知縣雖未暇親見宜令中書詢以言而察其應對設以事而問其施為才與不才得以進退縣令則命流内銓倣此施行庶㡬得良守宰助宣聖化真宗嘉納之宗道在選調久頗患銓格繁宻而曲知銓吏之姦弊判吏部流内銓多釐格之凡科條闕者悉掲示廡下人以為便七年居政府裁抑僥倖不肯以名器私人時樞宻使曹利用有所憑恃肆為驕横宗道屢折之於上前凡貴戚近習莫不歛迹子有功有立有開按親民之官天子親見考察法始於漢而宗道繼請於宋至患銓格繁宻釐革姦弊掲示科條慎重名器皆古今要務魯公真經濟才也隆平集卷六
