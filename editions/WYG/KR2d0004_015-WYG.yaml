body:
  text: 隆平集卷十五宋曾鞏撰儒學行義尹洙字師魯河南人天聖二年登進士第積官至右司諫進起居舍人直龍圖閣知潞州貶崇信軍節度副使徙監均州酒税卒年四十七子朴構兄源字子漸亦以文學知名終太常博士洙博學有識度遇事無難易勇於敢為人有疑難不能自决者造問焉洙為指畫講説皆釋然而去通六經尤深於春秋自五代之弊氣格不振宋興栁開始為古文而辭語猶事隠奥至天聖初洙與穆修始興起之繼而作者遂髙出近世矣有文集二十七卷初洙集賢院上疏曰漢文帝盛徳之主賈誼論當時事勢猶云可為慟哭孝武帝外制四夷以强主威徐樂嚴安亦以陳勝亡秦六卿簒晉為戒二帝不惡危亂滅亡之語故子孫保有天下者十餘世秦二世時闗東盗起或以反者聞二世怒下吏或曰逐捕令盡不足憂乃悦隋煬帝時四方兵興左右近臣皆隠賊數不以實聞或言賊多者輙被詰二帝以危亂滅亡為諱故秦隋之宗社數年而為丘墟矣陛下視今日天下之治孰與漢文威制四夷孰與漢武國家基本仁德陛下慈孝愛民誠萬萬於秦隋至於西有不臣之冦北有强大之鄰非特閭巷盗賊之勢也自西夏叛命四年並塞苦數擾内地疲逺輸兵乆於外而休息無期卒有乗弊而起兵法所謂雖有智者不能善其後當此之時陛下當夙夜憂懼所以慮事變而塞禍源也陛下延訪邉事容納直言前世人主勤勞寛大未有能逺過者然未聞以宗廟為憂危亡為懼此臣所以感憤於邑而不已也何者今命令數更恩寵過濫賜予不節惟此三者戒之慎之在陛下所行耳非有難動之勢也而因循不革弊壊日甚臣是以謂陛下未以宗廟為憂危亡為懼者此也夫命令者人君所以垂信於下異時民聞朝廷降一命令皆竦觀之今則不然相與竊語以為不乆當更既而信然此命令日輕於下也命令輕則朝廷不尊矣又聞羣臣有獻忠謀者陛下始甚聴焉後復一人沮之則意移矣忠言者以信之不能終頗自詘其謀以為無益此命令數更之弊也夫爵賞者陛下所持之柄也近時外戚内臣以及士人或因緣以求恩澤従中而降謂之内降臣聞唐氏衰政或母后專制或妃主擅朝樹恩私黨名為斜封今陛下威柄自出外戚内臣賢而才者當與大臣公議而進之何必襲斜封之弊哉使大臣従之則壊陛下綱紀不従則沮陛下德音壊綱紀忠臣所不忍為沮德音則威柄輕於上且盡公不私朝廷所以責大臣今乃自以私暱撓之而欲責大臣之不私難矣此恩寵過濫之弊也夫賜予者國家所以勸功也比年以来嬪御及伶官太醫之属賜予過厚民間傳言内帑金帛皆祖宗累朝所積陛下用之不甚愛惜今之所存無幾疎逺之人誠不能知内府豐匱之數但見取於民者日滋即知畜於公者不厚臣亦知國家自西方宿兵用度寖廣帑藏之積未必悉為賜予所費然下民不可家至而户曉獨見陛下行事感動爾往歲聞邊將王珪以力戰獲名馬金帛之賞則無不悦服或見優人所得之過則往往憤歎人情不可不察此賜予不節之弊也臣所論三事人皆共知近臣従諛而不言以至今日方今非獨夷狄之為患朝政日弊而陛下不寤人心日危而陛下不知故臣願先正於内以正於外然後忠謀漸進綱紀漸舉國用漸足士心漸奮邉境之患非所患也惟深察秦隋惡聞忠言所以亡逺法漢帝不諱危亂所以存日新盛德與民更始則天下幸甚上嘉納之任福之敗當時言者謂隨軍耿傅督戰太急後得傅書乃戒福持重洙以傅文吏無軍責而死行陣被誣作憫忠辨誣二篇初劉平等戰殁朝廷以夏竦為安撫經略使范仲淹韓𤦺副之更以洙為判官詔議攻守計乃具二䇿令𤦺與洙詣闕奏之上命用攻䇿遂趨延州謀出兵而仲淹持不可還至慶州㑹任福已敗於好水川洙因發慶州部将鋭卒數千赴援而賊已引去夏竦奏洙擅發兵降通判濠州及知渭州鄭戩為陕西四路都總管遣劉滬董士㢘城水洛洙奏罷之時鄭戩已解四路而奏滬等督役如故洙屢召滬等不至遣人代之亦拒命洙乃諭狄青械以下吏戩論奏不已徙洙慶州又徙晉州卒城水洛滬等違洙命猶奪官乃知潞州士㢘詣闕訟之命御史劉湜就鞠無罪乃以假公用錢與部將孫用又以為嘗自貸遂及貶斥天下莫不以為湜文致之也乆之上貰其無罪特賜一子官江休復字鄰幾雍丘人天聖二年登進士第又舉書判㧞萃中選因獻所著書特除集賢校理赴進奏院祠神㑹落職乆之復舊擢修起居注積官刑部郎中卒年五十六休復外簡曠而内行甚飭事孀姑如母强學愽覽為文典雅尢工於詩喜琴奕飲酒不慕聲利著唐鑒十五卷春秋世論三十卷文集三十卷又作神告一篇言皇嗣事以感悟上意又常言昭憲太后家子孫多流落民間者因得盡加收録子懋簡懋相懋迪周堯卿字子餘初名奭今名及字夢人授之也其先汝隂人五世祖曜文唐道州刺史乾寜中劉建峯將馬霸圖割據湖外仕者畱不敢去子孫因家焉既又徙居荆州之南堯卿警悟强記七嵗善賦詩弱冠以學行知名天聖二年登進士第積官至太常博士通判饒州卒年五十三子諭詵諡諷説諲誼有文集二十卷詩春秋説各三十卷堯卿十二䘮父憂戚如成人見母氏則抑情忍哀不欲傷其意母異之謂族人曰是兒愛我如此多知孝養我矣卒能孝飬志如母之言其於昆弟尤篤友愛執母䘮倚廬三年席薪枕塊雖疾病不飲酒食肉或勉之以禮曰禮老病不止酒肉意或不勝䘮耳病且未老忍及此耶葬之先期躬自負土有告之曰古之貧無以葬者或然今子何自苦泫然流涕曰過是雖欲竭力復可得乎既葬慈烏百數銜土集壠上人莫不駭矚以為孝感所致堯卿為人簡重不校有慢已者必厚為禮以媿之居官禄雖薄賙宗族朋友罄而後已所至稱治民有去思嘗知汀州寧化縣提㸃刑獄楊紘入境㣲伺刺史善否有被刑而耘苖者紘就詢其故對曰貧以利故為人直其枉令不可欺而我欺之我又何怨紘至邑不復他察第以所聞薦之慶厯間范仲淹舉經行可為師表未及用而卒堯卿之學不惑傳註問辨思索以通為期其學詩以孔子所謂詩三百一言以蔽之曰思無邪孟子所謂説詩者以意逆志是謂得之考經指歸而見毛鄭之得失曰毛之傳欲簡或寡於義理非一言以蔽之者也箋欲詳或逺於情性非以意逆志者也是可以無去取乎其學春秋曰左氏記之詳得經之所以書者至三代之異同均有所不取曰聖人之意豈二致邪讀荘周孟軻氏之書曰周善言理未至於窮理窮理則好惡不謬於聖人孟軻是已孟善言性未至於盡已之性能盡已之性則能盡物之性而與天地参其惟聖人乎天何言哉性與天道子貢所以不可得而聞也昔宰我子貢善為説辭冉牛閔子顔淵善言德行孔子曰我於辭命則不能也帷不言故曰不能而已盖言生於不足者也其講解議論類皆若是或有以堯卿居䘮比馮元者孫復聞之曰元動息求之於禮其哀思未數數能也堯卿先盡其哀而情不逺於禮其可同日語哉故歐陽修以文表其墓曰若周君者事生盡孝居䘮盡哀而以禮者也禮之失久矣䘮禮尤廢也孔子在魯而魯人不能行三年之䘮其弟子疑以為問則非魯而他國可知也孔子殁其後世又可知也又曰君學長於毛鄭詩左氏春秋修之辭其略見於此孫復字明復晉州人少舉進士不中第退居泰山學春秋著尊王發㣲自石介而下皆師事之年四十未娶李迪以其弟之子妻之慶厯中范仲淹富弼言復有經術宜在朝廷除校書郎國子監直講駕幸大學面賜五品服嘗賜對邇英閣説詩上欲以為侍講而楊安國言其講説多異先儒遂寢累遷至殿中丞卒年六十六賜其家錢十萬復治春秋不取傳註其言簡而易詳明諸侯大夫功罪以考時之盛衰而推見治亂之迹故得經之意為多既病樞密使韓琦始言於上選吏給紙筆命其門人祖無擇即其家得書十有五篇録藏祕閣而特官其子慶厯七年索徐州狂人孔直温家嘗有遺復詩稿坐貶乆之翰林學士趙槩等十餘人言復經為人師始還舊職終不獲遷也石延年字曼卿幽州人其祖始舉族自契丹來卜居南京之宋城延年應進士累舉不中第賜三班奉職耻不就張知白素竒之謂曰母老且擇禄耶延年不得已而就後以右班殿直換太常寺太祝知濟州金郷縣有治效用薦授通判永寜軍徙永静軍除館閣校勘寳元二年遷祕閣校理積官太子中允卒年四十八天章閣待制吳遵路常與延年同使河東料揀民兵及卒遵路為言朝廷特賜其子濟太廟齋郎延年寳元間嘗上書言天下不識戰鬬三十餘年請為二邉備不報及元昊反上思其言故命使河東凡得兵數十萬還賜五品服時邉将遂欲以郷兵捍賊延年笑曰此得吾粗也夫不教之兵勇怯相雜若怯者見敵而動則勇者亦牽而潰矣今雖未暇教募其敢行者則人人皆勝兵也又嘗請募人説唃厮囉及回鶻舉兵攻元昊上亦嘉納之延年喜劇飲頗自放若世務不能攖者然與人論天下事是非曲當善書工於詩有集行於世張唐卿字希元青州人有辭學履行景祐元年登進士甲科通判陕州民母再適人而死及葬其子盗以歸與父同葬有司請論如法唐卿權郡事曰是知有孝不知有法耳釋之而聞於上聞者莫不嘉之以父憂毁瘠嘔血而卒年二十八無子石介字守道兖州人先世農家父丙始仕至太常博士介天聖八年登進士第乆之為國子監直講以杜衍薦改太子中允韓𤦺除直集賢院出通判濮州卒年四十一初介自嘉州軍事判官丁父母憂躬耕徂徠山葬五世之未葬者七十䘮魯人謂之徂徕先生介篤學氣節勁正嘗謂時無不可為不在其位則行其言言見用利天下不必出諸已言不用獲禍至死而不悔故其文章陳古今治亂成敗以指切當世無所諱忌在太學教諸生聞朝廷美政則歌誦之否則刺譏之宰相吕夷簡以疾罷而杜衍代夏竦樞密使范仲淹富弼韓琦樞密副使歐陽修余靖蔡襄為諫官介曰此盛事也歌誦吾職其可已乎乃作慶厯四德詩分别邪正專斥夏竦泰山孫復謂之曰子禍始於此矣其後徐州孔直温有逆謀搜其家得介書而或謂介詐死投契丹矣夏竦請發其棺驗視又有請覊管其子弟乆之始釋歐陽修作詩以悼之胡瑗字翼之泰州人累舉進士不中景祐中求知音者白衣召至京師與李照阮逸定樂除秘書郎范仲淹帥延州辟丹州推官自湖州掌學入為諸王宫教授以疾致仕嘉祐初為太子中允天章閣侍讀復以疾授太常博士致仕卒年六十七子元康朝廷再起瑗以議大樂樂成多變古法其樂制以一黍之廣為分以制尺其律經三分四釐六毫四絲其圍十分三釐九毫二絲其聲比舊樂下半律又鐘磬大小一以黄鍾為率而鐘之狀類鐸既而議者多非之後卒不用瑗通經術教人有法在湖州門生去來常數百人慶厯中興太學有司請下湖州取其規矩為太學法皇祐中起議樂因除國子監直講而従其學者益衆成材而備朝廷噐使葢不可勝計劉顔字子望徐州人大中祥符元年登進士第初知汝州龍興縣坐殺已就執之盗免官遂居鄉里以著書自適従學者常數十百人名聞東州乃採摭兩漢至五代名臣奏對有補于時者為輔弼名對四十卷馮元及錢易滕渉蔡齊為上之且言顔經行淳備乃以補任城縣主簿李廸知兖青二州皆辟為従事卒年五十一子庠所著有儒術通要經濟樞言石介見其文歎曰恨不得在弟子之列王回字深甫福州侯官人嘗舉進士中第補衛真縣主簿議邑事不合移疾自免乆之大臣薦之朝廷授以一邑命下而卒年四十二有集二十卷弟向亦以文學知名善序事亦早卒回孝友質直博學知要與臨川王安石友善安石謂回造次必稽孔子孟軻所為而不為小㢘曲謹以求名於世其學問所得自漢以來列儒林者罕及也劉羲叟字仲叟澤州人舉進士不中第歐陽修使河東薦其學術擢試大理評事留為唐書律厯天文五行志編修官書成授崇文院檢討未謝卒羲叟通經史百家之學國朝典故財賦刑名兵械鍾律皆所究知星厯數術尢得其要嘗以春秋洪範變異休咎著書十數篇斥古人所强合者其占日月星辰無或不驗皇祐五年日蝕心是時朝廷制樂鐘聲太鬱而不發又陕西錢法大弊羲叟曰此所謂害金再興與周景王同占也上將感心腹之疾乎其後月入太㣲曰宫中當有䘮而張貴妃薨至和初四月日蝕客星出於昴曰契丹主且死矣其言無差所著有十三代史志劉氏輯厯春秋災異南北史韶韻目徐復字復之建州人常逰京師舉進士不中第退而學易通流衍卦氣之法自筮無禄故不復進取逰淮浙間數年凡天文地理遁甲占射諸家之説讀之必得其㫖因聴其郷人林鴻範説詩之所以用於樂者忽若有得遂舉噐求樂之本而曉然知律吕㣲妙動作之制時胡瑗作鐘磬大變古法復笑曰聖人寓噐以聲今不先求其聲而更其噐是可用耶卒如其言慶厯初范仲淹過潤州問復以衍卦占之今夷狄無動乎復為占西邉用兵日月無少差其後與郭京同被召賜對問以天時人事復據京房易卦推今年所配年月日時當小過剛失位而不中宜在彊君德仁宗又問明年主何卦復對曰乾卦用事説至九五而止又問前年京師黑風其咎安在對曰其兆在内應豫王之䘮乎明日特除大理評事復固辭乃賜號冲晦處士授其子發校書郎復履尚髙潔徙居杭州十餘年卒年八十京好言兵范仲淹滕宗諒數薦之故與復同召焉髙懌字文悦髙祖季興唐末徙荆南之地子孫因家焉懌少孤養於民十三嵗能属文通經史聞种放隠終南山懌亦築室豹林谷放見而竒之與張蕘許勃號南山三友詔舉沉淪草澤寇凖薦不起景祐中朝廷録國初侯王後懌推其弟忻得一官范雍京兆建學召懌授諸生經従之者數百人康定中杜衍請賜以處士號上特除大理評事固辭上嘉其守改賜安素處士文彦博又薦其經行先嘗賜良田五頃矣至是復賜第一區既又除光祿寺丞懇辭不拜卒年七十一子嗣復有少㣲諸宫集續東臯子兵源掛冠録烟霞志凡數十卷懌喜讀書為文有法而詩清淡有古風論唐以來至宋衣冠氏族人物皆見其本末考之載籍不謬嘗夢白衣持素書目為白鹿洞主因作詩識之二十年晝寢復夢之其夕卒葬白鹿郷林逋字君復杭州人祖克已為錢氏通儒院學士逋少孤嗜學景德中逰江淮歸結廬杭州之孤山真宗聞其名屢賜束帛命州縣嵗時問勞居西湖二十年不入城市卒年六十一臨終有詩云湖上青山對結廬亭前修竹亦蕭疎茂陵他日求遺草猶喜曽無封禪書逋不娶無子教其兄之子宥登進士第逋少常逰臨江軍李諮始舉進士未有知者逋謂人曰此公輔之噐也逋之卒諮時知杭州為制緦麻服與其門人哭而葬之刻臨終一絶納壙中既而仁宗賜諡曰和靖先生仍賜其家帛五十疋米五十石逋善行書喜為詩其語孤峭清淡其稿未嘗自録或曰何不録以傳後世乎逋笑曰吾猶不欲以詩取名于林泉况後世耶代淵字仲顔永康軍人天聖二年登進士第累遷至太常丞知益州田况表其所著周易㫖要二十卷朝廷特授祠部員外郎而卒淵恬於勢利退居青城山二十餘年以著書自適仕進非所樂也慶厯初知制誥王拱辰安撫西川遺書欲起之托疾不往見趙師旦字潛叔單州武城人以叔稹䕃補累官至右贊善大夫知康州曺覲建州人故贈諫議大夫修古之姪修古無子以覲為嗣而䕃以官累遷至太子中舍知封州孔宗旦兖州人為邕州司户恭軍儂智髙潛聚衆溪峒時州有白氣起庭中江水溢宗旦以為兵象度智髙必反以書告知州陳拱不聴皇祐四年遂舉兵宼邕横貴龔封藤梧康端等州賊之未至曹覲以州無兵備遂募敢死士五百人以守城而鄰城已為避賊計遂紿以書曰賊止期得邕貴而已豈肯離巢穴逺來耶慎勿張皇驚擾也覲以為然乃縦所募去而賊至又勸使之走覲叱之曰先諌議以忠義自持吾豈茍生而貽辱先人者耶俾妻子逃匿民間自佩郡印與兵馬監押陳􅁮率州兵百餘人禦賊力不勝遂為賊所執同郡胥及二卒命人錮守之胥欲與俱亡不可遂授二卒印使懐去不食三日賊諭欲用之覲叱曰犬彘敢爾耶遂遇害投屍水中趙師旦亦嘗先遣人覘賊還報曰諸州長吏皆棄城去矣師旦曰汝亦欲吾去耶乃索得諜者三人斬以徇而賊將及城下因語妻子曰畱此俱死無益也付以郡印令避難山谷間明日賊大至州兵止三百人師旦與兵馬監押馬貴力戰矢盡還坐堂上智髙擁衆入師旦罵曰朝廷負若耶大兵且至戮汝無遺類智髙怒并貴害之始賊既破横州宗旦遣其家属依桂州曰吾有官守不得去無為俱死也及州破宗旦被執賊有用之之意宗旦慢罵不已以及於禍宗旦嘗宦京東頗為監司耳目摧辱士人為衆所惡臨難乃能立節如此祖無擇以其事聞於朝而䘏典頗厚趙師旦之妻生子數日而避賊棄之草中三日猶不死復取而育之曹覲死其妻及幼子聞而死封康二州民為二守立廟嵗時祀之朝廷贈趙師旦光禄卿賜其母長安縣太君冠帔錄其弟師陟為大理寺丞子覲右侍禁従子覿試將作監主簿贈曹覲太常少卿録其弟現為建安縣主簿四子皆賜官長者為太常寺奉禮郎終䘮年未應格諫官唐介言於上特命與差遣仍見闕修古妻陳氏陳乞現三注建州官以便其私慶厯間耿傅叅任福軍事死於好水川其忠義當先録於此而與王珪桑懌同列於武臣間盖欲見其本末也隆平集卷十五
