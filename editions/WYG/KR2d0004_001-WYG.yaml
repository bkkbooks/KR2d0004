body:
  text: 隆平集卷一宋曽鞏撰聖緒聖宋趙姓帝髙陽氏之後自漢京兆尹廣漢而下世居涿郡爰及唐李僖祖生焉燕薊之俗尚武時有僖祖以儒學顯終於縣令歴水清文安幽都三邑順祖即其子也少博學有時譽終於御史中丞翼祖即其子也少年慷慨有大志歴營薊涿三郡宣祖即其子也雅尚儒素又勇智過人仕周為將帥終贈太尉太祖以宋州節度使為始封故國號大宋以火徳王色尚赤太祖啓運立極英武睿文神徳聖功至明大孝皇帝宣祖皇帝之第二子母曰昭憲皇太后杜氏初後唐明宗即位毎夕焚香禱天曰臣出戎狄世亂為衆所推願上天早生聖人與中國為主天成二年二月十六日太祖生周顯徳七年正月三日統師北征劉筠次陳橋軍士推戴勢不可避四日周帝遜位太祖登極以生辰為長春節改元建隆追尊皇高祖府君謚文獻皇帝廟號僖祖陵曰欽陵皇曽祖府君諡惠元皇帝廟號順祖陵曰康陵皇祖府君諡簡恭皇帝廟號翼祖陵曰定陵皇考府君諡昭武皇帝廟號宣祖陵曰安陵開寳九年十月癸丑宫車晏駕在位十七年聖壽五十𦵏永昌陵孝明皇后王氏孝章皇后宋氏繼孝明立孝惠皇后賀氏即位後追冊太宗至仁應道神功聖德文武睿烈大明廣孝皇帝宣祖皇帝之第三子太祖同母弟晉天福四年十月七日生顯德七年從太祖北征太祖既為諸軍擁戴師還太宗叩馬首告曰諸軍將校若恃功肆行剽略使民肝腦塗地非順天應人之意願誓而後進太祖遂誓於衆諸將而下翕然禀命太祖嘉帝英略友愛益至傳位之意始於此開寳九年十月癸丑即皇帝位是年改元太平興國以生辰為乾明節淳化元年改曰壽寧節至道三年三月癸巳宮車晏駕在位二十三年聖壽五十九𦵏永熙陵明德皇后李氏即位後立淑德皇后尹氏懿徳皇后符氏竝即位後追冊元德皇后李氏真宗皇帝追尊真宗膺符稽古神功讓德文明武定章聖元孝皇帝太宗皇帝之第三子母曰元德皇后李氏生帝於開寳元年十二月二日至道三年三月癸巳即皇帝位次年改元咸平以生辰為承天節乾興元年二月戊午宫車晏駕在位二十六年聖壽五十有五𦵏永定陵章穆皇后郭氏即位後冊章獻明肅皇后劉氏繼章穆立章懷皇后潘氏即位後追冊章懿皇后李氏章惠皇后楊氏竝仁宗皇帝追尊仁宗體天法道極功全德神文聖武睿哲明孝皇帝真宗皇帝之第六子母曰章懿皇后李氏生帝於大中祥符三年四月十四日乾興元年二月戊午即皇帝位次年改元天聖以生辰為乾元節嘉祐八年三月辛未宫車晏駕在位四十二年聖壽五十有四𦵏永昭陵皇后曹氏即位後立廢后郭氏温成皇后張氏貴妃追冊英宗體乾膺歴隆功盛德憲文肅武睿聖宣孝皇帝太宗皇帝之曽孫濮安懿王第十三子母曰仙遊縣君任氏生帝於天聖十年正月三日嘉祐八年三月辛未即皇帝位次年改元治平以生辰為聖壽節治平四年正月丁巳宮車晏駕在位五年聖壽三十有六𦵏永厚陵皇后高氏即位後受冊按此集真宗劉后俱作謚章獻李后俱作諡章懿新編劉諡仝李諡莊懿通鑑二后俱作莊蓋舊制后諡必冠帝號真宗諡章聖故俱易為章符應竇儼周顯德中與楊徽之盧多遜同在諫垣常曰天地厭亂乆矣丁卯嵗五星聚於奎自此太平矣恨不與二拾遺同見之也乾德五年丁卯五星㑹於奎儼果已卒師次陳橋軍中有苗訓者善占候引親吏楚昭輔視日下復有一日晉天福中兩浙民間語必以趙字為助如飲曰趙飲食曰趙食之類宋興錢俶獨先恭順葢悟此也蜀自孟昶襲位民家質物者必書門曰召主收贖及昶末年命翰林學士幸寅遜書桃板辭不工昶自題云新年納餘慶嘉節號長春及王全斌平蜀朝廷以叅知政事吕餘慶知成都府而長春節太祖生辰也江南自晉漢以來民間服玩侈麗者或問之必曰此物屬趙寳子又李煜宫女染碧夜偶不收得雨色益鮮自爾競收雨水以染謂之天水碧天水趙姓郡號也都城東京城以宣武軍節度使治所建周世宗命韓通以近甸丁夫増修太祖建隆三年命有司廣皇城東北隅按洛陽宫殿圖營繕太宗太平興國四年重立京城内外門名二十有五外城門南薰而次十七内城門崇明而次八西京古洛邑今與南北京竝為别都南京景德三年升應天府建北京慶歴二年升大名府建官名諸州置通判始於建隆四年命刑部郎中賈玭等充湖南道諸州通判乾德四年詔自今事無巨細須長吏通判僉議連書僚屬方得奉行太宗朝以宋琪為開封府通判是後開封府不復置司冦叅軍建隆間置以及第進士九經五經并在銓選人為之其後改曰司理五代時兩京軍廵諸州馬步院都虞候判官止以開封河南及諸州才校充選至是改馬步院為司冦而兩京軍廵始選任京官轉運判官開寳六年廣南路初除徐澤一員太平興國三年諸路竝置以武德使副為皇城以閑廐使副為崇儀太平興國中改文明殿學士太平興國五年因殿名置九年殿災改建為文德殿此職遂廢以補闕為司諫以拾遺為正言太平興國六年改内殿崇班左右侍禁太平興國六年置以供奉官殿直有四十年不得遷轉故増此三資崇班在供奉官之上殿直在侍禁之下又改殿前承旨為三班奉職以天廐使副為左右騏驥雍熙間改宣政使淳化中置太宗曰宣徽使執政之漸非宦者所宜處以王繼恩平李順有功故特置此職授之翰林侍讀學士咸平二年叅用舊制禄秩次翰林學士以侍讀授楊徽之夏侯嶠吕文仲以侍講授邢昺唐開元有侍讀其後有翰林侍讀學士至五代廢太宗始命吕文仲侍讀寓直禁中名秩尚卑故復更制三司使咸平六年復後唐長興之制長興中張延朗領其使其後遂廢至是以冦準甞執政故以為使兼總三部卞衮鹽鐵查道度支林特戸部竝副使又以判官六員外掌政令奏事又有更制使止書檢餘皆副使判官主之資政殿學士景德二年因殿名置殿在龍圖閣之東序時王欽若求罷政事屢請不已特置此職以寵之殿學士在翰林學士之下侍讀之上是冬又加欽若大學士之稱在翰林承旨之上龍圖閣待制景德初閣成因置此職以授戚綸杜鎬大中祥符末又以馮元直龍圖閣待制直閣之名葢始於此提㸃刑獄景德四年置在轉運使副之下而俸給同毎路二員内一員武臣帶同字天禧四年改曰勸農事至是提㸃刑獄亦兼内殿承制大中祥符二年置在崇班之上景德殿使大中祥符五年置以授内臣劉承規發運都監天禧間置天章閣待制天聖中置景祐間又添置侍講崇政殿説書景祐元年置以授賈昌朝端明殿學士景祐初復後唐長興之制以殿為名置此職觀文殿大學士慶歴七年置時宰相賈昌朝求罷政事除右僕射因以此職寵之仍詔自今曽任宰相者方除紫宸殿學士慶歴八年因殿名置以授丁度是後不復置官司事材塲建隆間内臣閻承翰以八作司出納積弊建議於都城西置塲治此而後授之世以為便綾錦院乾德五年置時已平蜀所得錦工六百人𨽻焉内藏庫太祖所置謂之景福内庫太宗新其名曰内藏自淳化至景德用兵及郊丘之費不取於民有司假内藏緡帛六千餘萬毎歳多或三百萬少亦不減百萬累年不能償詔即蠲除之真宗景德中命陳彭年作記以示宰臣曰此庫乃為計司備經費爾茍非節用能如是耶以武德司為皇城司太平興國中改封駁司太宗從魏羽請遵故事復置因命羽典領自唐以來凢制詔皆經東臺省審有未便者許封駁以聞主之者給事中也咸平四年改曰門下封駁事則給事中之職以匭院為登聞院太平興國六年改置咸平四年改登聞院曰登聞檢院改鼓司曰登聞鼓院自是匭函遂廢天聖間於登聞檢院鼓院各以匭函為檢匣凢言大事朝政闕失或訴寃未辨者悉令投檢匣以進即言涉竒邪無得通聞以天廐為左右騏驥院雍熙初改三班院雍熙四年置先供奉官以下隸宣徽院其員寖多故别置官司考課而陞黜之理欠司雍熙四年詔諸路州郡置以軍頭司為殿前忠佐司端拱元年改審刑院淳化二年於禁中置以李昌齡知院事凢具獄案經大理寺刑部方關審刑中覆然後下相府相府又以聞始論決理檢司淳化三年詔於乾元門西北廊置復唐制也天聖中遂置理檢使以御史中丞領之審官院淳化四年改考課朝官院為之其幕職州縣官止曰考課院國信司景德元年因契丹修好始置止以内臣閻承翰領其事諫院明道初置都水監嘉祐三年置館閣文籍附三館新修書院太平興國三年詔賜名崇文院唐武德中初置修文館隸門下省貞觀中建史館於禁中專掌國史開元五年於乾元殿東廊寫四部書置刋定官以麗正殿為修書史十二年詔學士張説等晏於集仙殿曰集賢即麗正殿也以修書史為集賢殿書院三館之名葢起於此自是集賢昭文置大學士史館置監修國史皆以宰相兼領又置學士修撰直館校理之職以他官領之昭文館隸門下省史館寓於集賢至梁遷都始以今右長慶門東北小屋十數間為三館湫隘喧雜太宗即位顧左右曰此豈所以待天下賢俊耶詔經度左昇龍門東北車府為三館又敞園圃植花木引御溝水注其中開便門西序備行幸盡遷文籍置焉東廊為昭文書庫南廊為集賢書庫西廊分經史子集四部為史館書庫初乾德中平蜀得書一萬三千卷開寳末平吳又得二萬卷叅舊書為八萬卷祕閣初隸京百司淳化元年祕書監李至等言藏書之府漢麒麟天禄閣在未央宫中命劉向揚雄典校謂之中書即内庫書也後漢東觀亦在禁中桓帝始置祕書監掌圖書祕記謂之祕書魏分祕書為中書而祕書監掌藝文圖籍後以祕書屬少府王肅為祕書監論不應屬少府因是仍舊而蘭臺亦藏書故薛夏云蘭臺為外臺祕書為内閣晉宋皆有祕書之號晉孝武好覽文藝敕徐廣料祕書閣四部三萬卷宋謝靈運為監補祕閣之遺逸齊末兵火經籍散亡隋煬帝寫祕閣二書分為三品於觀文殿廊貯之唐開元中於乾元殿東廊寫四庫書以充内庫命禇元量馬懷素總其事後以集仙殿為集賢殿内置書院今陛下建祕書閣以藏竒書願頒明詔俾與三館同列不隸京百司詔自今祕閣宜次三館祕書省依舊屬京百司唐㑹要百卷建隆二年宰相王溥進德宗時蘇冕撰四十卷武宗時崔鉉又撰四十卷􅄎采宣宗以來故事廣成百卷開寳通義二百卷開寳四年學士李昉進唐開元中徐堅蕭嵩等刪定古今五禮百五十卷昉等廣以成二百卷開寳通義纂一百卷開寳六年叅知政事盧多遜進太平總類太平御覽太平廣記皆太平興國中儒臣李昉等編次文苑英華一千卷雍熙三年學士宋白等奉詔以前世文章纂成道藏經大中祥符九年樞宻使王欽若刪詳凢三洞四部共四千三百五十九卷欽若言道德隆符乃老君聖祖所述升於洞真部靈寳度人經之次又總為目録表求御製序詔從其請賜名曰寳文統録欽若又言三洞真經者無上大羅天中玉京元都祕藏之所藴也元始命天皇真人象形模寫名曰天書玉篆為文字之宗由是經録符圖諸天靈寳遞相祖述故道經為首焉洞真經洞元經洞神經總百九十二萬四千三百八十卷袐在玉京元都三十三天未盡降世間開闢後已降之經一萬九千九百七十卷梁簡文帝時有六千餘卷唐明皇所撰瓊綱纔三千餘卷徐鉉等甞校勘去其重複得三千七百三十七卷至欽若又増五百餘卷焉洞真洞元洞神謂之三洞太清太平太真正一謂之四部欽若又於道藏中檢閲神仙姓國姓者四千人事迹以聞詔圖形景靈宫廊廡郡縣建隆三年以青州北海縣為北海軍建隆四年以秦州大潭縣治成紀開封府東明鎮為東明縣義州山寨鎮為安化縣義州太平興國初改為宜州潭州𢎞道縣為營道縣又以潭州江華縣隸道州乾德二年以襄州陰成鎮為光化軍以襄州穀城鎮為乾德縣隸光化軍以朗州桃源鄉為桃源縣以揚州迎鑾鎮為建安軍割永正縣隸焉乾德三年以溧州常豐塲為常豐縣衡州安仁塲為安仁縣江陵府白洑廵為潛江縣白日廵為建寧縣萬庚廵為萬庚縣白沙院為玉沙縣以北海軍為濰州割營丘昌邑并北海縣隸焉乾德四年以灌口鎮為永康軍割成都府導江縣蜀州青城縣隸焉乾德五年以成都府金水縣為懷安軍割漢州金堂縣隸焉開寳元年詔隴州置隴安縣開寳二年以合州濃洄鎮為廣安軍開寳三年以萬州梁山縣為梁山軍滄州無棣縣為保順軍開寳四年改宻州輔唐縣曰安丘蜀州唐興縣曰江源壽州盛唐縣曰六安同州奉仙縣曰蒲城廣南恩唐州曰恩州明州曰南雄州又升揚州高郵縣為高郵軍開寳五年以荆門鎮為荆門軍割荆南長林縣隸焉又改邕州晉興縣曰樂昌利州益昌縣曰昭化趙州昭慶縣曰隆平開寳六年以雲安監為雲安軍太平興國二年以李繼昇築潞州北亂柳石圍中為威勝軍建鎮州成堡寨為平定軍曹州定陶鎮為廣濟軍改平南軍為大平軍以蕪湖繁昌縣隸焉太平興國三年以廬州無為縣為無為軍以建州邵武縣為邵武軍太平興國六年以定州保塞軍為保州易州太保寨為平寨軍梁門口寨為静戎軍是年改静戎曰静安以霸州淤口為破虜軍改新鎮軍曰平戎太平興國七年以江州星子縣為南康軍改關南曰高陽關太平興國八年以海門鎮為太平軍以衢州開化塲為開化縣雍熙四年以廣德軍郎步鎮為建平縣端拱元年以黎陽縣為通利軍以富國塲為富國監淳化元年以大庾縣置南安軍以大庾南安上猶三縣隸焉淳化四年以耀州黎園鎮為淳化縣淳化五年降成都府為益州以李順之亂故也以撫州金谿塲為金谿縣建州崇安塲為崇安縣岳州王朝塲為平江縣信州寶豐塲為寳豐縣汀州上杭塲為上杭縣武平塲為武平縣仍舊隸逐州又以石保寨建威寨軍席鷄城寨建清逺軍復為環州至道三年建三泉縣為大安軍以西縣隸焉降天長軍依舊為縣隸揚州以揚州六合縣隸建安軍築古原州為鎮戎軍其謀出於節度李繼隆由蔚茹河路䕶靈州軍糧因師進壁而還咸平元年改太平軍為太平州咸平三年以嵐州静樂寨為静樂軍咸平四年以涇州長武鎮為長武縣仍隸涇州咸平五年改静樂軍為憲州以開封府通許鎮為咸平縣景德元年改威虜軍曰廣勝静戎軍曰安肅破虜軍曰信安平戎軍曰保定寧邊軍曰永寧定逺軍曰永静定羌軍曰保德平虜城曰肅寧景德三年升應天府為南京以齊州章丘縣為清平軍以洺州高苑縣為宣化軍以河南府永安鎮為永安縣大中祥符二年改浚儀縣曰祥符升建安軍為真州慶歴二年升大名府為北京慶歴八年改貝州為恩州學舍五代學校不修學者多各從其師是以廬山有白鹿洞書院嵩陽嶽麓亦各有書院國朝各賜以書籍大中祥符初應天府民曹誠即戚同文舊學之地造書舍詔賜額曰應天府書院命戚綸之子舜賔主之其後庠序之敎興而所謂書院者未之或聞矣武學慶歴二年置於武成王廟寺觀建隆元年詔諸道寺院經顯德二年已廢者不得存留其佛像許移置見存留處開寳三年改封禪寺為開寳寺五年賜峨眉山新寺名光相太平興國二年改新造龍興寺為太平興國寺因年號報光寺為乾明因乾明節三年改廬山東林為太平興國寺西林為乾明寺通𤣥寺為太平觀九年置啓聖禪院即太宗皇帝降誕之所大中祥符間在京及仙源縣壽丘竝建景靈宫立聖祖殿仙源縣壽丘建太極觀立聖祖母殿詔天下州軍監置天慶觀仍竝建聖祖殿又改潤州京江中金山曰龍遊禪院是山古謂之浮玉唐貞元二十一年江濱獲黄金數鎰詔改為金山有頭陀自稱裴氏至山始創寺咸通中曹礭以山名寺偽唐李景保大間改寺名潭心云治平三年詔一應無額寺院屋宇及三十間以上者竝賜壽聖為額因壽聖節不及三十間者竝行拆毁宫掖建隆初後宫止及二百八十餘人開寳五年水災太祖徧諭之曰願歸者以情言得五十餘人賜白金幃帳遣之太宗甞謂侍臣曰晉武帝平吳之後後宫畜數千人朕以此為戒宫中妃御掌事輩不過三百人猶以為多更差擇之後雍丘尉武程上疏願減後宫嬪嬙上謂宰臣曰内庭給使亦分掌事有不可去者爾朕固不作離宫别館取良家子充其中如秦漢之君也李昉請加黜責以懲妄言上曰朕曷甞以言罪人但念程不能知爾真宗即位擇宫中給事歳深者出之景德元年又令籍宫中止留年高者餘悉放出皆號泣願留上敦諭令中使訪良族聘之宰臣李沆曰此盛德之事也大中祥符元年又遣出百人謂近臣曰亦節用之一端也仁宗寳元二年放宫人二百七人諭輔臣曰不獨矜其幽閉亦省掖廷費也英宗治平元年放宫人一百三十五人又明年放一百八十人宫人及戚里有留内寺觀為尼女冠不出者上一日謂宰臣曰欲聽從人可乎韓琦等對曰陛下哀憐及此誠仁政之一端也遂聽其從便隆平集卷一
