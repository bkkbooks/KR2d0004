body:
  text: 隆平集卷二十宋曽鞏撰外國契丹耶律隆緒年十二嗣其父明記位明記偽號景宗初名舒嚕徳光之子也唐初契丹八十餘年未常寇邊通天時李盡忠始陷營州明年總管楊元基以奚軍攻潰其衆至開元十一年可突于奉盡忠之弟邵固統衆詔許襲王方是之時猶稟命中國如此梁正明間耶律安巴堅始建元神䇿遂以五十萬衆從晉叛將盧文進寇幽州龍徳初復入為鎮州張文禮之援明年晉王大破之於新城而獲安巴堅之子自是繼為邊患及安巴堅死子徳光繼立晉祖因其兵勢而得天下故兼臣禮而父事之割地以為壽輸帛以為貢未更一紀之久已貽開運之禍其後劉崇崛彊於太原為計亦出於此有以益其驕僭也徳光滅晉而歸死於鎮陽之殺虎林其兄之子永康王烏雲自立為天授皇帝囚其祖母舒嚕氏於木葉山舒嚕氏安巴堅之妻也烏雲五年為其族舍音所殺舒嚕討其亂因自立為天順皇帝更名謂之明記太平興國末明記死其妻専國事雍熙間曹彬北伐失利於岐溝隆緒數内寇者謀皆出於母氏也咸平二年舉國而來范廷召大破其衆斬首萬餘級雖遁而未懲故景徳初復大舉戎馬及於澶魏之郊真宗大駕再莅河朔甫次衞南而契丹謀將達蘭已斃於我師之强弩謀窮勢蹙始因王繼忠之表請修好息兵天聖末隆緒死宗真立宗真隆緒之第八子也母曰順聖元妃隆緒遺命以正室齊天皇后太后為元妃蕭氏為太妃太妃殺齊天而自立為太后多殺戮功臣而専用其兄弟御宗真甚嚴宗真不能堪景祐初遂率兵逐其母使守隆緒塜其國人有勸迎其母以覬朝廷嵗賜之物雖從之而所居相距常十餘里蓋懼其或相害耳慶厯二年聞元昊叛遣蕭英劉六符來請石晉所割瓦橋闗十縣詔富弼張茂實往報焉嵗復增銀絹二十萬皇祐元年遣使來告伐元昊明年來告㨗至和初又齎其畫像來欲求御容未及往而宗真死其子洪基立宗真廟號興宗在位凡二十五年常與教坊使王税輕十數人結為兄弟出入其家或拜其父母常夜宴與劉四端兄弟及王剛等數十人入樂隊命后妃易衣為女冠后父蕭穆濟言漢官皆在此后妃入戲非所宜也宗真擊碎后父首曰我尚為之若女何人也間常變服入酒肆寺觀如王剛姚景熙輩常遇於微行中皆顯官宗真敬佛敎僧正拜三公三師兼政事令者二十人左右所親信多擢為將相契丹國境自幽州東行五百五十里至平州又五十里至古遼城謂之東京北六百里至烏舍國東南接高麗北至女真東踰鴨緑江即新羅也夏國趙保吉姓拓拔其逺祖仁福者思恭之族也唐僖宗始以思恭為夏州節度使賜國姓思恭族亂仁福繼之故亦稱李氏仁福死子彞超興相繼為定難軍節度使彞超而上五代史有傳彞興死興本與宣祖廟諱下殷字同故改曰興子光叡繼光叡死子繼筠襲繼筠死弟繼捧襲位其從父綏州刺史克文言繼捧不當襲請遣使與偕至夏州諭令入覲繼捧乃舉族歸朝其弟繼遷在銀州太宗賜以國姓俾𨽻屬籍又賜繼捧名曰保忠繼遷名曰保吉為夏州節度使歸鎮初保忠之來覲也保吉言乳母死出葬郊外匿兵器葬車中遁入蕃族收部曲散亡者刼西羌種落為邊患雖賜姓名而侵擾夷落不已保忠歸又潛與表裏遂往依之保吉不納復還夏州牙校已據其城保忠不得入及王師進討俘保忠以歸故保吉因并夏州之地真宗即位始遣使修貢朝廷遂以保吉為夏州節度使未幾乃攻陷清逺軍及靈州景徳元年刼西蕃至西涼府潘羅支詐降保吉受之羅支合六谷蕃部擊之保吉中流矢死其子阿移襲更名曰徳明而遣使請命於朝廷明年奉表歸欵請市青鹽不允乃閲馬謀内宼時秦翰曹瑋請進兵討擊上以其人常已歸欵不許遂以向敏中知延州令撫納之敏中請召其子弟宿衞徳明不從止上誓書并録保吉遺言以聞真宗念邊兵久戍乃授徳明定難軍節度使加西平王又請行青鹽不允遂出大里河築柵蒼耳平八年築堡西州濁輸谷建𣙜場以誘致商旅詔沿邊禁止自是閒擾邊境攻陷甘州取西涼府天聖中徳明卒子元昊立元昊既長徳明數語之曰國中三十年不披皮毛而衣錦綺之衣汝無負天子也吾常從事於兵雖勞苦萬狀第自困耳及死贈太師尚書令徳明娶米母氏生元昊咩朱氏生魂成元昊以五月五日生小名崖塊羌謂惜為崖謂富貴為塊性兇悍多猜忌曉浮圖法通漢文字几案間常致律法書自為蕃書十二卷文類符篆建蕃學使蕃官子弟習之襲徳明官為定難軍節度使檢校太師兼侍中封西平王天聖十年改元明道元昊避其父名止稱顯道景祐元年遂僭改元開運入宼環慶殺掠居民詔約束之米母氏族人山喜謀殺元昊事覺酖殺其母沈山喜之族於河自是攻略諸羌屢為邊患其從父山遇知元昊有反計勸止不從山遇懼挈族來歸知延州郭勸乃執以還元昊至則殺之是嵗僭帝號國稱大夏改元天授明年遣使來告詔削奪官爵除屬籍既而為慢書留旌節敕告於歸孃族而去康定元年寇金明執監押李士彬而劉平石元孫陷於三川口慶厯元年任福戰殁於好水川明年復戰定川寨葛懐敏死焉未至定川常遣李文貴欲納欵知延州龎籍意其詐留未遣復數月果入寇籍召責其使而釋遣之文貴去月餘復來籍視其書未去僭號卻之俾自請明年上書更名曩宵稱男不稱臣籍又拒焉詔遣卻良佐張士元等更往議之而曩宵之使繼至四年冊為夏國主令稱臣稟正朔改所賜敕書詔而不名聴自置官屬遣使至京許就驛貨易宴坐朶殿朝廷使至其國用賓客禮嵗賜銀絹綵共二十五萬五千於是始嵗修貢曩宵用兵多詭計左右用事之臣有疑必誅先世居室衣冠文字莫不改革其文人服靴笏幞頭武臣金帖鏤冠衣緋衣金塗銀黑束帶佩蹀躞穿靴餘皆秃髪耳重環衣紫旋襴六垂束帶佩解錐刀弓矢垂鯢皮鞍馬帶纓議事即率諸酋適野藉草而坐其俗舊止重冬至自曩宵僭竊乃更以四孟朔及其生辰相慶賀曩宵七娶其五曰野利氏身頎長有智謀曩宵畏之戴金起雲冠使它無得冠者生三子獨寗令哥存僭稱太子又納没􅗹女營天都山居之野利氏之叔遇乞有言而曩宵殺遇乞得遇乞之妻生諒祚慶厯七年甯令哥弑曩宵不死傷其鼻而去匿黄蘆為訛厖所殺曩宵因鼻傷卒年四十六子諒祚襲自仁福至繼筠世居夏州及保吉變詐跋扈外侵西羌種族内竊靈綏銀夏至徳明攻陷甘州拔西涼府其地東西二十五驛南北十驛自河以東北十有二驛而達契丹之境至曩宵破𤓰沙肅州遂盡得河西之地在徳明時兵十餘萬而已曩宵之兵踰十五萬自謂地廣兵勁敢行僭叛然而不通互市嵗賜仍絶六七年間亦已困弊不如是其寇攘之患固未易息也西北少五榖軍興糧饋止於大麥蓽豆青麻子之類其民則春食鼓子蔓醎蓬子夏食蓯蓉苖小蕪荑秋食席雞子地黄葉登廂草冬則畜沙葱野韭拒霜灰蓧子白蒿醎松子以為嵗計其人能寒暑饑渴長於騎射而不能槍刀出戰用隻日避晦日齎糧不過一旬弓弩用柳榦皮弦雨雪則不能施兵行晝揚沙夜舉火以為斥堠將出兵先卜四一用艾灼羊夾靣骨以求兆謂之炙勃焦二擗竹於地若揲蓍以求數謂之擗算三夜以羊焚香呪之又燒穀火撒之靜處晨屠羊視其腸胃通通則兵無阻心有血則敗四以矢擊弓弦而聴其聲知敵至之期及兵之勝負民居皆立屋有官爵者始得覆之以瓦其部族一家號一帳男年十五以上為丁有二字丁者取正軍一人負擔一人為一抄負擔者隨車雜使也四丁為兩抄餘號空丁願𨽻正軍者得射它丁為負擔無則許射正軍之疲弱者為之故壯者皆戰鬭而得軍為多欲西用兵則自東㸃集而西欲東則自西㸃集而東年六十以下十五以上皆自備介胄弓矢以行好立虛寨多設伏兵馬軍用鉤索絞聨雖死馬上不落凡正軍給長生馬駞各一死則償之每入寇必先犒飲山訛者横山羌也其主將皆陣後立馬督戰得中國人無藝者使耕於河外或守肅州城驍勇則刺為軍蕃族有和斷官擇氣直舌辨者為之以聴訟之曲直殺人者納命價百二十千俗喜復仇然有凶喪者未復負甲葉以為記不能復者集鄰族婦人烹牛羊具酒食介而趨仇家縱火焚之其經女兵者家不昌故深惡焉唃􅣳囉初名欺南陵溫籛逋生磨榆國蓋吐蕃贊普之苗裔也同羌西部族未有服屬大姓聳昌厮均等咸平中迎至河州欲立文法請更其名曰唃􅣳囉河州人謂佛為唃謂兒子為􅣳囉於是宗哥僧李立遵與邈川溫逋哥略􅣳囉如郭州立文法部族稍歸之因徙居宗哥城以立遵為輔大中祥符末􅣳囉命立遵率衆十八萬襲秦州生熟戸知秦州曹瑋以兵擊之趨走西涼府又為所敗遂與立遵不協徙居邈川更以逋哥為輔遣使秦州求内屬詔授􅣳囉邈川首領寜逺大將軍愛州團練使以逋哥為歸化將軍後逋哥謀亂􅣳囉殺之而改蒞青唐景祐中授兩使留後久之朝廷以元昊不臣遣屯田員外郎劉渙諭􅣳囉攻元昊適元昊大舉兵襲􅣳囉堅壁鄯州不與戰元昊度水常植幟以誌深淺􅣳囉潛使移所植及元昊衆潰趨誌處溺死過半自是數以計敗元昊及元昊取西涼府而􅣳囉得厮鐸叔之衆十餘萬回紇亦以數萬人歸焉其勢遂强於諸羌朝廷屢加以節命為保順河西鎮節度使洮涼兩州刺史卒年六十九􅣳囉三子皆被恩命曰瞎氊居合龍谷曰磨氊角居宗哥城曰董氊為􅣳囉嗣其母喬氏獨居厯精城有才色所部六七萬人號令嚴明莫不畏服交州李公蘊始為本州大校節度使黎至忠苛虐公蘊常陰贊之故特見親信因令冒姓黎氏大中祥符三年至忠卒有子纔十嵗而其弟明提昶爭立公蘊遂殺之自稱留後遣使請命真宗曰始黎桓刼丁璿自立公蘊復爾蠻夷奚責焉遂授靜海軍節度使安南都護交趾郡王大中祥符七年因捕狄獠寇如洪寨詔轉運使追所略生口因飭戒之天聖中又令其子弟率衆入寇詔𤼵峒丁討捕未幾卒子徳政自稱留後來告哀天聖六年除檢校太尉靜海軍節度使安南都護交趾郡王景祐三年寇邕州之恩陵等州及諸峒略牛馬焚室廬而去詔責問令捕酋領正其罪寳元初進南平王皇祐間以兵二萬助平儂智高詔卻其兵而優賜焉久之卒子曰尊妖寇蜀賊王小波李順皆青城縣人淳化三年聚衆為亂先陷青城縣四年刼彭山縣令齊元振金帛元振率衆拒之逐元振賊勢漸盛都巡檢使張玘戰殁於江源二月攻陷成都知府郭載奔東川小波因與張玘戰傷病卒衆推其妻弟李順為帥既而攻彭漢州成都府順乃僭號建元應運朝廷遣内臣王繼恩同韓守英馬知節石普率師平蜀五年五月破賊擒順獻首餘黨招捕無遺蜀土富饒自乾徳間孟昶既降府庫充溢重貨銅布由舟運下三峽輕貨設傳置以四十兵𨽻為一綱號曰進綱水陸兼運十餘年始悉歸内庫時守臣務利入之厚常賦外更為博買務禁民私市物帛而兼并者釋賤販貴小民貧失家田業故小波以言動衆曰吾疾貧富不均吾與汝均之貧民由是附之者衆又朝廷常命張樞使蜀樞奏劾官吏不法者百數獨舉彭山縣令齊元振清白彊榦降璽書奬諭元振素貪暴因是益横受財得金帛多寄民家小波知民怨苦之遂散其金帛殺而剖其腹實以錢刀用快其意是時樞知榮州賊攻州即以郡印及所受告敕降賊受其偽命為榮州刺史王繼恩以聞太宗斬於州市而磔其尸軍賊王均神衞指揮都虞候益州駐劄咸平三年神衞卒趙延順以衆怨鈐轄符昭壽多用親隨僕言榜箠軍人因馬逸喧擾中殺昭壽及僕均率衆擒延順及其黨不能獲乃同刼均為帥知州牛冕出漢州均遂僭號建元化順自正月叛奏至以雷有終知益州命内臣秦翰同團練使石普上官正率兵征討九月均敗竄石普秦翰楊懐忠追斬於富順監梟首州市軍賊陳進宜州澄海軍校景徳四年因衆怨知宜州劉永規苛役殺永規及監押國鈞據城叛刼判官盧成均為帥詔東上閤門使曹利用安撫廣南路率兵進討九月遇賊於象州仙縣擊敗之襲至象州斬陳進及其黨而盧成均挈家屬以降時象州城守四十日矣擢知州大理寺丞何邴祠部員外郎三子皆賜出身以守城功也區希範環州人常舉進士試禮部景祐五年應募討安化州蠻詣登聞鼓院進狀求録用下宜州勘㑹知州馮伸已言其妄邀功賞遂送全州編管既而遁歸與其族百餘人謀舉兵殺伸已以叛乃殺牛建壇塲祭天神推白崖山酋蒙趕為帝叔區正辭為奉天開基建國桂王而自為神武定國令公桂牧皆北嚮再拜以為天命又以區丕績為宰相區志􅀈為都統使崔盈為節度使區世庸為飛天神聖將軍蒙懐為百勝將軍譚護為突陣將軍甘徹為龍路將軍吳程為蜂毒將軍廖陳為遊奕將軍蒙樗為雷行將軍共偽補三十餘人聚衆二千餘人慶厯四年攻陷環州得其印遂以環州為武成軍繼破帶溪普義寨下鎮寜州等處宜州捉賊李徳用出韓婆嶺擊破之獲其偽將崔盈譚䕶二人希範遂入保荔波洞間出拒官軍明年詔西京轉運使杜杞加直集賢院為廣西轉運使兼安撫事杞至宜州得州人吳香獄囚區世宏及攝官區曄進士曹子華往説諭之又率兵破白崖黄泥九居山等寨及其五峒斬首千餘級復環州焚其積聚蒙趕等大怒率其徒隨香出降杞犒以牛酒六百餘人始與盟置曼陁羅花酒中既昏醉悉殺之後三日得希範及區丕績等十數人割希範腹繢其五藏為圖而醢以賜諸溪峒餘悉就戮軍賊王則涿州人因嵗儉流移至貝州應募宣毅軍為小將初去其鄉母與之訣刺福字背上以為記兾貝間多妖術則習之欲為亂遂紿衆言背自然隠起一福字衆惑而敬事之州吏張鸞卜吉者為之主謀慶厯七年冬至郡官赴朝拜遂率其徒刼庫兵以叛執知州張得一囚於獄囚悉縱去通判董元亨不與軍帑鑰首被殺司理叅軍王奬為獄囚所害監兵田斌鬬不勝而出提㸃刑獄田京任黄裳持印棄家屬縋城而去獨得一俛首事之獲存餘悉死焉則僭稱東平郡王張鸞為宰相卜吉為樞密使建元徳勝旗幟皆為佛字則遣人要虜使而安撫使賈昌朝諜知命殿侍安素伏兵西門夜俟其徒出盡得其首級詔遣叅知政事文彦博知開封府明鎬為河北宣撫使副以平其亂官軍即城南為地道因日攻其北以牽制之地道成而兵入則始開東門遁為總管王信所獲檻送闕下刲戮都市自反及敗凡六十六日餘衆捕殺無遺其妖書有滴淚經五龍經廣源州蠻寇儂智高蠻商之子其母阿儂左江武勒之族轉至交趾適儻猶州知州儂全福子全福為交趾所擄阿儂改適蠻商生智高智高長遂殺其父阿儂又為特磨道儂夏卿之妻皇祐四年智高聚衆入寇初陷邕州遂僭號稱其母阿儂為皇太后阿儂兇悍有謀嗜小兒肉間以具庖食智高用其計遂自邕攻横貴龔潯封藤梧端康州所至驅刼軍民衆至數萬乃進圍廣州朝廷先命楊畋曹修為廣南安撫使經制蠻事又繼以孫沔余靖任安撫使久未奏功遂除樞密副使狄青為宣徽南院使宣撫湖北路經制廣南賊盜事青至合孫沔余靖三將兵大破其衆於歸仁鋪智高夜焚邕州城奔大理國其母阿儂潛歸特磨道依其夫儂夏卿收殘衆得三千餘人復將入寇石鑑世居邕州諜知其動息遣峒丁入特磨道掩襲擒阿儂及智高二子繼宗繼封弟智光竝檻送闕下阿儂年六十朝廷始欲存之以俟智高之降及智高已為大理國所殺故悉刲戮都市隆平集卷二十
