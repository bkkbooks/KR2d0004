body:
  text: 隆平集卷四宋曽鞏撰宰臣范質字文素魏郡人母夣人授五色筆而質生唐長興中擢進士第仕晉至翰林學士周祖擢為宰相建隆初封魯國公乾徳二年罷相初和凝知貢舉愛質所試文自以中第甞在第十三名故亦以處質其後質官及封國皆與凝同當時謂之傳衣鉢質平居手不釋卷謂人曰甞有異人言吾當大任無學術何以處之及司制誥人服其該贍奉行制敕未甞破律為相不受四方饋獻禄賙親族殁無餘財太祖歎其清慎曰真宰相也太宗亦言近世輔弼循規矩慎名噐無與比者特不能死周社稷乃其短爾子旻魏仁浦字道濟衛郡人少為刀筆吏隸樞密院周祖為樞密使問以中原卒乗數對曰帶甲者六萬及隠帝遣人害周祖仁浦教以易其語云誅將士以激怒衆心遂長驅渡河即位擢樞密承㫖復問郡邑屯兵數仁浦詳對按籍無差世宗即位差樞密副使陞使繼命兼相對曰不由科第進曰顧才何如爾遂用之世宗卞急輕殺戮仁浦營救而免者十常七八從出征鋒鏑之下無横死者有鄭元昭誣仁浦婦翁李温玉之子従李守政叛捕以告變欲中傷仁浦周祖力辨其誣獲免及仁浦大用元昭懼卒以元昭繼典五郡又甞為賈延徽譖㡬遇害總師出征有得延徽以獻者仁浦曰因兵戈報私怨不忍為也人稱其長者建隆初不易其任乾徳二年罷相卒子咸信尚主追封仁浦王爵王溥字齊物太原人漢乾祐中登進士第周祖鎮蒲津召置幕府從征李守正王景崇得朝臣交結書周祖欲暴其事溥力請焚之周祖將大漸趣草相制聞宣畢曰吾無憾矣世宗甞問漢相李崧蠟丸書結北兵有能記其辭者否溥曰使崧有此肯以示人耶逢吉輩搆之爾世宗遂優贈其官建隆初不易舊任乾徳二年罷卒諡文獻後改曰文康父祚仕至上將軍祚致仕溥猶居相位每公侯引觴為夀溥侍側如嬰兒人稱其孝敬祚徇貨殖溥亦獲恡嗇譏孫貽永貽永字秀長真宗以其故相家選尚太宗第四女鄭國長公主除右衞將軍駙馬都尉明年主薨即納所賜宅累擢節度使厯宣徽使同知樞密院事改副使加同平章事以疾求罷聽免兼侍中至和初復以疾丏解職除右僕射檢校太師兼侍中鄧國公卒年七十一贈太師中書令諡康靖子道卿貽永為人慎約寡言無綺紈聲色之好甞知徐州河決滑臺作堤城南水至不為患王曾守南京表其事詔褒之鄆州咸平中徙城而故治為通衢密邇梁山濼春夏多病涉貽永知鄆州相地築東南道二十餘里至今人獲其濟濼原作􅀈無此字楊希洛云疑作濼有朴音薛居正字子平開封人父仁謙五代史有傳居正後唐清泰中登進士第仕周至刑部侍郎建隆初知朗州有亡卒數千為盜軍使疑城中釋子為應欲盡殺之居正以計緩其事生擒賊首乃知釋子千數無預謀者乾徳二年初置叅知政事居正及吕餘慶首當其選開寶六年拜相太平興國初進位司空薨諡文恵無子以同姓子惟吉為嗣居正操行方重不事苛察好讀書為文敏贍有集二十卷詔李昉為之序沈倫字順直陳畱人名上一字避太宗舊名去之太祖初除同州節制辟在幕府屬改命皆從焉及即位擢樞密副使開寶六年拜相太平興國四年罷卒諡恭恵平蜀日倫為計度制置使諸將以賄敗倫歸篋中惟圖書數卷在相位自守而已盧多遜懐州人父億有操行仕至少府監周顯徳末登進士第開寶中累擢叅知政事九年拜相多遜博涉經史善伺人主意太祖每遣取書多遜伺知即通夕閲視詰朝問書中事應答無滯上益寵待為翰林學士時屢於上前毁趙普及在相位普之子及其親屬多為所抑普再相廉知多遜常遣親吏交通秦王廷美因發其事追削官爵並其家配崖州卒於配所初王佑知制誥多遜欲佑協力擠普一日佑以宇文融排張說事示之怒出佑知華州及多遜敗士大夫服佑有明識趙普字則平薊州人父迥徙常山又遷洛陽因占籍焉劉詞節制永興辟為從事詞遣奏稱其才授滁州判官太祖以周世宗命破皇甫暉拔滁州聞普決獄多全活者方出鎮馮翊遂表為従事屬改命普在幕府即位授練議大夫繼除樞密副使乾徳二年代范質相久之罷太平興國初復相堂帖之行與詔敕無異太宗命勿復行八年授鄧州節制端拱元年復相淳化元年以疾罷除河南尹進位太師魏國公薨追封真定王諡忠獻卒年七十一設鹵簿葬舉唐制也普初無學術太宗勉之晩年頗該博在相位十年獨任政事閤中設大瓦壺中外章奏不欲行者擲壺中既而焚之性多忌尅太祖甞稱馮瓚欲大用普遂請以知梓州遣私奴從之郡伺其過失詣闕訟之瓚配隸沙門島十年三司使趙玭廉其市木治第事雷有鄰又訟中書不法太祖惡之學士竇儀入對因訪普所為儀曰不知退而曰我必不大用而必不之朱崖及詢盧多遜多遜乗閒攻其短亟進預政事及普再相多遜遂有朱崖之命蜀人侯莫陳利用以方術進至團練使所為多不法普力言之上為黜利用普言之不已利用卒伏誅聞者欣快普在相位士大夫有言人短長者必命吏追録之有事則引以為證自是人無敢言中書事益壅蔽又甞建議以趙保忠鎮夏臺俾圖繼遷反通謀㡬為邊患時論罪之端拱復相頗為同列所窺鬱鬱不得志而去雖然普遇事能斷知無不言與夫循嘿者有間矣李昉字明逺真定人父超仕至集賢學士昉以門䕃補齋郎漢乾佑中登進士第在周為翰林學士建隆初遷中書舎人盧多遜攻趙普短太祖詢昉昉曰臣書詔之外思不出位太祖征太原過常山賜羊酒俾於居第讌集丞相至藩侯皆賦詩刻石太平興國八年拜相建議復時政記先進御後付史館端拱初罷淳化二年復相在位循謹自守臨事多恕為文慕白居易所居有園亭又葺郊外宴逰之地多蓄妓樂娯樂親友與張洎盧多遜善薄張佖上甞問多遜昉頗為辨釋上曰多遜常毁卿不直一錢昉曰臣不敢誣罷相張洎草詔湥攻其短張佖時時造其第或問佖佖曰我為廷尉獨李公未甞以私事見干今雖退居可見也昉薨贈司空諡文正子宗諤宗諤字昌武昉第三子七歳能屬文恥於父任得官獨由鄉舉端拱二年登進士第性謙謹衣敝䇿蹇人不知其宰相子也獻文召試除集賢䘨理太宗每有篇詠多賜昉及宗訥宗諤屬和世榮之宗訥宗諤之兄也宗諤官至諌議大夫翰林學士卒年四十九李濬與宗諤同歳同月後一日生其卒亦後一日濬字徳潤冀州人父超為禁卒從潘美掌刑刀美嗜殺戮超常緩之怒釋多全活者人以為有隂徳濬官至右司郎中樞密直學士宗諤博學曉音律尤精於典章沿革朝廷創制損益莫不與聞景徳初契丹請和後一歳生辰使至首命宗諤館伴自郊勞至餞禮有節適行判太常寺鼓吹工之謬濫者無所容風流文雅内行純至事繼母以孝稱二兄早卒奉嫂字孤人無間言友其弟宗諒甚篤賞延所及皆先諸姪其卒也子猶有未仕者奬借後學薦拔寒素接人有禮士大夫愛慕之其書字勢傾側後進多擾筆效之罕有類者為時之所貴如此有文集六十卷内外制集四十卷又有家傳談録行於世宋琪字叔寶范陽薊人晉天福中在契丹舉進士登第幽帥趙延夀惜其自陷北廷辟為從事建隆間為開封府推官太宗尹京禮遇甚厚即位累擢至叅知政事太平興國八年與李昉同相因請盧多遜舊第上惡而罷之薨年八十贈司空諡恵安琪有吏能辯捷好詼諧而寡學識吕端字易直其先燕人父琦五代史有傳兄名犯太祖諱下一字字餘慶太祖節制同州餘慶為賓佐及即位累擢叅知政事蜀平知成都府不罷政事以執政涖藩鎮自餘慶始歸朝復舊任既而引疾求罷除尚書左丞卒年五十太祖幕客餘慶居其先趙普李處耘首大用餘慶獨不介意及除執政而處耘被黜同列欲共排之上問處耘第以實對普忤㫖而罷仍力為辯釋餘慶重厚有守所至以寛簡治與弟端俱以文官三品䕃補千牛衞備身端在周直史館建隆初遷太常丞厯官四十年始大用淳化四年叅知政事至道初拜相太宗甞憾任用之晩端持重識大體同列奏對或多異議一日内出手札戒諭自今中書事經吕端裁決乃得聞奏真宗即位尤加體貌見必拱揖以其身體偉大為納陛俾登殿所咸平初以疾罷薨年六十六贈司空諡正恵子荀藩蔚藹李惟清自樞密改中丞意端抑已屢遣人訟堂吏過又彈端久在病告端曰吾直道而行無所媿也端姿表瓌秀器識和裕屢遭擯棄未始經意甞使髙麗暴風折檣舟人恐怖端讀書自若兩使絶域後有往者必問端為宰相未其為逺近所慕如此李沆字太初洺州肥鄉人父炳仕至侍御史沆好學沉厚寡言有精識炳甞謂人曰此兒異日必致公輔太平興國五年登進士第至王化基上書自薦太宗曰李沆宋湜皆佳士也命相府同召試並除知制誥沆官最下特升於上累擢給事中叅知政事淳化四年罷真宗升儲以為太子賔客詔儲君待以師傅禮及即位復叅知政事明年拜相北兵入寇車駕幸鄴沆留守東京不戮一人輦下肅然景徳元年薨年五十八贈太尉中書令諡文靖沆博學内行修謹居位慎重門無私謁終日危坐望之儼然上每議政語天下安治沆常以四方水旱螟蝗為言上湥慰納既薨上對侍臣曰沆忠亮淳厚終始如一言畢泣涕久之王旦常自謂器節不能逮沆世謂二人皆賢相也弟贄源淮子簡畢士安字舜舉代州人徙居鄭州乾徳四年登進士第累遷至知制誥翰林學士真宗尹京士安為開封府判官即位命擢知府復入翰林為學士又為侍讀學士景徳初叅知政事踰月拜相二年薨於位年六十八贈太傅中書令諡文簡士安端重有識度善談論所至以公正稱年髙日昏讀書不輟有文集三十卷藏於家吕蒙正字聖功河南人太平興國三年登進士甲科厯官一紀遂至相位甞任知制誥翰林學士叅知政事端拱初相淳化二年罷四年復相六年罷相國朝以來三居相位唯趙普及蒙正蒙正沈厚寡言有器局以正道自持張紳知蔡州以􅂍敗有為紳營解於上曰紳家富不至此特蒙正貧時有求不獲今報之耳上即復紳官蒙正不辯後考課院得其實黜之太宗復謂曰張紳果有􅂍蒙正亦不答判江寧府數遣中貴人將命待之如在相位時不少減近制宰相子起家即授水部員外郎加朝散階蒙正固辭止授九品京官自是以為例罷相歸西洛養疾有園亭時㑹親舊環侍皆子孫間舉夀觴釋然自得真宗謁陵寢祠后土過洛汭兩幸其第當世榮之父龜圖仕至起居郎初龜圖黜妻劉並棄蒙正劉誓不改適及蒙正涖官迎二親同堂異室奉養並至時稱其孝累改封以許國公薨年六十八贈太師中書令張齊賢曹州人徙居洛陽自言慕唐李大亮為人故字師亮乾徳間應科舉不中選太平興國二年登進士第累擢至簽書樞密院樞密副使叅知政事淳化二年拜相咸平初復相屢進位至左右僕射請老以司空致仕飲食素過人執政後丁内艱水漿不入口者七日其後日一飦粥既祥方食脫粟飯三年酒肉果菜不入門世稱其孝平日頗以致君自任言涉疎濶前後治獄全活甚衆未第時依太子少師李肅家及貴歲時祭之种放之用亦其薦也甞為部使者務存寛大察訴牒多得其情甞對太宗曰靈夏終為繼遷所擾人謂其過卒如所料在相位事有涉干請辭連李沆而齊賢獨任其責物論甚美及再相與寇準相傾遂虧名節歸洛得唐裴晉公午橋莊有池榭松竹之勝日與親舊觴詠其間善教子孫皆能自立有文集表疏集雜編小說各數十卷王旦字子明大名人父祐有文行國史有傳旦沈厚好學佑知其必致公輔手植三槐於庭以為識旦太平興國五年登進士第淳化初獻文除直史館明年知制誥佑久典書命旦不十年繼之咸平初入翰林為學士三年樞密副使四年叅知政事景徳三年拜相在樞府一年叅知政事八年任首相十二年以疾懇求退不已意不可奪除太尉仍詔禮官具上事儀未上而薨年六十一贈太師尚書令諡文正初旦與錢若水同在西掖若水善人倫常曰王君凌霄聳壑棟梁才也非吾所能及李沆以同年生亦相厚善謂為逺大之器旦端重介直明達治體接物雖和易而風格峻整當官臨事獨不可犯為相屬罷兵之後務在鎮静善於獻納言簡順理慎惜名器敘進才品不以私怨廢公義薦用人有終身不知者不許子弟應舉以妨寒俊亦不薦補諸子居第湫隘服器質素與弟旭友愛甚至敦奬名教畱意文雅近世典章族氏尤極該洽真宗初置天書刻玉使以旦領之國朝以來居相位天下無間言者唯旦及李沆云向敏中字常之開封人父瑀唯一子教督甚嚴常謂其妻曰大吾門者此子也太平興國五年登進士第久之太宗飛白書敏中張詠二名付中書語宰相曰此二人名臣也朕將用之淳化四年自廣南轉運使召還除工部郎中擢樞密直學士與張詠並命是年同知樞密院事自員外郎至是凡百日耳㑹曹彬除樞密使改副使咸平初改叅知政事二年兼樞密使出安撫河北以禁兵萬人翼從四年拜相五年坐市薛居正第罷大中祥符五年復相天禧三年薨年七十二贈太尉中書令諡文簡初太宗欲大用之當路者有言敏中在法寺時皇甫侃監無為榷務以賄敗甞求敏中從末減下御史臺捕侃僕詰之僕云有書敏中不啟封還之書今瘞臨江軍傳舎遣索果得書緘題如故上驚異遂登用焉罷相出知永興軍適駕幸澶州密詔俾便宜從事詔不泄邊境以安故有復用之意敏中沉毅寡私交獨為人主所知多智善保身識大體相位門無私謁諸子不使當事任雖處大事若已不與避逺權勢慎於薦拔大任㡬三十年衰老猶不得謝時論目為重徳寇準字平仲華州下邽人太平興國中登進士第器識文學時鮮其比初補歸州巴東令五年不得代既又宰大名府成安賦役期㑹書鄉里姓名掲之縣門民無違者巴東有秋風亭準析韋應物一言為二句云野水無人渡孤舟盡日横識者知其必大用後因言事太宗湥器之淳化二年擢樞密副使四年罷知青州太宗對左右數語及準有間言至終不能移上意五年召叅知政事因奏對切直上怒起輒挽衣畱以俟處決太宗嘆曰真宰相才也上欲建儲密詢於準對曰謀及婦人中官近臣皆不可也惟擇所以副天下望者上屏左右問曰襄王可乎對曰非臣所知也及真宗為太子人望翕然上曰天下心屬太子將置我何地準曰願得所付天下之福也至道二年罷政知鄧州咸平六年除三司使景徳元年與畢士安同相契丹入寇上召羣臣問禦戎䇿畢士安請選將王欽若勸幸金陵陳堯叟以幸蜀為請準曰非親征不可上從準議兵威大振車駕及衞南而捷書來上三年罷相大中祥符七年除同平章事充樞密使八年罷天禧三年復相四年真宗不豫皇太后叅議政準請間曰丁謂佞人也不可輔少主願擇方正大臣羽翼太子上然之準因命楊億草太子監國制且進億以代謂甚密詰朝準被酒自漏言謂乗婦人車詣曹利用第謀逐準遂發周懐政朱能天書事遷準以太子太傅歸班請對不許降太常卿知相州徙安州貶道州司馬仁宗即位再貶雷州司户踰年徙衡州司馬命未至卒年六十三詔許歸葬西京過公安縣民擁道設祭立竹焚幣焚餘竹無根株踰月皆自生邑民嗟賞即生竹地立祠歳時祭之謂其竹曰寇公竹嵗久成林人不忍伐仁宗對輔臣哀準以忠貶死贈中書令萊國公諡危身奉上曰忠佐國遭憂曰愍詔賜準諡忠愍錢惟演素忌準又諂附丁謂作樞密直學士題名記輒不列準後蔡齊言於上即命刋去上又哀準無子以從子隨為後乃擢其壻屯田員外郎張子臯直秘閣俾齎詔河南就賜其家祭酎之初準至雷州吏以圖經獻視其四至云東南門至海岸十里準悟曰吾少時有詩云到海祇十里過山應萬重豈偶然耶南行之初過零陵行槖為溪寇所掠其酋聞而趣還之世言忠義足動獷俗况氣同者乎準剛正篤於自信不能與世俯仰故人多惡之至道郊恩以左正言馮拯為虞部員外郎拯訴於朝罷政事者七年未始少抑雖王旦亦以為好人懐恵又欲人畏威皆大臣所宜避準自以為已任此其短也惡之者或云在相位與張齊賢相傾或云朱能為天書降乾祐縣準知而不言審如是丁謂之拂鬚固足以恱詎致其媒孽耶及謂道出雷州欲見而不可得其不能與世俯仰如此而蔽以險詖庸回不其過歟準知將逝遣人取太宗所賜通天犀帶於洛中半年始致沐浴具朝服束帶北面再拜俄登榻而終非達於死生之數能如是哉王欽若字定國臨江軍新喻人少孤祖郁甞曰吾厯官五十餘年慎用刑活人多矣後必有興者其吾孫乎淳化三年登進士甲科累遷知制誥翰林學士咸平四年叅知政事景徳初契丹入寇欽若請行以叅知政事判天雄軍上親燕以遣之還朝累求罷政事制特置資政殿學士寵之既久又加大學士之名景徳三年知樞密院事大中祥符五年除樞密使同平章事七年兼同天書刻玉使是年罷八年復樞密使平章事天禧元年拜相三年商州捕得道士譙之易畜禁書能使六丁六甲神而欽若贈之詩故罷知杭州踰年復資政大學士資善堂侍讀進司空既而除節制檢校太師同平章事判河南府以疾不俟報赴闕降司農卿分司南京仁宗即位復秘書監改太常卿刑部尚書天聖元年復相進司徒三年薨於位贈太師中書令諡文穆録親屬及門下吏二十餘人前此宰相優䘏未有其比欽若少時過圃田夜視天文有紫微字赤色及使蜀褒城道中有通刺字未暇視而與之見告欽若曰異日位至宰相既去視刺字乃唐裴晉公也自是遂喜神異事且撰文以記之真宗即位欽若判三司理欠慿由司奏蠲乾徳至咸平逋負千餘萬釋繋囚三千餘人以廣恵澤叅知政事日有訟欽若及洪湛貢舉受賂命邢昺鞠之時上顧欽若方隆故湛獨流儋州人以為寃大中祥符間與馬知節同在樞府知節惡其為人不能相下故兩罷之封泰山祀汾隂天下言符瑞欽若皆與焉朝廷有所興作必委曲遷就以合上意與丁謂陳彭年林特及内臣劉承規交通縱跡詭異時論謂之五鬼真宗作喜雪詩誤用旁韻王旦白欽若曰天子詩可校以禮部格耶他日上謂輔臣曰王欽若㡬為衆所咍與楊億等同譔册府元龜有褒詔則自為表謝譴問則戒吏云第言楊億等故馬知節面斥其姦㒺其後仁宗亦謂王曾曰欽若所為真姦邪也五子皆夭以從姪寅亮為後欽若平日所撰有天書再降泰山祥瑞圖鹵簿記彤管懿範天書儀制翊聖傳聖祖事跡羅天大醮儀五嶽廣聞記遷叙圖列宿萬靈朝真圖共數百卷丁謂字公言初字謂之蘇州人甞袖文謁王禹偁禹偁愛其文即為詩贈孫何及謂比之韓桞名遂大振淳化三年登進士第累擢知制誥諌議大夫兩為三司使大中祥符五年叅知政事九年除節制知昇州天禧間復叅知政事改樞密使四年與李廸同相廸對上斥謂姦邪同罷而謂詔留加司空封晉國公仁宗即位進司徒兼侍中坐雷允恭移山陵皇堂事罷少保分司再貶崖州司户叅軍凡五年又徙光州又三年徙道州明道末復祕書監致仕居安州又徙光州卒年七十二詔賜錢十萬絹百疋謂淳化間為福建轉運使初置龍焙嵗貢團茶數品供御咸平初峽路蠻擾邊㑹分川峽為四路謂領䕫州轉運使措置蠻事作誓刻石柱境上其後又入寇止委其酋領討平之居五年詔許自舉代乃舉薛顔景徳初契丹入寇謂知鄆州北騎稍南民大驚趨楊劉渡舟人邀利不時濟謂斬死罪囚於河上舟人懼不復稽阻又令廣旗幟擊刁斗聲振百餘里敵亟走遁大中祥符初議封禪未決謂因言大計有餘議遂定謂機敏有智謀憸巧險詖亦鮮其儔文字經目雖千百言無遺忘至三司案牘有差雖老吏不能曉者決於一言皆中其理朝廷營造莫不兼領凡奏祥瑞事皆謂及王欽若與焉少遊江南遇吕洞賓語之曰君狀貌同李徳裕言訖不見其後果驗弟誦説諫子珙珝玘珷馮拯字道濟河陽人太平興國二年登進士第咸平中擢樞密直學士明年同知樞密院事景徳初改簽書明年叅知政事久之以疾丏罷大中祥符四年知河南府七年除御史中丞又以疾除户部尚書知陳州真宗問王旦曰拯屢求閒郡何也對曰馬知節常薄拯志在節旄不敢請大藩也天禧四年拜相五年進右僕射仁宗即位遷司空兼侍中天聖初罷相授節制檢校太尉兼侍中判河南府卒年六十六贈太師中書令諡文懿子用己恕己端己誨己稱己勤己行己虛己潔己初拯通判廣州在太常博士彭惟節之上及郊祀覃恩以正言遷虞部惟節遷屯田皆員外郎而自謂與叅知政事寇準有隙上封言其事上為罷準乾興初與丁謂在相位謂獲坐祈拯營免時太后欲殺謂拯言上初即位誅大臣駭天下耳目謂得釋死拯嚴重中人傳宣中書未甞與坐林特常詣第累日不得通既而令至中書卒亦不見隆平集卷四
