body:
  text: 隆平集卷十一宋曽鞏撰樞密夏竦字子喬江州人父承皓太平興國初上平晉策補右侍禁與北敵戰歿於河朔竦以父死事恩授潤州丹陽縣主簿景徳四年舉賢良方正科入等仁宗封慶國公宰臣王旦薦竦才遂命教書資善堂累擢知制誥與妻楊訟左遷天聖中復知制誥遷翰林學士又兼龍圖閣學士五年樞密副使七年叅知政事與宰相吕夷簡不協徙樞密副使明道二年罷為禮部尚書知潁州景祐三年為三司使元昊叛建節知永興軍徙涇州明年兼陜西安撫經略招討等使還判永興軍進宣徽南院使與陳執中共事不協徙鄜州又徙河中府慶厯二年以為樞密使諌官御史皆言竦姦邪在陜西怯於用兵今用之則邊将之志墮矣凡十八疏罷之本鎮言尚不已乃改吏部尚書知亳州明年除資政殿大學士又明年復宣徽南院使河陽三城節度使判并州又明年加使相判大明府又明年召為宰相言者又以為常與宰臣陳執中不恊不可共事乃改樞密使封英國公慶厯八年罷知河南府皇祐九年加侍中明堂恩移鎮武寧徐州大都督府長史改封鄭國公明年以疾求歸卒年六十七贈太師中書令初諡文正考功劉敞以為世謂竦姦邪諡文正未允公議改曰文莊子安期天聖三年竦丁母憂以宰相王欽若素與厚善乃微服至京欽若主之遂復起居西掖所居多部中商販喜離間僚屬以鉤致其事雖待家人亦不以誠故時以姦邪目之慶厯末京師一日無雲而震者五上召翰林學士張方平謂曰夏竦姦邪天變如此宜草詔出之遂有河南之命竦少苦學六經諸史百氏陰陽律厯之書皆博洽亦善為文朝廷大典册屢以屬之大中祥符間叅政丁謂請釃金水河作后土祠三司使林特欲治玉清昭應宫複道𤼵運使李溥欲致海上巨石為三神山於會靈觀池中羣臣争言符瑞竦獨抗疏以為不可其役遂寢知洪州其俗信巫有疾輙屏去親屬飲食衣藥悉聴於神死者甚衆竦索部中得巫一千九百餘家毁其淫祀以聞朝廷詔江淮以南皆嚴禁絶知襄州嵗饑發公廩募富人出粟常全活數萬人賜詔褒諭王徳用字元輔父超趙州人太宗尹京召𨽻幕下即位以𨽻御龍直累以戰功進擢淳化三年遂至河西軍節度使殿前都虞候真宗即位加檢校太傅北敵入寇從幸大名府以傅潛逗撓命超帥鎮州又領真定高陽三路於遂城遇敵斬禆王騎将十五人俘馘二萬計手詔襃之咸平六年副帥王繼忠與契丹戰於望都縣而超不赴援繼忠遂陷敵景徳初上駐蹕澶淵召超赴援又行頗緩敵遂深入㑹通和好止罷三路帥卒於青州年六十二贈侍中子徳用徳基徳恭超為将善部分御下有恩與高瓊同典禁旅常因休沐過營壘軍校不将迎瓊命箠之超曰若縁按習可懲其不肅今不宿戒何名責之人稱其恕至道二年遣将五路伐繼遷超将兵六萬趨援夏州徳用從行為先鋒年纔十七部萬人戰鐵闗斬獲甚衆進師烏白池他将失道敵勢頗鋭超持重不進徳用以精兵五千轉戰三日敵遂却乃領衆要其歸路距夏州五十里先據要害下令曰敢亂行者斬一軍肅然超亦為之按轡繼遷引避之以功授内殿崇班累擢至觀察使明道二年以檢校太保簽書樞密院事是年改樞密副使景祐二年同知樞密院事寳元元年加宣徽南院使二年罷以嘗令知府州折繼遷市馬為王㳂所發初蘇紳言徳用貎類藝祖宅枕乾岡上匿其疏既而孔道輔又以紳之言劾奏之降千牛衛上将軍知隨州慶厯二年復留後加節度使又復宣徽南院使進使相踰年以太子太師致仕復起判鄭州至和元年樞密使同平章事嘉祐元年請老以魯國公為景靈宫使卒年七十八贈太尉中書令諡武恭子咸熙咸融咸度咸英咸康徳用判澶州常迓敵使劉六符六符曰比嵗大熟非仁政所及邪曰明天子在上豐年乃其常矣至和末富弼為相契丹使來命徳用伴射敵使曰天子以公典樞密而用富公為相可謂得人矣上聞之賜徳用御弓一矢五十狄青字漢臣汾州人初為騎御馬小底後𨽻拱聖軍選為散直元昊叛擇青為延州指揮使前後二十五戰中流矢者八常破金湯城略宥州屠􅀈咩嵗香毛奴尚羅等族燔積聚數萬收族帳二千餘生口五千餘又城橋子谷築招安等堡寨以功遷至澶州刺史累擢加節鉞皇祐四年樞密副使以宣徽南院使宣撫荆湖南北經制廣南東西路盜賊五年平廣源州蠻儂智髙還復樞密副使是年陞樞密使嘉祐元年以言者謂青家數有光怪罷為使相河中尹知陳州髭𤼵疽卒年五十贈中書令諡武襄子諒諮詠諫譓説初韓琦范仲淹經略陜西見青皆器遇之尹洙亦謂青有良将才青慎密寡言其計事必審中機㑹而後發行師正部伍明賞罰雖敵在前士卒無敢後先者故所向必有成功仁宗聞其在陜西數戰勝欲召見問其方略適敵寇平凉止命圖形以進久之方大用而智髙起廣源州破邕及㳂江九州上憂顧左右未有可屬者青上表請行明日賜對且言臣起行伍非戰伐無以報國願得蕃落騎兵數百益以禁卒當羈賊首致闕下上壯其言遂授以将鉞宴垂拱殿遣之先命孫沔余靖為安撫使討賊未克故又用青青至合沔靖三将兵次賓州召廣西路兵馬鈐轄陳曙按其金城驛遇賊不戰之罪及殿直袁用等三十一人悉戮之軍士震恐遂下令止具十日糧明日絶崑崙闗出歸仁鋪先布陣成列而賊以覘者之誤來獨後遂失險乃悉衆逆戰前鋒孫節戰死山下而賊勢方鋭青躬執白旗麾騎兵進縱左右翼出其意外賊衆大潰斬首二千二百級獲偽官五十七人智髙夜縱火焚城而遁詰朝青入按城中獲金帛鉅萬馬牛數千築京觀城之北隅招復俘脅者七千二百使還其家初所獲有衣繢金龍者衆謂為智髙青曰安知非詐寧失智髙朝廷不可誣也後智髙果不死人服其詳慎尹洙以貶死青懐知己常賙恤其家髙若訥字敏之并州人十嵗喪父寓家衛州因居焉天聖二年登進士第累擢天章閣待制權御史中丞慶厯七年樞密副使皇祐元年叅知政事三年樞密使五年罷除觀文殿學士兼翰林侍讀學士同羣牧制置使判都省卒年五十九贈右僕射諡文莊御篆其碑額曰儒賢之碑有文集二十卷子彦輔保衡安石吉甫元規若訥苦學强記古今傳記莫不徧閱於申韓管子之書尤其所好亦習醫書雖國醫相與評論必為所困然拘古方書以升量湯劑多過而用性温平藥治疾少効特以博覽强辨取勝耳皇祐間累詔叅定尺以制鍾律論久不決若訥以漢貨泉度一寸依隋書定尺十五鍾上之初若訥知棣州商河縣縣多窪田舊令或假民工種以治之若訥獨棄而不耕知諌院時范仲淹論吕夷簡過失貶知睦州余靖尹洙亦繼被黜歐陽修移書責若訥阿附宰相而不言若訥忿而繳奏其書修謫夷陵令而若訥遂為時論所鄙權御史中丞宰相賈昌朝與叅知政事吳育數爭事上前明年春旱上詢所以若訥遂引洪範以謂大臣不肅而雨不時若昌朝育因是俱罷若訥即大用公議亦短之惟盜起甘陵議者多欲招降獨若訥言河朔重兵所聚若釋不討後且啓亂為夷狄笑於是始議定人以為當田况字元均其先京兆人後徙居信都石晉之亂祖行周陷北敵景徳初敵復内寇以所略數百人屬其父延昭悉縱之因亦遁歸累官至率府况初舉進士賜同學究出身不就天聖八年登進士第又舉賢良方正科入等累擢知制誥龍圖閣直學士龍圗閣學士翰林學士兩為三司使至和元年樞密副使嘉祐三年樞密使四年以疾免除尚書左丞觀文殿學士以太子少傅致仕卒年五十九贈太子太保無子以弟之子至安為後初况從夏竦辟為陜西經略判官叅都總管諸将悉兵擊賊况極言其不可乃止又言所以給邊者十四事多見聴用在三司約景徳㑹計録以今財賦所入多於景徳而其出又多於所入著為皇祐㑹計録上之冀以悟上庶更立經制使民充實而縣官有餘用焉况之為人寛厚明敏與人若無不可而非義不可干也於天下事小利近功則置而不論所及必朝廷先務而可以利民者有奏議三卷著好名朋黨二論常知成都府自李順王均之亂蜀守皆得便宜從事雖或小罪并其家内徙流離道路失所者頗衆况察其非有甚惡釋之又聴斷之明蜀人以比張詠包拯字希仁廬州人天聖五年登進士第累擢天章閣待制龍圖閣直學士權三司使嘉祐六年遷給事中正三司使數日拜樞密使遷侍郎辭不受七年薨於位年六十四贈禮部尚書諡孝肅子綖初拯以大理評事知建昌縣辭以親年髙改和州管庫而親不欲去鄉里遂解官就養及親亡廬墓側終喪不忍仕久之知揚州天長縣有訴盜割牛舌者拯曰第殺而鬻之俄有告私屠牛拯曰已割其舌矣非私殺也盜色變遂引伏嘗使北敵敵典客曰雄州開便門欲誘納叛人刺候疆事邪拯曰誠欲刺之自有正門何必便門也此豈嘗問􅃰州門邪敵有沮色為御史言諸道轉運加按察使之名以苛察相尚奏劾官吏更倍於前皆捃摭細故使吏不自安詔為罷之除陜西轉運使既行數日有他路監司對而求章服者上不悦因傳宣中書曰包拯使陜西未嘗自言也可齎三品服賜之及知諌院數論斥大臣請罷一切内降又録唐魏鄭公三疏請置座右及别條七事言明慎聴納辨别朋黨愛惜人才不主先入之説蕩去疑法條責臣下牽録微過其論甚美在陜西奏罷斜谷務造船材木十萬及罷七州河椿竹索數十萬奉使河北言牧馬占邢洺趙三州沃壤萬五千頃悉請以予民從之知瀛州除放一路所負回易公使錢十餘萬仍奏諸州毋得回易公使錢遂為著令開封舊制訟牒令知牌司收之於門外拯知府開門使徑至庭下辨曲直京師大水拯以勢家多置園第惠民河上歲久堙塞遂盡毁去宦者偽増地契歩數悉奏劾之權貴為之斂迹權中執法請立皇嗣陳教養宗室之法責諸路監司聴御史府自舉屬官諫官御史不避二府薦舉兩制得至執政私第減一嵗休暇日皆施行及攻罷張方平三司使而除宋祁拯又屢擊祁在蜀宴飲過度遂除拯三司使翰林學士歐陽修疏拯所奪蹊田之牛罰已重矣又貪其富不亦甚乎拯居家避命者久之在三司和市上供物以革科率之擾其為人不茍合未常偽辭色以悅人平居無私書故人親黨亦皆絶之人多憚其方嚴雖里巷婦人穉子莫不知其名仕至通顯奉已儉約如布衣時少為劉筠所知筠無子為奏其族子為後而請還其所没田廬孫沔字元規越州人天禧三年登進士第累擢天章閣待制龍圖閣直學士樞密直學士皇祐五年樞密副使至和元年罷為資政殿學士知杭州加大學士徙青州又進觀文殿學士移并州諌官御史吳及沈超彈奏沔在杭并不法事移壽州按實如奏責寧國軍節度副使復光禄卿分司南京㑹恩除知濠州以禮部侍郎致仕英宗即位起為資政殿學士知河中府又復觀文殿學士知慶州徙延州卒年七十二沔為吏有才力在言職以直稱知慶州三司所給特支物惡而估直髙軍人有語而優戲及之沔曰妄言揺衆驅出命斬之諸将為請猶杖配嶺南明日散特支羣情帖然自明州徙秦州仁宗勉以邊事對曰秦州不足留聖慮陛下當以南方為憂明日報蔣偕陷賊上謂輔臣曰南事如孫沔所料遂以屬之在杭并淫資貪暴杭州黜配人以百數及徙青州皆竊其文案以行而訴者無以自解慶厯初監司稱寛弛故加轉運司按察之名自是雖将相大臣出守方郡者不免窘辱遂罷去按察稍抑其權而嘗厯要官者輙復輕肆及沔之罷監司皆坐黜未幾真定吕溱復以罪廢而居方面者始不敢慢法守焉宣徽使昝居潤字廣川魏郡髙唐人少有氣節常為後唐樞密院小吏景延廣留守西洛補為右職契丹犯闕以兵圍延廣家故吏悉避去特居潤力為全䕶時論多之仕周至宣徽南院使建隆初仍舊職是年除義成軍節度使檢校太尉卒年五十九贈太師張美字𤣥生清河人少為三司小吏周世宗建節鎮寧美掌郡財賦即位累擢左領軍衛大将軍三司使久之除宣徽南院使仍領三司使李筠鎮上黨美度其必叛潛於懐孟多積芻粟建隆初美亦以宣徽使居三司如故李筠叛太祖親征糧運有備美有力焉以功除寧國軍節度使鎮同州五代以来官給錢民間長吏十取其一謂之率分錢美至同州官市木美不受率分錢宋興始革其弊諸郡尚或未悛既而有訴其事者皆坐責而美獨免太宗朝授美環衛官因求致仕卒潘美字仲洵魏郡人少倜儻常謂其里人王密曰漢代将終兇臣肆虐四海有改卜之志大丈夫不於此時立功名取富貴與萬物共盡可惜也仕周至客省使太祖與美素相厚受禪命諭㫖中外陜帥袁彦兇悍上懼其有變詔美監其軍俾圖之美至諭以天命彦遂入朝上言潘美不殺袁彦而彦朝覲成我志矣上親征李重進以美為揚州巡檢録功除團練使湖南既平授美潭州防禦使劉鋹數侵湖湘美擊走之溪峒蠻獠自唐以来為居民患美亦討平開寳三年命美征嶺南以尹崇珂副之由賀州進兵相繼破賊數十萬衆俘斬不可勝計遂擒鋹至闕下又平樂範等所據容韶五州之地嶺表遂安詔與崇珂同知廣州七年冬詔與曹彬率師伐江南江南平九年除宣徽北院使太宗即位改南院太平興國四年親征劉繼元降因命美鎮太原三交西北三百里地號故軍最險阻戎人之咽喉也美帥師襲之虜衆遂遁美安撫至代郡適戎人萬數攻近塞美誓衆衘枚大破之俘獲甚衆雍熙三年詔與曹彬崔彦進傅潛等北伐美獨拔寰朔雲應四州有㫖䕶其民内徙敵復至楊繼業戰歿於陳家谷口詔削三官四年復舊未幾加太師又兼同平章事封韓國公卒年六十七贈中書令諡武惠郭守文字國華太原人父暉戰歿守文方十四嵗哀毁過人周擢為東班副使開寳中從潘美征嶺南又從曹彬拔金陵彬遣䕶李煜赴闕煜無生意守文語之曰國家止希漢武之開疆豈責防風之後至也煜遂釋然守文以戰功累擢至武州團練使雍熙四年除宣徽北院使端拱元年出為鎮州路都帥加南院二年卒年五十五武夫悍卒皆為流涕守文善撫士卒所得俸禄悉以宴犒死之日家無餘資先是諸将邀功生事自岐溝君子館之敗朝廷患之以守文知書而沈毅有謀故自近臣付以邊任上聞其卒深所嗟惜雷有終字道成工部侍郎徳驤之子以父任授官初任兗州莱蕪縣尉𤼵知監劉琪姦贓即代其任遂累加進擢李順之亂為荆湖䕫峽轉運使至廣安軍夜遇賊衆圍既合有終引竒兵從後擊之赴水火死者不可勝計久之除諌議大夫知成都府次簡州寓佛舍度賊之至命左右重閉土人嚴更備初夕間道而去賊果圍寺牆壊止得擊柝者咸平二年王均叛除觀察使復知成都府既至而均偽開城若将遁有終及上官正石普徑馳入賊閉闗伏𤼵僅墜堞而免乃築壘城北焚城樓均始遁石普楊懐忠襲至富順監獲之蜀平遷留後景徳二年擢宣徽北院使卒贈侍中有終險側喜攻人過失有吏幹善撫士卒李用和字審禮章懿皇后之母弟也少困窮劉美得之於民間奏以為三班奉職章懿薨特除禮賓副使累擢節度使殿前副都指揮使以老乞罷軍職除宣徽北院使慶厯五年改南院加使相進檢校太尉兼侍中卒年六十二贈太師中書令追封隴西郡王子珣璋琚𤦺瑛瑊瑋球玘瑋尚福康公主用和起民間以帝舅位将相小心避權勢公使錢正任以上許私用而用和悉以為軍費不入其家郭承祐字天錫開封人娶華王元偁女永定郡主授供奉官累擢至建武軍節度使皇祐元年除宣徽南院使同羣牧制置使出判應天府徙亳州諌官御史劾奏承祐在應天府擅批宣頭留上供糧米及擬翰林所使用器出入狂僭落宣徽使卒年五十九贈太尉諡曰密子士遜士選士逸士逵士達承祐驕侈狡獪所至多興作為煩擾又好言事指切人過失時謂之武諌官判許州蘇舜元為轉運使薦其有将帥才其政如龔黄上謂大臣曰承祐庸人而外臺薦之如此何所取信哉張堯佐字希元河南人温成皇后之從父也天禧三年登進士第累擢天章閣待制權知開封府加龍圖閣待制直學士權三司使遷禮部侍郎正除三司使諌官御史言堯佐主大計諸路困於誅求内帑疲於借助上方祀明堂召問經費如何對曰事已辨矣賜詔褒諭皇祐二年除淮康節度使羣牧制置使宣徽南院使景靈宫使御史中丞王舉正諌官吳奎等彈奏恩寵太過以至留百官班廷議遂罷宣徽及景靈宫使三年復以為宣徽南院使徙天平節制卒年七十二贈太師子吉甫山甫申甫寇甫正甫隠甫師甫元甫儀甫堯佐憑戚里以進無可稱者隆平集卷十一
