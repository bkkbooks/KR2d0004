body:
  text: 隆平集卷十六宋曾鞏撰武臣藥元福太原人有勇善射少為軍職在後唐為裨將晉少帝即位契丹入宼親征次澶淵登陴望敵衆不見其際元福與慕容鄴各以二百騎奮擊陣前敵遂大潰明年敵復内侵張彦澤率師遇之陽城糧道隔絶仍乏水草諸將皆以敵乗順風宜少俟之元福曰俟風回吾属為擄矣彼謂我不能逆風戰今出其不意兵之詭道也彦澤従之殺獲甚衆追奔二十餘里以元福為威州刺史西戎三族攻靈州命元福佐朔方節度使馮暉討之朔方距威州七百里地無水草謂之旱海攜糧至暉食盡詰朝行四十里而敵騎數萬扼要路暉大懼遣人致賂求成雖許及日中猶未决暉曰奈何元福曰彼正欲困我耳察其勢敵雖衆特依西山而陣者其精兵也請以驍銳先薄西山彼或少卻當舉黄旗為識合勢擊之暉善其謀斬馘殆盡漢乾祐中鳳翔王景崇河中李守正永興趙思綰結蜀兵為援以叛元福従暉進討兵衆寡數倍他將皆為卻而元福擁數百騎獨出令曰敢回頭者斬衆効死以戰遂有成功慕容彦超盗據兖海周祖命曹英為帥向訓副之以元福為行營都虞候謂曰已諭英訓勿以軍禮見汝及元福至英訓皆父事焉㑹親征城遂㧞以功除建雄軍節度使世宗討劉崇糧不繼而班師命元福殿崇出追元福擊走之在周凡改四鎮宋興加檢校太師卒年七十七贈侍中郭瓊字國華幽州盧龍人少事契丹遷至都校後唐明宗朝挈族來歸授以團練使晉末中原多故盗賊蠭起徳光以瓊為忻州刺史即單車赴治盗畏其威相與遁去漢乾祐中淮人攻密州以瓊帥東路行營淮人聞之亦亟引避劉銖守平盧稱疾不朝隠帝疑其叛詔瓊領兵屯青州銖將害之張宴伏兵幕下瓊無懼色銖亦不敢發瓊徐為言去就禍福銖遂趨召周顯徳中為齊州防禦使嵗饑出俸以濟之民多自鄰境至者郡人詣闕以言詔為立碑宋初以左衛上將軍致仕卒瓊推賢接物有士君子之風所至民懐愛之何繼筠字化龍河南人父福進仕周至節度使五代史有傳福進節制鎮州繼筠補牙職以偏師出玉門斬并人數千級賞功除刺史契丹入宼又擊敗之宋興命䕶兵關南乾徳六年太祖親征太原繼筠奪并人汾河橋又敗其衆於城下開寳末契丹來為并援繼筠屯石嶺闗追奔數十里斬馘千餘級遂擢授建武軍節度使屢以少擊衆在塞上二十年北人畏其名多繪其像而瞻拜之卒年五十繼筠兒童時嬉戲必分布部伍為戰陣狀及長善射深沉有謀與士卒同甘苦子承矩字正則開寳二年従繼筠討劉崇生擒其偽將胡澄四年特除閑廐副使太平興國中監兵泉州以平草㓂功遷閑廐使更擢權知河陽徙潭州居六年端拱初除淄州刺史簽書滄州事時契丹數宼邉承矩請屯兵於順安寨西闗易河溝口引水東西三百餘里南北五十七里築隄瀦水以助要害太宗用其䇿属霖潦為患議者多攻其失承矩援漢魏至唐故事以折之詔以承矩為河北制置屯田使民遂獲莞蒲魚蛤之利而稻田嵗入亦助邉餉自是髙陽並海以抵順安絶契丹奔衝之虞又言順安至西山不逺百里亦多川源願因而廣之用息外患朝廷雖嘉之未及行也真宗即位常手疏和戎為息民之利景德初契丹修好上益善其有謀又命知雄州進本州團練使兼安撫使時北使初至承矩以為待之禮宜得中庶可乆也上嘉納乆之懇求罷徙齊州卒年六十六贈相州觀察使子龜齡遐齡九齡緣邉及涿易州軍民聞承矩卒無不流涕相與至雄州發哀供佛何氏世為名将而承矩好學有文所與逰者必賢士大夫有文集藏於家平時章疏論事多適用既卒上遣内侍就其家取存日奏疏進内太宗知其好學喜吟詠前後命中貴人賜以御製并書積五十餘軸又面付手札以褒之初除團練使真宗謂宰臣曰承矩將家子知書好名以才能自任宜授以羙名遂除英州及丏罷瓦橋詔自擇代遂薦李允則亦良將也承矩御下以誠同其甘苦邉民有告機事必欲欵語無所猜忌故敵中動息無不逆知至道初敵騎萬餘夜逼城堞遲明承矩出戰斬獲甚衆仍得其酋長敵始引去議者猶以開關不俟命為罪故徙滄州是夏魏廷式採訪河北得其功狀朝廷遣使實覆將士始獲推賞承矩治滄雄州三任績效甚著楊廷璋字温玉真定人祖洪裕少漁貂裘陂有以二石雁授之者其翼一揜左一揜右曰北嶽使也是年生女為周祖淑妃明年生廷璋以淑妃得賜官遂至節度使常鎮晉州而隰州闕守乃請監軍李謙溥權領州事謙溥至隰并人圍其城或請速救之廷璋曰賊遽至必未攻城乃募死士百數潛遣諭謙溥相應夜銜枚擊之并人大潰逐北數十里宋興荆罕儒監晉州兵疑廷璋周之近親欲圖之見必懐刃而廷璋接以至誠卒不敢發周祖常諭廷璋圖涇帥史懿廷璋屏左右示以詔書懿受代入朝遂免禍時以罕儒之不能加害為若有施報也廷璋被詔單騎朝覲加檢校太尉王審琦字仲寳河南人仕周至防禦使沈毅善謀所至有政績世宗征淮舒州堅壁不下以郭令圖為刺史命審𤦺司超將兵攻城一夕㧞之令圖入復見逐於郡人審𤦺方進軍援黃州聞令圖被逐乃選騎銜枚襲城夜敗其衆而復納之遂以兵破紫金山世宗圍濠梁審𤦺先㧞其水寨乃降及攻楚州審琦料淮人城陷必遁設伏待之卒墮計中宋興従太祖親征李重進論功除忠武軍節度使在鎮累年寛簡使民属邑令有以罪黜縣胥者僚佐以為令不先白是輕主帥也請詰其罪審𤦺曰五代以来諸鎮横暴令宰之職不振乆矣能斥黜吏是可賞也聞者歎服在官嵗得租課量入而用未嘗横斂卒贈瑯琊郡王子承衍尚昭慶公主符彦卿字冠侯宛丘人父存審後唐節度使封秦王五代史有傅彦卿初仕莊宗於太原郭従謙之亂左右皆去惟彦卿與王全斌力射殺數十人莊宗遇害慟哭乆之天成中大破契丹於喜山至晉領同州節度兄彦饒以滑臺叛上表乞歸田里晉釋不問契丹宼河朔彦卿駐澶淵髙行周被圍於鐵丘諸將相顧無敢當其鋒彦卿獨以數百騎奮擊敵遂遁行周獲免開運二年契丹十餘萬衆圍晉師於陽城城中無水人馬多渴死會大風揚塵彦卿遂與張彦澤皇甫遇謀乘勢决戰敗之戎主乘槖駝而遁車帳兵械悉為彦卿所獲及徳光入汴召而責之彦卿曰臣事晉主不敢愛死今日惟命徳光笑而釋之即遣歸鎮武寧方徐宋間盗賊蠭起彦卿至埇橋遇賊李仁恕擁衆數萬攻徐州彦卿至城下賊控馬首請同入城彦卿之子昭序自城中遣人大呼曰相公助賊何也城不可入賊之計不行相率拜馬前而去漢祖得天下封彦卿魏國公至周封衛王加太傅改魏王宋興加太師開寳三年引疾納節鉞退居洛下八年間乗小駟逰佛寺名園人服其曠逹性不飲酒謙恭待士對賔客清談終日不及世務為將有謀善戰所得俸賜皆分給士卒故人樂為用卒年七十六周世宗皇后及太宗皇后皆其女也周恭帝及太祖兩朝俱賜詔不名北兵自陽城之敗畏不敢呼其名馬不飲齕則叱之曰此豈有符王耶戎主北歸其母問人曰符王安在對曰鎮彭門曰符王不來何其失䇿之甚其為契丹所憚如此王全斌太原人父在唐為岢嵐軍使私畜武士莊宗疑而召懼不敢行全斌曰上疑有異志矣若以全斌為質則釋矣父如其言全斌因得隸荘宗帳下厯晉漢間積官至節度觀察畱後宋興除節度使平蜀民訟其掊克貶畱後開寳末復領節制卒年六十九凡貶黜十年怡然自得性輕財故士卒樂為之用曽孫凱字勝之其祖審鈞全斌子也審鈞以擊賊而死其子遂徙居京兆家富於財凱日散施結客與少年馳獵南山下或踰月不歸民有訟其踐田苖者收至府宼凖守京兆見而竒之乃言於朝廷以全斌平蜀之功而審鈞復死於忠義當錄其後遂除凱三班奉職累擢閤門祗候鎮定邢趙都廵檢使元昊反徙監麟州兵以功遷至節度觀察畱後馬軍副指揮使卒年六十六贈節度使諡莊恪子緘彭處仁大方處厚鎮特偉初凱九年在河外數以少擊衆有功因明鎬論奏乃加進擢李謙溥字徳明太原人少通左氏春秋仕晉為西頭供奉官至周任刺史嘗監晉州兵以偏師屢挫太原而屠城掠地録功為多隰州闕守晉率楊廷璋請謙溥權領州事至隰濬城隍嚴兵備未旬日而并人至方盛暑謙溥服絺綌搖羽扇引二小吏登城徐步并人望之勒兵不敢動因以敢死士百數夜縋城與廷璋軍銜枚薄賊營破之逐北數十里斬首千餘級建隆初改慈州刺史乆之詔與孫建進沈繼深王睿進兵太原略地謙溥為畫出入進退䇿衆不能用及班師又謂曰今退兵彼必来乘我宜整衆為備諸將亦不答而為并人所襲狼狽奔走獨謙溥兵成列并人遂卻復移隰州刺史築保安平同等寨敵人十年不敢犯境有招收將劉進勇力絶人屢以少擊衆并人惡之潛為蠟丸書佯遺道上晉帥趙贊得之以聞太祖詔謙溥械進闕下謙溥言并人反間欲我殺之也臣願以血属保其無他太祖為釋進賜金帛開寳中召為濟州團練使㑹邉將失律復詔還莅隰州其後以疾至京卒年六十二子允正允則謙浦慷慨重然諾所賜優厚皆分遺將士故為其所用者莫不盡力允正字修已頗讀書居官嚴毅多行殺戮官至河州團練使卒允正常質其居太宗召謂曰汝父二十年守邉止有一第何故質之曰妹適陳王貧無以具禮耳詔為償值而還其第縉紳多賦詩以羙之允則字垂範以父任為濟州衙内指揮使謙溥卒任左班殿直少以才略聞太平興國七年初置靜戎軍𣙜場特命允則領之自是屢奉使諸路知潭滄雄鎮潞州而雄州嘗再莅焉除寧州防禦使卒年七十六子中和中吉中謹初允則在閤門凡下諸路宣敕真宗必付允則視審而後行京師諸河水門及鄭州水磑皆淳化中允則所開治湖南民嵗輸絹謂之地税絹又屋每間出絹一丈三尺謂之屋稅絹始户給一牛嵗輸米四斛牛斃猶輸謂之枯骨稅皆馬氏暴斂之餘允則治潭州悉奏除之湖湘山田民不耕墾允則下令給諸軍芻皆輸粟藳由是山田遂無遺利潭州舊分兵戍邵州允則謂蠻不擾而益戍兵是長邉患也亦遂奏罷初至滄州葺營壘多開井泉言者以為擾未幾契丹圍城近郊老幼皆入城保而水不乏又斵冰代砲積成深􅅺敵兵遂解真宗召而語之曰頃有言卿擾民者及敵至始見利也王超之敗人心危動允則勸使衰絰向師而哭以解衆忿仍趨整師以進真宗聞而降手詔褒勵雄州𣙜場禁通異物邏者獲珉玉帶及婦人首飾交易者允則縦之曰此以我無用易彼有用也周世宗始以瓦橋闗置州居民惟結茆允則教以陶公私營造皆易為瓦甓矣又合外舊甕城與大城為一始創關城焉濬濠起月隄環以溝塹増廣閻承翰所修屯田架橋引水作梁構亭榭列堤道以通安肅廣信順安軍所以設險者備矣舊城樓可望十里以為斥堠允則曰南北通好安用此為命毁之後乃徙浮圖於北原上所望踰三十里將為新城先建東嶽祠自以黄金百兩為供噐導以鼓吹民間競以金銀噐獻乆之密撤去而捕盗移文北界因以䕶祠為言興版築城就而敵不知也雄州上元舊不放燈允則結綵山聚優樂縱民夜逰諜知北人欲觀燈乃率同僚㑹城北俄有衣紫胡人至出妓女列侍延之傳舍劇飲而罷密使縦所乘騾遁去即幽州統軍也後數日聞為北主所誅矣嘗宴兵而甲仗庫火終宴不救後真宗問其故曰兵械警火甚嚴當宴而燔姦人欲以計見動若捨宴救火其誰不他窺測也真宗善之景徳以後國信往還儀制及所費用皆其所裁定智識開敏處事審當其方略施設雖逰觀亭傳莫不有所寓也賀惟忠沂州人初𨽻周世宗藩邸召補供奉官不辭而去世宗怒及即位不復用宋興擢儀鸞副使知易州以功就遷本州刺史知書曉兵法撫士卒能得其心乘障用兵所向無敵在易州十餘年契丹不敢南牧及卒以其子昭慶為供奉官姚内斌平州人少事北主周顯徳末世宗北征太祖將兵至瓦橋闗内斌為關使開門請降世宗以為汝州刺史乾德中改命慶州十餘年戎不敢犯塞稱之為虎卒年六十四董遵誨范陽人有方畧善御夷狄守通逺軍十餘年蕃漢恱附王彦昇字光烈本蜀人後唐平蜀徙居洛陽顯德末以散員指揮使従太祖北伐至陳橋以軍中擁戴而還彦昇先入殺韓通太祖怒之出為唐州刺史乆之徙原州防禦使卒年五十八彦昇殘忍在原州戎人有犯漢法者㑹賔客則引而前以手捽其耳對衆大嚼沃以巵酒前後敵中有無耳者皆彦昇所殘也故並塞數年戎人畏之無犬吠之警趙贊字元輔幽薊人父延夀尚後唐明宗公主五代史有傳贊七嵗應神童明宗賜童子及第附長興春榜延夀守上黨并其父德鈞皆陷契丹贊獨與母在洛陽晉祖由契丹援立命贊奉母北歸贊在晉末受北朝偽河中節度使北主歸得留鎮河中漢祖起晉陽贊因勸進改京兆尹周世宗征淮南留贊與諸將圍夀陽諸將皆敗贊獨有功及移軍尺椽片瓦無棄者淮南平贊功居多乾德初授晉州刺史兼建隆軍節度使太宗即位来朝而卒贈侍中贊喜讀書接人以禮才長於御衆所至吏民畏服李漢超字顯忠雲中人仕周至殿前都虞候宋興累遷至齊州防禦使關南兵馬都監有善政齊人愛之詣闕求立碑太祖命徐鉉為文賜之刻石太平興國間除觀察使卒贈忠武軍節度使檢校太傅漢超知人疾苦善撫士卒死之日軍中皆殞涕初在闗南人有訟漢超强取其女為妾及貸而不償者太祖召而問之曰汝女可適何人曰農家也又問漢超未至闗南契丹何如曰嵗苦侵暴曰今復爾耶曰否曰漢超朕之貴臣也為其妾不猶愈於農婦乎使漢超不守關南尚能保汝家之所有乎責而遣之密使諭漢超曰亟還其女并所負朕姑貰汝慎勿復為也不足於用何不以告朕耶齊棣監酒之利數倍他郡何繼筠在棣漢超莅齊皆得用以飬士而朝廷不計其所費楊美字仲和太原人仕周至刺史建隆初為北海軍使乾德初征蜀召委以軍政民詣公車乞留者數百人詔遣還不従笞其為首者始去其治尚簡易民愛之如此莅軍亦為衆所服任氣好施俸賜悉以賙親舊官至節度使死之日家無餘財郭廷謂字信臣其先彭城人唐末居淮甸父全義為江南觀察使廷謂初有氣槩頗讀書父卒監濠州兵周世宗征淮破紫金山之衆至渦口夹築壘為浮梁扼濠壽廷謂率水軍犯之世宗又命武行德率師屯定逺以逼濠州廷謂襲敗行德李景遂擢廷謂本州團練使及世宗攻濠勢已危蹙累詔招諭廷謂曰世受江南大恩不敢輕去就願聽稟命金陵世宗許之及使還廷謂望金陵大慟再拜然後以城降世宗曰江南諸將惟卿斷渦口橋破定逺寨足以報李景禄矣濠上使李景自守亦何能為乃授以亳州防禦使復帥濠兵攻降天長在亳有政績乾德初改絳州防禦使蜀平以觀察使知梓州民便其政卒年五十四廷謂有士君子之風李懐忠涿郡人始事太祖為牙校以功累擢至大同軍節度使太祖洛京郊祀愛其山川形勢有遷都意莫敢言者懐忠乘間曰汴都歳漕江淮米四五百萬斛贍軍數十萬計帑藏重兵在焉陛下遽欲都此誰與共處耶上悟急還京懐忠太平興國中卒郭進深州人少傭作有膂力多結豪侠飲博人有欲殺之者富人婦竺氏隂告之乃之晉陽漢祖留帳下北宼屠安陽漢祖遣進拒戰敵敗走以功除刺史及德光盗據汴京復北歸進請以竒兵間道入洺州因定河北諸郡仕周改登州刺史郡多宼盗進悉為翦除吏民願紀其事詔近臣撰文賜之改刺衛州河朔盜匿汲郡山間者稍衆間出攘奪乆不能滅進往攻勦絶民以安居改洺州團練使郡人誦其善政建隆初遷防禦使乆之除雲州觀察使訪竺氏已死得其女撫養以適富民時劉繼元據并門未下以進兼西山廵檢二十年不易其任進聽訟善以鉤距得其情軍政嚴肅戰無不克太祖遣戍西山必戒之曰汝謹奉法我猶赦汝郭進殺汝矣以郡之租賦聴其養士卒有司不復㑹其出入其待之如此太宗征太原命進控石嶺關北兵来援晉進擊敗之并人氣䘮既而為田欽祚所誣進剛忿不能辨乃自經而死欽祚偽以暴疾聞上深悼之進喜周人急所至有遺愛在洺州植栁種荷芰遍城中外其後郡民見之有垂涕者太祖剗五季之弊開億世之業明於知人任將有術付郭進以邢州李謙溥以隰州俾制太原何繼筠以滄景賀惟忠以易州李漢超以關南俾控北邊授姚内斌以慶州董遵誨以通逺軍王彦昇以原州俾禦西宼不易其任皆十餘年待之以不疑蘄之以逺效來朝賜食殿坐遣之則賜予加等擢何筠以節制必示以懋功之賞餘不過㳂邉廵檢欲激其進取之心故二十年間邉無事者非適然也武行徳太原人少負薪道遇晉祖異其所負命數人力不能舉因畱之帳下累擢至寧國軍都虞候開運末北主犯闕行德陷陣中偽請自効因遣送將校數十輩護所取尚方鎧甲還胡中至河隂行德謂衆曰我與若等能為異域鬼耶辭氣慷慨涕泗横集衆素服其威名皆曰惟命遂攻孟州城走其偽節度使崔延勲悉府庫分諸校而權領州事遣弟行友詣太原勸進漢祖喜因來河陽依行德行德以兵翼至京師漢有天下授河陽三城節度使加平章事至周加侍中行河南尹時鹽禁入城者死有抱關卒捕一鬻蔬嫗至庭行德詰之嫗曰入城有浮圖取筥中蔬視而不售俄與卒同捕繫鹽非嫗所有也行德訊得誣狀皆戮之都人畏服以為神明建隆初改忠武軍節制開府儀同三司進太傅卒隆平集卷十六
