body:
  text: 隆平集卷十宋曽鞏撰樞宻王繼英開封人少為筆吏趙普罷相常從者去繼英奉事愈謹普復相以補中書省官真宗在襄邸為前導即位擢引進使未幾除宣徽南院使景德二年樞宻使三年薨年六十一贈侍中謚恭懿王顯開封府人少給事晉邸即位補右班殿直未幾數加進擢太平興國八年除宣徽南院使兼樞宻副使淳化二年罷為節度使咸平二年樞宻使三年罷復建節卒年七十六贈中書令子希逸太常博士直史館希範竝遷官韓崇訓字知禮節度使重贇之子以父任為供奉官累擢四方館使樞宻都承旨景德三年簽書樞宻院事求罷除防禦使求致仕以本官分司卒崇訓長厚謙畏未嘗忤物周瑩左領軍衛上將軍景之子少給事晉邸即位補殿直累擢客省使簽書提㸃宣徽樞宻院諸房公事與内臣劉承珪對領其任非舊制也機要事竝令闗決樞臣皆不敢專之咸平初擢瑩宣徽使三年兼知樞宻院事承珪同罷提㸃諸房是後不復置瑩五年罷除節度使高陽闗都帥屢歷藩鎮以畏懦聞卒年六十六贈侍中謚元惠劉昌言字禹謨泉州人淳化四年同知樞宻院事至道元年罷趙鎔淳化四年除宣徽北院使兼知樞密院事至道元年改南院使至道三年罷李惟清至道三年同知樞宻院事是年改御史中丞王嗣宗字希阮汾州人開寳八年登進士第甲科是年初置司冦叅軍即以授嗣宗累擢至御史中丞改耀州觀察使大中祥符七年樞宻副使八年求罷除大同軍節度使知許州又改感德静難二鎮以左屯衛上將軍致仕卒年七十八贈侍中揚楚間有窄家神廟民有疾不服藥而祠之并州有龍王廟郡人敬信邠州靈應公廟傍有羣狐居之民以祈水旱疾病嗣宗為發運使知并汾州毁二廟燻狐穴淫祀遂息嗣宗所至御下嚴峻頗陵慢士人在朝廷力詆大臣嘗厚結王旦之弟求知於旦旦惡其為人不答故於上前屢言中書不法事雖無實上亦優容之平時忿宋白郭贄邢昺七十不請老亦言於上及其晚年疾甚雖求退章一上而已猶欲得郡而朝廷特授以環衛官致仕頗悒悒不自釋為衆所咍馬知節字子元父全義國史有傳全義太祖深念之知節方七歲召見特授供奉官命樞宻進三名御筆寫知節字賜之少感慨自立未冠監彭州兵有老成風景德三年簽書樞宻院事遷副使大中祥符七年罷天禧元年知樞宻院事二年罷以疾除節度觀察留後求外任授知貝州既而上憫其癯瘁止命歸鎮而上黨大名之民争求迎之卒年六十五贈侍中謚正惠知節大中祥符四年嘗加宣徽北院使在樞府頗輕視馮拯王欽若等賦性疎直遇事敢言不少自屈所與游皆時之賢士居常以方畧自任初監兵潭州何承矩為守頗以文雅飾吏治知節慕之故折節讀書雍熙間護博州兵時劉廷讓敗於君子館知節完城繕甲儲積芻粟僚吏皆不悅既而敵果至以有備引去李順之叛詔與王繼興同討賊繼興惡其不附已遣知彭州付以羸兵扞賊賊十萬衆攻城知節力戰適兵至而賊潰時劉景帳下有叛卒三千知節皆戮之知秦州州嘗質羌酋支屬二十餘人踰二紀矣知節曰羌亦人豈不懷歸悉釋之羌懷其德訖終更不犯塞知益州始請以省校代郷户運舟自是蜀人免破産之患在延州戎冦至方上元遂張燈啟闗宴樂累夕敵不測因引去詔𤼵澶魏六州糧輸定武時敵方内冦知節守鎮州曰糧之來資冦也止令於舟車所至收之魯無所得而遁知節所至皆以威愛臨下而事無不濟特疾惡太過不能無怨也周起字萬卿淄州人也母得吉夢而生起咸異之謂必大其門因名之曰起咸平二年登進士第累擢知制誥樞宻直學士天禧元年同知樞宻院事三年改副使與冦準善丁謂用事四年以疾罷起降太常少卿及謂貶始復祕書監禮部侍郎知潁陳汝州卒年五十八贈禮部尚書謚安惠起善真行書弟越亦以能書稱子延荷延讓延夀景德中詔改鼓司為登聞鼓院首以起主判東封還羣臣多獻文章以頌德起獨上書言天下之勢常患恬於安逸而忽於兢慎願無以告成為恃帝嘉納焉起常患貢舉之弊因建議糊名以革之至今為著令初置糾察司起居其職言止閱文案慮不能盡情請已決而事枉及拷掠非理竝聴訴於本司從之權知開封聴斷明審廷無留事以真宗判南衙聴事之所為繼照堂自是無敢居者仁宗初降誕起方奏事真宗謂曰知朕有喜乎起曰臣不知上曰朕始生子即入禁中懷出金錢賜起起性樂易喜飲酒在樞府常與同列飲曹瑋家多出者獨冦準與起夜漏止纔歸翌日引罪伏謝真宗笑曰天下無事大臣和樂何過之有起前後奏事及對上所問隨焚草外無知其言者家藏書至萬餘卷曹利用字用之趙州人少慷慨有志節讀書畧通大意父諫明經及第至右補闕換崇儀使利用以父遺恩補殿前承旨轉右班殿直選鄜延路走馬承受景德初駕幸澶淵契丹來議通和利用適奏事行在樞宻院選以使敵既講好擢東上閤門使忠州刺史仍賜第一區四年宜州軍校陳進反命利用為廣南安撫使賊平遷引進使大中祥符七年樞宻副使加宣徽北院使天禧元年同知院二年知院事三年樞宻使四年加同平章事乾興元年加左僕射兼侍中充武寧軍節度使天聖三年加司空五年封鄆國公明年改保平節制又明年趙人告其從子汭逆謀遂罷以本官兼侍中判鄧州及汭誅改上將軍知隨州又坐私貸景靈宫公用錢貶節度副使房州安置至襄州内臣楊懷敏逼使自縊以暴疾卒聞年五十九利用狃奉使之勞驟居大任遂自驕肆奏事簾前頗不祇肅多裁抑貴戚宦官而親舊或乘間獲進故不免禍既死人或以為寃子沔淵泳初樞宻既以利用名聞真宗令召問以觀其志明日王繼英奏利用言得將君命雖死不避即授閤門祇候假崇儀副使奉書以行真宗曰彼如貪歲賂亦細事爾或求闗南當以理絶之對曰若有妄求臣不敢生還上壯其言及見戎母横板車軛布器皿與利用共飲食果首及闗南利用曰若歲求金帛以助軍費猶恐大臣議或不同割地之議死不敢聞其政事舍人高正始曰舉國而來不為闗南止得金帛誠媿見國人利用曰若爾則兩國之兵未有休時矣敵度不可屈遂決通好之議而與報使韓杞同至復致書幣以往許其和好自是河朔罷兵利用與有力焉其後宰相李迪面斥丁謂姦邪利用馮拯皆有朋黨利用曰以片文遇主臣不如迪損軀入不測之敵迪不逮臣也及王曽作首相利用争班曾為首班利用有不平之意皆其驕盈自伐故耳姜遵字從式淄州人咸平二年登進士第累擢至諌議大夫天聖六年樞宻副使八年薨於位年六十八贈吏部侍郎子延齡餘慶初遵為御史言青州大姓麻士瑤不法事詔實案誅之其為吏尚嚴而知永興軍太后詔營浮圖遵毁漢唐以來碑碣代磚甓躬督成之因獲進用王晦叔河南人隋王績之後名同英宗御諱故以字稱淳化三年登進士咸平中賢良方正入等累擢龍圖閣待制樞宻直學士給事中太子賓客妻父冦準得罪落職知汝州乾興元年貶郢州團練副使天聖四年復給事中遷工部侍郎御史中丞兼理檢使理檢置使自晦叔始也七年叅知政事明道元年以疾免除資政殿學士知陜州河陽二年樞密使景祐元年加平章事薨於位年七十二贈太保中書令謚文康子益恭益柔初玉清昭應宫災守衛者皆繫御史獄值議修復晦叔上言昔桓宫災桓僖親盡當毁者也漢高廟及高園便殿災董仲舒以為高廟不當居陵旁故災玉清昭應宫非應經義宜思災變之來上與太后悟遂薄守衛者責而罷修宫晦叔方嚴簡重有大臣體雖通顯而儉約如貧時知益州蜀人比之張詠有前張後王之譽有文集四十卷周書竒訓十二卷唐書備問二卷莊列指歸四篇羣牧故事六卷藏於家趙稹字表微宣城人端拱二年登進士第累擢諌議大夫集賢院學士知益州坐市錦寛縱落職久之復舊俄遷樞宻直學士章獻太后臨朝既久劉美有婢出入禁中稹厚結之天聖八年樞宻副使明道二年罷為尚書左丞遷禮部尚書以太子少傅致仕卒年七十六贈太子太保謚僖質子士賓稹少好學嘗為益州路轉運使有平寃獄之稱李諮字仲詢唐宗室峘之後峘貶死袁州子孫因家焉後徙居臨江軍景德二年登進士第累擢知制誥翰林學士權三司使請郡以樞密直學士知洪州坐三司變茶法落職久之復舊職仍權三司使景祐二年知樞宻院事三年薨於位年五十五贈右僕射謚憲成有文集二十卷無子以族子演為後諮幼而父出其母日夕涕泣求母還以至絶葷茹郷里稱其孝天聖初在三司言天下賦入有常而用度日益願一切裁節之詔校一歲經費減宂長者十之三又以商人入粟邊鄙算茶與犀象為虚實三估坐耗官帑請以實錢叅紐初商人有厚利諮革之怨謗滋起而議者是非復不一遂奪職在樞府𣙜茶之法寖壞乃詔諮與蔡齊更議之諮以變法嘗獲罪固辭不許於是復用所變法而官無濫費矣知永興恃䕃犯法者悉杖之境内肅然諮性明達周知世務處劇閒暇居大任務抑僥倖號為稱職三班使臣舊七年磨勘李迪奏減二年諮請自詔下經七年磨勘後方用新制事雖均頗為衆怨王愽文字仲明曹州人十六善屬文應舉開封以回文詩百篇投試卷塲屋中謂之王回文知廬州劉蒙叟薦召試舍人院除夀州安豐主簿又以知制誥陳堯咨薦召試中書賜進士出身累擢至龍圖閣待制進龍圖閣直學士樞宻直學士龍圖閣學士兩權三司使寳元元年同知樞宻院事二十六日而薨年七十贈吏部侍郎子因畧疇畤天禧四年詔博文按朱能王先偽乾祐天書事連逮者衆惟治首惡脅從者請皆得減死論其後章獻太后怒曹利用而博文與内侍羅崇勲鞠曹汭獄於真定府汭伏誅議者或謂博文致之㳂邊軍民逃入蕃部擒致者有錦袍銀帶茶綵之賞間有自歸而為蕃部所得亦不能免法皆處斬博文遣習事者持信紙密招之至則驗而貸其罪減誅死者甚衆詔加褒諭仍推行其法於諸邊郡王疇字景彞以父任將作監主簿天聖八年登進士第累擢知制誥御史中丞翰林學士治平元年樞密副使至二年二月共五十五日而薨年五十九謚忠簡嘉祐末英宗疾稍愈未出疇請以時御朝又請謁祠廟㑹宰執亦請上從之遂聽政焉未幾大用知制誥錢公輔言疇資望輕淺在臺素餐上用疇而出公輔焉疇容服莊潔坐立嶷然吏治審宻文辭嚴麗任中執法屢言事亦或見用其時多有顧望者至和初為開封府判官宦者李允良疑人毒死其叔父訴請發棺驗視疇獨曰驗而無實是無故暴人屍此安知非允良有姦既而窮治果引伏與叔家有怨范雍字伯純初名犯聖祖諱故改今名世居河東曾祖仁恕從孟知祥入蜀為偽相祖龜從隨孟昶歸朝為環衛官父德隆仕至供奉官𦵏河南因家焉咸平初登進士第天聖朝累擢至龍圖閣待制進直學士權三司使天聖六年樞宻副使明道二年罷除資政殿學士改振武軍節度使知延州劉平石元孫戰陷賊降户部侍郎知安州歲餘復吏部侍郎遷左丞加大學士進禮部尚書卒年六十八贈太子太師謚忠憲于宗傑宗師宗賢兩河宿兵大賈轉粟塞下獲利甚厚雍為河北轉運使移它郡緡錢市糴於德棣間運以贍邊頗減横費知永興完城浚池言者以為驚擾詔止其役雍匿詔而趣成之明年葛懷敏敗於定川邠岐間皆恐惟永興人心帖然玉清昭應宫災雍在樞密府太后曰先帝力建此宫一夕幾盡惟幸存三小殿子雍對曰先朝竭天下之力而作之今火出非意豈非天之譴告乎如又將葺之民不堪命矣后悟有詔勿葺雍所至治尚恕好謀鮮成惟薦士多至公卿張耆字元弼開封人年十一給事真宗藩邸及即位授西頭供奉官累擢至節度使大中祥符九年除宣徽南院使兼樞宻副使天禧元年罷天聖三年自淮南節度使加同平章事充樞宻使初名旻七年改鎮山南東道賜名曰耆明道元年進右僕射兼侍中河中尹累封至徐國公以太子太師致仕卒年七十五贈太師兼侍中謚榮僖有子二十三惟一忠一抱一守一如一禮一得一繼一希一歸一昭一純一奉一正一志一平一利一元一本一舉一誠一宗一可一女三十一人其為人有智數真宗嘗使讀論語左氏春秋又賜以宸戒二十條及聖政紀册府元龜故通知傳記至於星􅍓術數之學無不博習其言邊事或象緯變見多中章獻太后在夀邸時嘗出寓其家故臨朝最所優異賜第省西七百楹後言者以樓下瞰郊社乃毁之前後賜予不貲欲其財之不出故為曲欄積百貨與羣婢質易其有疾者親診視收其藥直御諸子嚴日一見之即出外舍所得供饋僚屬頗厚自咸平以後屢有戰功為殿帥時盛興宫室人皆争奉符瑞丁謂王欽若等主其事無敢議者耆獨毅然謂朝廷不足以承天意物論多之張觀字思政絳州人大中祥符七年中服勤詞學科擢高第初名正觀御去正字釋褐將作監丞通判解州累擢知制誥翰林學士權御史中丞寳元元年同知樞宻院事康定元年罷為資政殿學士又除御史中丞以父高年請便郡進觀文殿學士知許州遷尚書左丞丁父憂哀毁過甚既練而卒年六十六贈吏部尚書謚文孝子仲莊仲和仲成京東路舊止通安邑鹽而瀕海禁私煮觀知鄆州兼京東西路安撫使請弛其禁歲免黥配者不可勝計其為人寛厚長者而吏事非其所長知開封府問犯夜者有見人否人皆哂之平生未嘗草書因自為詩曰保心如止水為行見真書性至孝為祕書郎而父居業猶為幕職官請以官回授其父真宗嘉其請擢居業京官官至太府卿太宗嘗以飛白清字賜觀旌其潔白任中執法薦文彦博為御史文彦博致位宰相焉隆平集卷十
