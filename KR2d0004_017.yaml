body:
  text: 隆平集卷十七宋曾鞏撰武臣馬仁瑀魏郡人年十六委質周祖帳下力挽弓二百斤世宗命衛士習射苑中仁瑀獨挽強百發百中賜錦袍束帶從世宗親征劉崇王師不利仁瑀謂衆曰主辱臣死因躍馬大呼引弓連斃將卒數十士氣始振崇遂敗隨世宗征淮南登楚州永寨飛樓距城百步城卒詬罵左右射莫能及召仁瑀至應弦而斃建隆初以佐命功為刺史纍擢至朔州觀察使卒年五十楊鄴或曰繼鄴麟州人少倜儻謂其昆弟他時為將用兵當如鷹逐雉兔弱冠事太原劉崇至節度使太宗征太原劉繼元降得鄴甚喜授以大將軍數日遷防禦使知代州北兵攻雁門鄴以數百騎由小徑背擊大破之遷雲州觀察使判代州授詔副潘美北征以王侁劉文裕護其軍拔雲應寰朔四州時曹彬失律於岐溝詔美護四州民徙內地既而敵復破寰州鄴謂侁等曰敵勢盛不可與戰姑密諭雲朔等將先出寰我師次應州敵必悉衆來拒俾朔州吏民直入石碣谷列強弩千人於谷口以騎士援於中路則三州之衆萬全矣侁沮之文裕亦欲鄴赴敵鄴曰此必敗之道也侁曰君侯素號無敵見敵逗撓豈有他志鄴曰非愛死特殺傷士卒而功不可立耳即率帳下自石朱路趨朔州將行泣謂美曰鄴太原一降將上不殺而授以兵柄非縱敵不擊欲圖報萬一也諸君責鄴以避敵當即死矣因指陳家谷口曰君侯於此張步兵強弩以援使鄴轉戰至此失援則無遺類也美與侁陳於谷口自寅至已侁使人登托邏臺望見敵敗欲爭其功即引兵離谷美不能止乃行二十里聞鄴敗帥兵却走鄴力戰至暮望谷無人撫膺大慟其子延玉死焉帳下兵殆盡猶手刃數十百人因重傷為敵所獲太息曰為姦臣所逼王師敗衄不食三日而死陳將陷麾下猶餘百人鄴謂曰汝曹各有父母妻子速去尚有生還報天子者無與我俱死於此皆流涕不去無一獲還時淄州刺史王貴亦死焉鄴勇而有謀與下同甘苦代北苦寒未嘗獨設炭為政簡易郡民愛之天下聞其死皆為之憤歎上尤痛惜之贈節度使北征之役曹彬岐溝之敗至拒馬河軍民牛馬相踐蹂而死者甚衆彬貶右驍衛上將軍及鄴陷沒潘美削官三資時雍熙三年之春夏也是年十二月復命劉廷讓再舉北伐之兵而全軍陷於君子館廷讓馬斃三易馬始以身免三將繼衄沿邉瘡痍之卒不滿萬計料鄉兵城守皆不習戰事僅自固而已深祁德州既常不守魏博之北雕弊為甚鄴之子延朗其後緣聖祖諱而改曰延昭以鄴蔭補供奉官鄴及延玉俱死太宗憫之擢延昭崇儀副使咸平二年契丹入寇延昭在遂城城小無備衆心危懼延昭集城中丁壯護守偶大寒命汲水注城外及旦冰堅滑城不可近敵遂解去遷知莫州三年契丹復寇邉延昭伏鋭兵於羊山之西自北掩擊且戰且退及伏發敵衆敗績獲其明王函首以獻加本州團練使與楊嗣並命真宗謂宰臣曰嗣及延昭以忠勇自效忌妬者衆朕力芘之以及於此景德初胡馬南寇延昭領兵北地破古城多所俘獲會修好乃止徙髙陽關副都部署在屯九年官至英州防禦使卒年五十六詔録其子傳永德政文廣有差門客之類亦試藝而官之延昭於吏事非所長軍中訴諜皆決於小校周正上知而不責苐戒飭小校而已然其智勇善戰沈默寡言平居未嘗問及家事所得俸賜均遺士卒奉己簡質出入騎從如軍校號令嚴明同士卒甘苦寒不披裘暑不張蓋遇敵必身先功成推其下故人樂為用威震異域守邉二十餘年虜情畏服止呼曰楊六郎其卒也河朔之人皆望柩殞泣王彥超字德升魏郡人少事魏王繼岌在晉為刺史漢為防禦使周節度使兼侍中建隆初加中書令改授二鎮封邠國公以太子太師致仕卒年七十三纍朝皆有戰功時以為彥超居富貴能知止足留福徐州人屢有戰功開寶間以觀察使判雄州凡五年政尚平易民甚便之詣闕借留詔為立遺愛碑卒贈節度使福既貴諸子欲治第福怒曰我受厚祿矣足以庇汝曹平日以身許國猶未有尺寸效更欲居大第為自安計耶太宗聞而喜之其卒也賜金五千兩市第恤其家荆罕儒范廷召皆冀州人少為盜王晏字鎮時徐州人王景字象珍東萊掖人元逹洺州人錢守俊濮州人談延美大名人世宗既戮何徽樊愛能輩乃擇驍勇士為將而擢罕儒為團練使建隆初加防禦使晉州鈐轄恃勇輕敵常懸軍深入虜獲甚衆一夕至京土原劉鈞遣兵追躡之罕儒方據胡牀饗士錦袍裹甲遂直犯賊鋒為并人所殺河東久畏其勇欲生致之及死求殺罕儒者悉誅焉太祖亦深嗟惜罪京土原之不用命者而官其子加等廷召以勇力應募為軍職在周為殿前右番指揮使開寶間纍遷至鐵騎都虞候太平興國二年契丹內寇密邇魏博三年春廷召大破之斬首萬餘級追奔莫州徐寇悉遁未幾卒贈侍中晏開運末為陕西軍職與都校趙暉侯章謀害耶律德光偽命陕帥劉願奉表於漢祖漢祖威聲未振而晏等歸之甚喜即授以節度使及入汴加平章事周録其敗劉崇功改武寧節度使封滕國公因其鄉里以榮之也建隆初以上將軍致仕卒景自後唐為軍職以功纍擢至周為節度使加中書令宋興進封太原郡王卒追封岐王逹初事晉邸太宗即位纍擢至封州觀察使卒贈節度使守俊事太祖於潛宫屢有戰勞髮後有七黑子如斗在民間時有鄉人目為草中鶻言其勇鷙也積官至潘州防禦使卒年八十二延美仕周至控鶴副指揮使建隆初除指揮使纍至觀察使嘗知寧邉軍敵騎驟至城下延美命開門誘之圍城數月開門如故敵卒不敢入而遁久之請老以上將軍致仕卒年八十三贈節度使罕儒及景皆輕財好施折節下士有稱於時髙瓊家世燕人父乾徙居亳州蒙城縣瓊少時在外寢一夕父往視之若見有披金甲而侍其側者父潛異其事及長而材勇給事晉邸纍擢至殿前都指揮使卒年七十三子繼勳繼忠繼宣繼勳字紹先初補殿直太宗見而竒之擢寄班祗候咸平初監兵益州王均叛繼勳引兵與戰賊黨轉鬬至嘉州界敗之復還力攻益州城而王均夜潰以功遷崇儀使徙綿漢劍門都巡檢悉擒滅均餘黨楊承海等衆徙陕口鈐轄還朝陳用兵方略真宗嘉之除宮苑使并代州鈐轄徙岢嵐軍寇襲草城州繼勳謂軍使賈宗曰敵雖衆而不成列是無主帥也急擊之可成功因設伏要害與接戰寒光嶺伏發斬獲甚衆遷弓箭庫使賜金帶錦袍自是纍擢威武保順昭信軍節度使景祐初以年髙進見節其拜特許以子扶掖未幾辭管軍遂改鎮建雄知滑州卒年七十八贈太尉繼勳謙慎有機略善撫士卒故戰常有功子遵度遵範遵甫遵約遵憲遵讓黨進朔北戎人幼為天雄節度使杜重威奴重威愛其淳謹雖長猶令與婢妾雜侍重威敗周祖得之以為鐵騎都虞候建隆初除刺史以軍功纍遷至節度使嘗總禁旅不識字不記兵籍一日太祖問之舉梃以軍司所書兵騎戎器數請上自視上益喜其朴直巡徼京師見珍禽竒獸必放之曰不養父母反養此耶晉邸命親吏臂鷹雛進急欲放及知乃戒之曰汝謹養視小民傳以為笑其變詐多此類杜重威之後寒飢進常分俸以給士大夫或愧焉呼延贊并人少為鐵騎卒太祖愛其武力擢為軍校屢以戰功遷至團練使卒贊忠實有勇遍體文以赤心殺賊字妻子奴婢同爨皆然又刺鏤於鞍勒器用之上出入有破陳刀降魔杵鐵鞭鐵幞頭兩角有刃皆十餘斤乘騅馬絳抹額自謂慕尉遲敬德常出刺保州請於上曰臣服飾竒異願敕郡縣清道太宗笑而不答又請繪形鄭州靈顯王廟願統隂兵滅敵太宗嘗謂近臣曰贊服器詭異朕屢欲誅之既而亮無他志也崔翰字仲文京兆人少有大志風資偉秀太祖一見竒之以𨽻麾下即位屢擢刺史太宗蒞政進團練使明年講武近郊命翰專金鼓軍容甚整上悅以藩邸時金帶密賜之謂左右曰如崔翰者必不能事晉朝言政出多門故也從征太原流矢中頰猶戰不已上親至其帳撫之北伐班師次金臺驛大軍南向而潰上令率衛士千餘止之翰請單騎以方略告諭衆遂定戮一人以復命上喜因命翰征定州得以便宜從事沿邉諸軍並從節制軍市租儲聽其專用其冬會李漢超崔彥進破北兵於徐河敵投西山坑谷死者不可勝計俘馘數萬他物又十倍焉擢武泰軍節度使改鎮威德軍至鎮方盜賊充斥翰誘其渠魁諭以禍福乃相率出境又徙髙陽召還以疾留京師疾間見上曰臣不願死於家馬革裹尸足矣上壯其言復命赴所治卒年六十三贈侍中翰沈毅有謀所至多成功輕財好施死之日家無餘資解暉洺州人自後唐𨽻兵籍凡受詔征伐必身先士卒臨敵所難者暉處之若甚易金瘡被體幾無完膚建隆以來屢有攻伐積官至團練使卒年八十曹翰魏郡人少為郡小吏周祖鎮鄴竒之以𨽻世宗幕下世宗鎮澶淵以為牙校及尹開封翰猶在澶淵聞周祖寢疾不俟召來見世宗密言曰王為冢嗣不侍醫藥何以副天下之望世宗悟入侍禁中以府事命翰總決即位補供奉官稍遷樞密承旨世宗征淮南留鎧甲千數在正陽既而遣降卒八百來京師翰遇於道懼其過正陽劫兵器叛盡殺之世宗不加責乾德中伐蜀以翰帥荆襄鑿山開道商旅以濟又詔兼漕運而糧餽不乏蜀平全師雄擁衆十萬叛翰與曹彬劉廷讓討平之又軍校吕翰盜據嘉州翰及諸將奪其城諜知賊欲三鼓復攻城誡擊柝使緩向晨猶二鼓賊衆不集而潰遷蔡州團練使從征太原會河決詔翰董役指日而訖事後復有決其績用亦然曹彬平江南翰獨下池陽而煜將有胡則者以江州拒命翰遂屠其城得公私金帛億萬計偽言欲致廬山羅漢鑄像於闕下詔從其請因調巨艦十百同載所得以歸朝廷涵容不加詰問録其功授桂州觀察使判潁州復從太宗征太原因伐幽州命翰軍東隅有卒得蟹以獻翰謂諸將曰蟹水物而陸居非其所也又能行不能進則城不可進拔之象其班師乎卒如其言師還除威塞軍節度使仍判潁州未行詔翰督役開河南自雄至莫以通漕運翰遣徒伐巨木於敵地授五騎以五色旗為斥堠如遇寇則舉白旗之類又起烽燧於境上敵疑而不敢近塞事遂濟乃歸鎮居數嵗汝隂令孫崇訟其不法鞫得實削奪官爵送登州久之復千牛衛上將軍卒年六十五贈太尉咸平初賜諡武毅翰天資殘忍貪冒多智數喜誕妄飲酒至數斗不亂對上奏事雖數十條皆默記不少差翟守素北海人仕周至刺史宋興纍擢商州團練使卒年七十一自漢䇿名將六十年以謹厚自持所至稱治建隆間麟府內屬戎人爭地不決因擾邉民詔守素馳傳以諭曲直莫不悅服梅山洞蠻人叛又詔守素討平會隂雨弓弩筋角解弛詰朝將接戰而夜削木為弩遲明大破其衆焚蕩巢穴賊首包漢湯者與數郡大吏富民交結守素獲其私書悉焚之以安反側守素建隆之前已在髙列而後進多秉節鉞獨守素二十年不遷而能恬不為意折御卿纍世邉將奄有麟府之地從祖阮父德扆皆永安軍節度德扆卒御勳為留後開寶九年來朝授泰寧軍節度使未行卒朝廷遂降告敕授御卿間廄使改為崇儀使知府州以功擢至本州觀察使未幾率兵大敗戎人於子河汊除永安軍節度使自是戎兵不敢深入寇一日虜將韓德臧為李繼遷所誘內侵方御卿被病力疾出戰虜將聞其來不敢進既而疾急母令人召歸御卿曰世受國恩外寇未滅御卿之罪也臨敵棄士卒而歸耶太夫人勿見念也言訖泣下翌日卒年三十八贈侍中録其子惟正知留務侯延廣西河平遙人太子太師益之孫也延廣年十嵗父仁矩為德州刺史有敵騎數十入城延廣領數騎馳出牙門射殺其酋領仍斬首數級悉擒其餘黨太祖聞而竒之就賜錦袍金帶仁矩卒擢延廣供奉官河西叛卒劉渥嘯聚寇耀州郡邑皆城守延廣輕兵間道追及於富平而渥等千餘人傳言謂延廣曰公家世富貴奈何與亡卒爭一旦之命也延廣急挺身與鬭斷渥右臂亡走為兵追獲因大破其衆關右平擢刺史知靈州趙保忠方與繼遷通謀上遣李繼隆問罪以延廣護其軍定夏臺就擢知延州先在靈武戎人悅服護軍康贊元害其功誣奏延廣得敵情恐難制遂以慕容德豐至部不治及繼遷寇靈武乃復授延廣團練使知靈州時戎敵塞道延廣獨引數騎之鎮繼遷畏其威望敵皆避之至郡未幾卒年五十垂絶猶曰今日雖得死所獨恨無功報國耳田重進范陽人周顯德中應募為卒𨽻太祖麾下積戰功至刺史太宗即位纍擢除節度使領飛狐路都帥破敵衆獲其驍將大鵬翼并契丹遊渤海三千餘人斬首數千級逐北四十里下飛狐靈丘數城以功改鎮彰化軍京兆尹卒年六十九贈侍中太宗在藩邸愛其忠勇嘗遺以酒炙不受使者曰晉王賜何敢拒曰我知有天子不知晉王何人也太宗益嘉其無私交盧斌開封人始以筆札給事晉邸太宗即位補殿直雍熙三年北伐隨軍至岐溝王師之敗曹彬憂之斌請以千弩斫寨敵遁移軍夾河既克涿州留萬兵令斌守斌以為深在敵境守之無益彬命斌擁城中老幼南徙易州彬振旅為敵所乘諸將皆以失律被譴獨斌嘗建議棄涿州獲免端拱中賊劉渥侯和尚劫興平櫟陽斌為永興華州巡檢薄南山渡渭水擒滅無遺遷供奉官移梓遂十二州都巡檢仍許以便宜從事淳化二年賊任誘寇昌合州三年富順監蠻攻滎州斌皆討平既而草寇結黨鈔略滎戎資州富順監斌又擊滅之是冬李順亂斌以兵六百人趨成都斬賊數萬級明年成都陷斌還梓州賊渠相里貴衆三十萬薄城城中兵止三千斌感勵士伍為固守之計間出與賊擊刺賊稍卻復集機石連弩衝車雲梯環城矢石如雨斌與州將張雄隨機設備圍閉八十日王繼恩援兵始至斌開門迎勞王師賊遂潰散斌因勢追斬及納降二萬餘人又蓬閬間斬獲千計賊平以功除刺史在川峽六年數以孤軍禦強寇功效最著及平梓綿漢州賊黨方代還遷東上閣門使建言閬州北葭萌路可直入利州若焚棧道劍門之路險不足恃也請立寨柵從之卒年五十一斌善料敵不失機會趙延進澶州人父暉官至太子太師五代史有傳延進以父任纍遷至右千牛衛將軍乾德中伐蜀以延進知襄州漢水壞隄嵗損民田為纍石岸其患遂絶嘗與孟哲藥可瓊屯定州遼人擾邊命延進與崔翰李繼隆將兵禦之仍賜陳圖分兵為八隊俾奉以從事至蒲城虜坌集乘髙望之不見其際翰等方按圖布陳相去百步士衆疑懼延進曰主上期克敵耳敵衆若此而我師星布其勢懸絶不如合擊之違令而獲罪不猶愈於辱國乎翰等曰萬一不捷為之奈何曰延進願獨當其責遂改為三陳三戰敵衆大潰以功遷右屯衛大將軍知鎮州民詣闕借留許一年改知揚州徙并代州鈐轄又知相州隆平集卷十七
