body:
  text: 隆平集卷九宋曾鞏撰樞密吳廷祚字慶之太原人在周為樞密使宋興加中書門下三品以父名璋故也建隆初為雄武軍節度使改京兆尹卒贈侍中子元輔元載元扆太祖征李筠嘗詢廷祚以為筠無謀恃勇離巢穴出戰則擒之必矣卒如所料元扆字君華尚太宗蔡國公主纍擢至山南東道節度使兩知河南嘗值河溢城將壞躬涉泥濘督工壅塞民有避水於林杪者既濟以舟楫又以家財賑之時數郡被水患獨元扆所部民無墊溺知定州適契丹入冦王超王繼忠領兵踰唐河戰元扆度其必敗潛發兵護河橋超等果失利敵衆至橋見陳整而遁徙知徐州以疾卒年五十贈中書令廷祚厚重寡言治家有法好儒學聚書數千卷至元扆聚書乃至數萬卷喜讀左氏春秋尤通內典精筆札臨事慎重御下有術在藩鎮能愛民待賓佐必盡禮奉身簡素所得祿賜均及親族國朝以來尚主者獨稱其賢子守禮守嚴守良守讓王仁贍字子豐唐州人顯德中隸太祖帳下即位纍加進擢乾德二年樞密副使是年命與王全斌崔彥進伐蜀蜀平有訟同諸將取民間子女玉帛責右衛大將軍開寶末領三司近十年頗縱吏為姦時副使陳恕輩率任苛察與卜遇互持本司短長仁贍不能勝責唐州防禦使卒李處耘字正元上黨人在周以右職隸太祖帳下建隆元年擢宣徽北院使三年改南院兼樞密副使乾德初周保權乞師討張文表命處耘與慕容延釗赴之太祖面受處耘方略俾圖荆南處耘次江陵百餘里外潛遣數千騎入據其城高繼沖請舉族歸朝荆湖平坐與延釗不協責淄州刺史卒年四十七處耘多機謀嘗權知揚州有善政識度詳敏論事造理頗以功名自任惟受遇思報勇於敢為朝廷以延釗宿將乃獨罪處耘處耘亦不自辨子繼隆繼和繼明繼靖太宗明德皇后即其女也李繼隆字霸圖以父任為供奉官嘗從官還自蜀與馬墜棧道絶澗十餘丈不傷又更戍邵州至長沙遇蠻冦手足中藥箭得良藥無恙從曹彬平江南太祖謂曰升州平可持捷書來時內侍十數皆伺獻捷有機事悉不願行繼隆獨赴闕太祖以城未下頗怒其來繼隆奏曰途遇大風天地冥晦城破之兆也翌日捷書至上語之曰如汝所料矣江南偽將盧絳擁兵數萬繼隆獨諭以威信而降征太原討幽州圍范陽繼隆皆與焉又從崔翰戰徐河從潘美出代北皆有功雍熙初屢破繼遷之衆曹彬北伐繼隆獲敵偽貴臣一人彬欲上其功繼隆力止之師還諸將兵敗獨繼隆振旅成列敵不敢犯即以繼隆知定州有敗軍數萬集城下繼隆給劵俾各持詣所隸太宗嘉其有謀端拱初為鎮州都帥以萬人敗敵八萬逐北數十里初詔止令堅壁清野繼隆曰閫外之事將帥得裁也中黃門杜延夀止之不能故成功太宗召還面加奬激常受詔由旱海護靈州軍糧繼隆固執由古原州蔚茹河路為便太宗從之乃帥師以進壁古原州是為鎮戎軍纍擢至節度使真宗即位加同平章事景德初北敵入冦上親出征命繼隆為駕前東西排陳使先至澶州十一月二十四日敵數十萬逼州北城繼隆與石保吉大破之強弩斃敵將順國王撻覽追奔數十里二十六日駕至澶州幸北門觀兵召見問勞久之其部伍嚴整二年春加賞進其階邑命下而卒年五十六贈中書令繼隆雖貴胄而能以智謀自將好學喜接儒士子昭慶避章獻太后祖諱故改名昭亮補供奉官父繼隆北征昭亮尚幼遣持詔軍中問方略及營陳衆寡之勢還奏稱旨纍擢至西上閣門使仁宗即位遷東上自是屢領邊任管軍慶厯八年除宣徽北院使加南院知定州以疾願還為景陵宫使改昭德軍節度使卒年七十一贈中書令諡良僖昭亮為人和易喜交權要而軍政頗嚴為殿帥有卒博於都市而撤屋椽相擊者捕斬之其軍校連州刺史宋緒廷謝亦杖之庭下上祀南郊而騎卒失所挾弓明日當加恩澤昭亮謂宿衛不謹不可赦原卒配隸下軍子惟賢惟寶惟實惟賁惟贄惟賡惟賀惟貫惟賞石熙載字凝績洛陽人周顯德中登進士第太宗初領泰寧軍節度使辟掌書記尹開封辟推官即位纍加進擢太平興國四年正月簽書樞密院事三月改副使六月樞密使八年以疾求解機務除左僕射卒年五十五贈侍中熙載有文行立朝無顧避喜稱薦善人有長者之譽子中立字表臣年三歲喪父朝廷録遺以為供奉官十八獻文改光祿寺丞賜五品服家富於財悉推與諸父久之除直集賢院與楊億劉筠陳越李宗諤相厚善凡校祕書更中立手者皆為善本纍擢知制誥翰林學士加承旨兼龍圖學士景祐四年參知政事明年罷為户部侍郎資政殿學士慶歷四年自吏部侍郎除太子少傅致仕遷少師卒年七十八贈太子太傅諡文定子居簡從簡初中立家産歲入百萬死之日不能給喪具天子聞而哀之贈白金三百兩中立疏曠少威儀善諧謔頗諳臺閣故事不汲汲近名請老於家客至門者必延飲非醉不得去楚昭輔字拱辰睢陽人初太祖建節嘗召置左右建隆初擢軍器庫使開寶六年樞密副使九年樞密使太平興國六年以疾罷為右衛上將軍卒年六十九李崇矩字守則上黨人在周為作坊使太祖掌禁旅數相過從建隆初纍加奬擢以澤潞功授大將軍三年除宣徽北院使判三司乾德二年樞密使趙普作相與崇矩分秉國政以女妻普之子厚相交結太祖不恱因門下客以隂事告開寶五年罷除節度使改大將軍太宗即位授嶺南都巡檢就改瓊崖儋萬四州都巡檢代還除千牛衛上將軍卒贈太尉諡元靖崇矩寡言尚信義嘗為晉史洪肇親吏洪肇被禍崇矩方事世宗既貴遇洪肇之孫必優而加禮之子繼昌仕至連州刺史國史有傳繼昌之子曰朂尚太宗第八女萬夀公主舊制尚主者升居諸父之列真宗特於其名上益以遵字升為崇矩之子焉遵朂字公武初授左龍武軍將軍駙馬都尉賜第永寧里所居堂甎花有翔鳳命工琢去主服有虬龍文屏藏之真宗喜顧待加異嘗稱其好學纍官至鎮國軍節度使知許州卒年五十一贈中書令諡文和遵朂喜讀書兼達釋氏性理之説居第園池聚竒花果美石多致自數千里者其費不資有會賢間燕二堂東北隅有莊曰靜淵引流水周舍下嘗師事楊億億卒制服為營其家事在許州奏乞至具茨山奠億之墓著間燕集二十卷外館藝題七卷子端懿端願端憲端慤李端懿字元伯萬夀公主子也七歲授如京使積官至鎮潼軍節度觀察留後十年不遷仁宗特授以節制御史中丞韓絳以謂非功不當除端懿亦辭不拜知澶州卒年四十八贈節度使其弟援例册贈侍中端懿和厚多讀書喜賓客所與遊從皆時之賢士大夫子詢諲􅀈欣弭德超嘗給事晉邸太平興國中纍擢至酒坊使嘗誣曹彬彬不辨八年擢宣徽北使兼樞密副使怒王闕顯等居其上詬之且曰我有安社稷功汝等何人反在我上上無執守為汝輩眩惑顯等以聞命鞠得實削奪官爵同家屬配隸瓊州楊守一字象先其先洛陽人唐末徙家宋鄭間初為晉邸涓人即位纍擢至翰林副使初名守素上為更其名與趙鎔柴禹錫相里勳同告秦王廷美隂謀端拱元年除宣徽北院使簽書樞密院事卒年六十四贈太尉張遜遼城人駙馬都尉魏咸信同母兄也事晉邸即位補殿直屢加進擢端拱二年除宣徽北院使簽書樞密院事淳化二年改副使又加知院事四年坐與冦準不協罷責諸衛將軍卒年五十六贈桂州觀察使曹彬字國華真定人也父藝為成德軍兵馬使周祖貴妃張氏彬之從母也仕周至引進使建隆初遷客省使乾德二年伐蜀以內客省使監歸州路行營劉光乂軍兩川平除節度使開寶元年為宣徽南院使八年平江南九年樞密使太宗即位加同平章事太平興國八年為弭德超所誣罷為天平軍節度使雍熙三年詔彬與崔彥進傅潛潘美等北伐雖尅新城破闕涿州而繼有岐溝之敗降右驍衛上將軍真宗即位復樞密使加檢校太師平章事咸平二年薨於位年六十九贈中書令追封濟陽郡王彬敬慎和厚在朝廷未嘗忤旨亦未嘗言人過失平蜀還大祖詢官吏善否對曰軍政之外非臣所聞時諸將皆欲屠城殺降彬獨任恕而戢下所至恱服太祖降璽書褒之時諸將多有子女金帛彬橐中惟圖書衣衾而已故主帥俱貶而彬獨進擢及征江南亦緩攻取數遣開諭亦冀其降雖已城陷猶納歸欵偽朝君臣賴以獲免自出師至凱旋士衆畏服無輕肆者其軍政如此雖弭德超之譖暫解機務而太宗察其忠謹待遇彌厚北征諸將以潘美獨拔三州遂違節制而失利於岐溝此愛克厥威之過也時趙昌言在魏奏乞誅彬及昌言自延安還被劾不得入見彬居樞府為請於上彬之仁厚皆此類也周朝嘗使吳越訖事即行不受私覿吳越屢追遺之彬曰吾終拒之是近名也遂受而歸盡輸內帑世宗強還之欲辭不獲命悉以分親舊而一介不取居官俸入給宗族無餘積遇人雖甚微賤莫不以禮待遇朝士大夫必引車避之真宗聞其疾親視臨問手為和藥及以訃聞惻然震悼對輔臣語及彬必流涕以遺恩官其親族門下吏十餘人子璨瑋孫儀曹璨字韜光彬之長子以蔭補供奉官纍擢至忠武軍節度使殿前都指揮使在禁衛十餘年以疾除河陽節度使加平章事制入而卒年七十贈中書令璨質厚寡言父為上將璨常從行彬以為類已特鍾愛之征討得與計議太祖知之特授宫苑副使太宗朝為鎮定鈐轄屢戰有功諸將多欲追奔璨曰戎人多變力止之璨習韜略好讀左氏春秋善撫士卒兼著威愛居家以孝謹稱雖輕財不逮其父而和厚亦有父風曹瑋字寶臣少為父彬衙內都虞候授供奉官閣門祇候李繼遷擾邊諸將數出皆無功太宗問大臣誰可任者彬在樞密言瑋可使召見欲除諸司使知渭州彬固辭止以本官同知渭州時方十九歲咸平二年彬薨請服喪不許天禧四年除宣徽北院使鎮國軍節度留後簽書樞密院事丁謂惡其不附已指為冦準黨出之改南院使環慶路都總管兼安撫使乾興元年降左衛大將軍觀察使久之復舊官天聖七年除彰武軍節度使真定府路總管卒年五十八贈侍中諡武穆瑋好讀書通春秋尤善左氏傳為將四十年戰未嘗敗衄威震西鄙初自渭州移鎮戎軍言鎮戎地平便於騎戰非中國之利請自隴山而東循古長城鑿塹以為限又請以兵械及間田蠲租以給弓箭手再知渭州破章􅀈族於武延鹹泊川滅撥臧於平涼隴山諸族皆獻地瑋為築堡山外號籠竿城募弓箭手守之知秦州兼涇原儀衛鎮戎安撫使宗哥立遵與唃厮羅謀內冦乃上書求號贊普瑋言不可聽若復有求益難制也朝廷猶授立遵節度使既而立遵令其舅賞樣丹説蕃部郭厮敦為嚮導瑋遂以計使厮敦圖樣丹後旬日果攜其首至瑋表厮敦為順州刺史先是張佐知秦州蕃部驚擾至是凡前拒王師者皆伏匿瑋令納馬贖罪而還故地至者數十人厮敦因獻南市即秦渭之咽喉也自百關至威遠共置寨十數亭障橋梁相望浚壕塹四百既而唃厮羅以衆十萬入冦瑋逆於三都谷擊敗之斬獲萬級踰年又破宗哥將馬波咜吒於野吳谷誅叛者鬼留族夷之於是河洮蘭三州安江妙敦邈川黨通等羌皆破散宗哥所立文法納質內屬唃厮羅逃入磧中塞垣遂安凡羌酋欲有所為必先令其下謂之立文法焉秦人請立碑紀瑋功有詔褒之天禧三年德明冦慶州柔遠寨都巡檢楊承吉戰不利復命瑋為安撫使委乞骨咩大門等族聞其至歸附者千餘落初繼遷死璋言繼遷擅中國要害地終身抗拒今國危子弱不即捕滅後強盛恐難復制朝廷欲以恩致德明書寢不報自三都谷捷唃厮羅聞瑋名即以手加額而東嚮之鎮天雄契丹使過必戒其下無敢疾驅者在渭州或戍卒叛入夏州有告者瑋必曰吾使之去勿問也繼遷聞即斬首投境上環慶邊人多市屬羌之田致單弱不自給即沒敵中瑋令盡還之有犯即徙其家於內地舊羌殺邊民以羊贖其死瑋下令曰羌自相犯從其俗即犯邊民論如律遂無犯者始置弓箭手斥塞上棄地使相角力勝者給田二頃再經秋成課市一馬馬必勝甲然後官為印之益賦田五十畝至三百家以上團為一指揮築堡於要害處使環之以塹又立馬社一馬斃衆為市馬塞下諸塹皆以一丈五尺為深廣之阻山險不可浚者止治使峭絶而已其制屬羌百帳以上置軍主指揮使不及百帳止置指揮使其蕃落將校止於本軍序進之不從他軍以其熟虜情知出入路故也瑋所措置至今不能改子僖倚僅倩慈聖光獻皇后璨之女也璨之子曰儀曹儀字搢臣以祖蔭補右班殿直纍擢至耀州觀察使卒年五十五贈節度使子詒謁談初儀知邠州有告弓箭手都校李文扆將叛者朝廷命儀察之文扆習知蕃漢事邊人多畏服其後帥府以為腹心季父瑋在邠亦所委用儀明其不反益信任之邊人莫不感悅儀嘗以上軍都虞候為涇原副總管景祐元年皇后受册乃請解軍職而易亷車之任楊礪京兆人曽祖守為唐使相乃宦者復恭之養子礪建隆間登進士第真宗在藩邸嘗為記室即位擢給事中翰林學士咸平元年樞密副使二年薨於位年六十九贈兵部尚書礪周顯德中初應舉嘗夜夢見一人衣冠甚古自稱徴君謂礪曰汝能從吾遊乎礪隨往頃之覩宫衛嚴邃俄升大殿見一南面而坐者徴君指之曰此來和天尊汝異日事之礪再拜而退及為記室謁襄邸還謂其子曰今日見襄王正昔所見來和天尊也礪為文無師法詔誥迂怪見者咍之宋湜字持正京兆人父溫故終於補闕季父溫舒終於起居郎皆有時名湜少孤以孝聞太平興國二年登進士第纍擢知制誥翰林學士咸平元年樞密副使從幸澶淵以疾薨於道年五十一贈吏部侍郎湜秀穎有器識好學善談論尤工筆札得者珍藏之善引重後進有文集二十卷錢若水字淡成又字長卿河南人十歲能屬文華山陳摶一見以為有仙風道骨雍熙中登進士第至道初同知樞密院真宗即位屢求解機務不允以親年高為請益堅乃罷為集賢院學士改鄧州觀察使判并州以疾召還卒年四十四贈户部尚書若水風流儒雅有文學善議論事母以孝聞所至有譽望接物必以誠評人貴賤夀天多驗自知不夀故懇辭勢位賢士大夫皆宗慕之有文集二十卷自翰林草詔賜趙保忠云不斬繼遷開狡兔之三穴潛歸光嗣持首鼠之兩端太宗深嘉之知天雄軍詔遣決議城綏州率衆過河分布隊伍動有師律宿將見者莫不歎服還言城之無益詔已之修太宗實録初至道三年春太宗晏駕有馴犬號呼不食詔遣送陵寢參知政事李至欲若水書其事遺之詩曰白麟朱鴈且勿書勸君書此懲浮俗若水不從至因若水奏成書不列監修官吕端名以為若水掠美若水援唐故事有實録不書監修官名者衆不能折嘗從幸大名詔御史中丞令訪近臣邊事若水言臣聞用兵以伐謀為上御將以用法為先比者傅潛為帥擁衆十萬閉關縱冦坐看醜敵殘虐生民不正典刑曷懲其後楊延朗楊嗣勇於赴敵奮不顧身授任尚輕見功未賞臣願陛下誅傅潛以徇衆擢朗嗣以勸能使諸將承風各思用命聲馳塞外威懾羣敵昔偽晉劉崇結契丹入冦懦將樊愛能何徽臨敵不戰周世宗陳宴而戮之因使偏將十數分擊太原崇不敢支戎亦遁去其後收淮甸下秦鳳平關南如席卷之易此用兵伐謀之效也欲消外侮必本安邊用得其人莫如太祖畀董遵誨以通遠軍郭進之在關南何繼筠之處鎮定隰州則李謙浦易州則賀惟忠王彥升之治原姚內斌之守慶名不過沿邊巡檢責其效皆十餘年濶略其細故則無畏避之心就録其功賞則絶幸遷之意官卑故易以使久任故知敵情間授睿謀戒其生事是以西敵北敵十七年間遣使稱藩不為外患已試之效今皆可行久之北敵未賓復內出手詔詢若水備禦翦滅之術若水言臣讀前史論丐奴者多矣若漢婁敬樊噲季布賈誼鼂錯主父偃徐樂王恢韓安國朱買臣董仲舒之所陳特和親征伐之二議唐李靖魏徴溫彥博郭正一狄仁傑之所及亦不過戰守之兩端晉桑維翰不背約之言出於微弱故相趙普請回軍之奏姑冀息民悉非遠謀臣所不取嚴尤謂自古禦戎無上䇿臣竊笑之守在四夷制勝以靜非上策而何臣聞唐魏博一鎮爾戎兵固不衆於今日而敵騎未嘗南牧者以幽薊為北門扼其險阻故也石晉割地之後由定武達滄海千里受敵雖設二關鎮之以重兵莫可以禦故晉末渡長河漢初復擾邊徼以周世宗之英武曾未能絶其冦中山窺上黨今御札詢備禦翦滅之術臣以為未得幽州未可翦滅也後唐莊宗在河北命周德威取幽州然後南向而爭天下蓋先為萬全之計使不能勝此善用兵者也夫戰守不同心將不能料敵重兵在外輕兵在內則今之所患也臣願陛下選智謀可以任邊郡者聽召壯士以為部曲而官為廩給之又募民為招收軍厚其糧賜蠲其租稅彼供輸兩地各有親屬則敵之動息得以知之如是同心將能料敵而在外者皆輕兵矣然無以統衆則不能用衆無以制勝則不能勝敵故必擇大臣領近鎮提重兵以專閫外之事有警則督戰已事則班師既無舉兵之名又得馭兵之要三軍同力上下一心備禦之方舉積此矣若乃患民力之困則廣邊地之營田防戍卒之驕則嚴將帥之法令古語有之曰法不可疑令不可違又曰賞不勸謂之止善罰不懲謂之縱惡昔太祖用郭進守西山遣戍卒必戒之曰汝謹奉法我猶赦汝郭進殺汝矣其假借如此故郭進所至兵未嘗小衄臣願陛下推太祖所以待郭進之心而待諸將則法令不患不嚴勸懲不患不至上善其議張宏字巨卿金州人太平興國二年登進士第歷官以勤幹聞雍熙三年除樞密副使四年與御史中丞趙昌言對易其任端拱初復樞密副使久之罷真宗即位授工部尚書卒贈右僕射子可久可道可度宏淳謹少亷譽夏侯嶠字峻極濟州人太平興國初登進士第真宗在藩邸為翊善尹開封為推官東宫建為太子中舍即位除給事中居數月擢樞密副使咸平元年罷為户部侍郎翰林侍讀學士兼祕書監卒年七十四贈兵部尚書嶠慕道以養生為務喜誦莊老書淳謹無過有文集十五卷柴禹錫字玄圭大名人少有相者謂曰子甚貴若輔以經術必至將相由是頗讀書傳太宗尹京因委質焉即位纍擢如京使掌翰林同告秦王廷美隂謀擢宣徽北院使兼樞密副使雍熙初罷淳化四年復舊任兼知樞密院事除節度使卒年六十二贈太子太傅隆平集卷九
