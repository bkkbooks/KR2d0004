body:
  text: 隆平集卷八宋曽鞏撰叅知政事范仲淹字希文唐相復冰之後其先邠州人後徙居蘓州祖贊仕錢氏為秘書監仲淹二嵗喪父而母改適長山朱氏故從繼父姓大中祥符八年登進士第曰朱說後喪母服除始復其姓而改今名初以憂去官晏殊知應天府表章府學上書執政萬餘言皆時之先務及終喪殊又薦之除秘閣校理明道初召為右司諌累擢天章閣待制落職知饒州元昊叛復待制知永興軍夏竦為陕西招討使進仲淹龍圗閣直學士以副之改知延州降官知耀州職如故徙慶州復舊官為環慶路經畧安撫沿邊招討使時始分陜西為四路也慶歴二年除豳州觀察使辭不拜遷樞宻直學士為陜西路招討使三年樞宻副使是秋改叅知政事四年出為陜西河東宣撫使五年罷為資政殿學士知邠州以疾請知鄧州加給事中知杭州遷禮部侍郎祀明堂恩進户部徙青州疾甚請潁州未至卒年六十四贈兵部尚書諡文正子純佑純仁純禮純粹御篆其神道碑額曰褒賢所著丹陽集二十卷奏議十七卷仲淹事母至孝以母在時家甚貧及既貴非賔客不食肉妻孥膳服僅足而已姑蘇之范皆疎屬而置義莊以賙給之天下想聞其風采賢士大夫以不獲登其門為耻下至里巷逺及夷狄皆知其名字衆莫知其所以然也初章獻太后欲以冬至御㑹慶殿太常具儀請天子率百官獻夀仲淹在祕閣上疏言王者奉親於内則有家人禮若稱觴殿下是以天子北面行人臣事抑尊損威不可為後世法不報又請太后復辟遂出通判河中府又章獻太后遺詔以太妃楊氏為皇太后叅決軍國事仲淹上疏言太后母之名號也未聞因保育而代立者今一太后崩又立一太后天下疑陛下不可一日無母后之助也太妃雖受太后冊遂不復同聽政郭皇后廢上書諫不報與御史中丞孔道輔合諫官御史伏闕諫遣中貴人諭令詣中書宰相曰漢唐廢后久矣仲淹曰何為援前世衰政以累聖朝明日將畱百官班揖宰相廷争至待漏院有詔出知睦州即日就道明道末言事者多摘太后時事以暴於朝仲淹諫曰太后受遺詔保佑聖躬者十年宜掩其小故以全大徳上感悟始抑言者嵗饑出使江淮體量安撫所至除淫祀賑乏絶民有食烏昧草者擷草以進示六宫貴戚戒其侈心因陳八事以諫其一曰祖宗時江淮饋運至少而養六軍取天下今東南嵗漕米六百餘萬石府庫財帛又皆出於民而饑年艱食如此願下裁造務後苑作文思院糧料院取祖宗嵗用之數則奢儉可見矣其二曰國家太平垂三十年暴斂未除濫賞未革近年赦宥既頻賞給復厚聚於艱難散於容易國無逺備非社稷之福也願無數赦推賞且祖宗欲復幽薊故謹内藏庶行師之時不擾於下其三曰江淮諸路嵗已餽糧於租稅之外復又入糴兩浙七十萬以諸路計之不下二三百萬雖豐年穀價亦髙官以傷財民且乏食今宜銷冗兵削冗吏禁游惰省工作既損京師用度然後減江淮饋運以租稅上供外可罷髙價入糴則嵗省數百萬緡錢或上京師實府庫或以給還商旅商人既通則㩁貨務入便漸廣而入中之法可以兼行矣其四曰國家重兵悉在京師仰給度支則所養之兵不得不精也一卒之費嵗不下百千卒萬人則百萬緡矣至七十嵗放停是未停之前大蠧國用及其羸老歸復何託咸平中揀鄉兵人無歸望號怨之聲動於四野大中祥符間選退冗兵無歸之人大至失所此近事之鑒也請下殿前馬軍司禁軍選不堪披帶者别立本鄉州軍就糧指揮至彼有田園骨肉者許之歸則不至失所矣其五曰緣邉市馬嵗費不貲罷之則絶戎人行之則困中國自古騎兵未必為利開元天寳間牧馬數十萬匹祿山為亂王師敗績於函谷曽何救焉然西北戎馬不可牧既至京師宜多鬻於民間或有邉用一呼可集重稅以禁江淮小馬使不至近里州軍則西北之馬可行外慰戎心内減芻秣以億萬計其六曰發運司嵗漕六百餘綱省員殿侍以嵗勞改班行若綱運可減則嵗改職者止賞以緡錢諸州都知兵馬使滿嵗如實㢘幹湏知州通判同罪保舉方與班行武臣薦子弟竝令引見試騐若無所取及年幼者止與奉職至殿侍而已其七曰百司流外日以増冗請罷招置三五年可去其半舊二百人者以百人為額餘並移補諸司其八曰真州建長蘆寺役兵糧已四萬斛棟宇塑像金碧之資又三十萬緡施之於民可以寛重斂施之於士可以增厚祿施之於兵可以拓舊疆矣上嘉納之及在從班言事益無避因言古之治亂繇用人得失此宰相之職也獻百官圖指其遷轉次序遲速曰如此可以為法陛下不可不察又獻四論一曰帝王好尚二曰選賢任能三曰近名四曰推變其大指言治亂繫所任區别而進退左右人主之權也不可以委臣下上因面質於宰相吕夷簡夷簡以為仲淹離間君臣至交論上前出知饒州殿中侍御史韓瀆希㫖請榜仲淹朋黨於朝祕書丞余靖上疏言仲淹嘗言陛下母子夫婦之間尚加優容今以一言觸大臣遽至黜逐非朝廷福太子中允館閣校勘尹洙自幼與仲淹善兼師友且嘗被論薦請從降黜館閣校勘歐陽修移書左司諫髙若訥責其依違若訥繳奏之靖等悉貶其後延州諸寨失守東西四百里無藩籬人心危恐知州張友辭不知兵且老乃以仲淹代之析州兵馬為六將將三千人隨部分教之使更禦賊朝廷推其法諸路又築青澗城以阨宼衝復屬羌數千落墾田二千頃許互市通有無又建康定軍積蒲充民租春則徙兵就糧減饋運之費三之一時議諸路討賊獨仲淹固守鄜延不從及元昊偽請和仲淹答書令去僭號元昊復有書不遜仲淹焚其書不以聞執政以為不當輒通書而又擅焚之叅知政事宋庠請論以軍法上不從降員外郎知耀州職如故未逾月徙慶州而復其官州之西北有寨據後橋川南通鳳州華州池北扼白豹金湯種落彊悍而善耕久不能城仲淹一日擁兵城之賊騎三萬薄關城下佯北仲淹戒諸將持重勿過河既而果設伏河外城成詔賜名曰大順城環州屬羌明珠滅臧二族各萬餘人皆附賊仲淹又請復細腰城胡蘆泉諸寨招致二族以扼賊又復近羌千三百餘帳葛懐敏之敗關中民皆竄匿山谷乃率部下兵赴援而募兵關下人心始安仁宗初按圖示左右曰若得仲淹出援涇原可勿憂矣或以為恐道逺不能至後數日上出其章謂宰相曰仲淹果出援如所料在政府欲倣周官以六卿事分委輔臣而自領兵刑之任上方銳意政事數於天章閣詢執政世務仲淹言天下之治莫若守宰得人欲得人先擇轉運按察使又云取士不可以不根行實而先詞華圭田不均則不足以養㢘吏農桑不課則民失業詔令屢更則下不信又請復府兵以宿衛京師併縣邑以寛徭役又欲減五品以上任子例明年與韓琦列上禦邉四策既欲改制故忌之者衆而僥倖者不便因出宣撫遂罷政事焉王倫之叛州縣官吏有不能守者朝廷議欲盡誅之仲淹曰平時諱言武備盜賊之至責守臣死事不可故守令皆得不誅仲淹所至恩威竝行鄧慶之民幷西陲屬羌皆繪像生祠之其卒也上尤嗟嘆焉丁度字公雅開封人力學有守大中祥符四年登服勤詞學科累擢知制誥翰林學士兼侍讀加承㫖在翰林凡七年仁宗問用人以才與資孰先對曰承平時宜用才諫官孫甫乃言度請間自求柄用上諭輔臣曰度侍從十五年數論天下事未嘗及其私甫何從得此遂除工部侍郎樞宻副使時慶歴五年明年改叅知政事八年罷為紫宸殿學士翰林侍讀學士進觀文殿學士積官至尚書右丞卒年六十四贈吏部尚書諡文簡子諷諫舊制監司及藩鎮辭見皆賜對仁宗初即位止令附奏度言附奏非所以防壅蔽也又作王鳳論諷章獻太后以檢外戚天聖間太史上言永昌陵有白氣當徙陵以厭之度奏神道貴靜陵寢大事不可用術者言輕議改易事乃止康定初劉平石元孫戰陷上問禦邉計度奏中國宜以智勝難以力克今莫若謹亭障逺斥堠控扼要害條上十䇿名曰備邊要覽方西事未寧知樞宻院宋綬私忌不給假度請無以邉事責成大臣給休假如故無使外夷窺朝廷深淺上從之度為羣牧使上言天聖中牧馬至十餘萬其後言者以天下無事遂廢八監陜西河東嵗市二萬二百纔能補京畿塞下之闕自用兵數年所市馬比常嵗特三之一請下令河東京東京西淮南籍丁壯為兵處有能畜一戰馬者與免二丁仍不升户等以備緩急如此則國馬蕃矣度在經筵上每呼學士而不名嘗問蓍龜占應事對曰不若以古之治亂為蓍龜也上出欹器以示之曰朕欲臨天下以中正對曰臣等亦願以中正事陛下因奏太宗時嘗作此器真宗為之贊上遂製欹器論賜之度性純淡不事威儀左右無姬侍喜論時事在政府召諸子謂曰王旦為宰相十二年卒之日其子猶有為布衣者自今吾不復有請矣爾曹宜自勉嘗作慎言賦書紳銘以戒諸子又著邇英聖覽十卷龜鑑精義十二卷慶厯兵録五卷贍邊録一卷編年總録八卷管子略要五篇吳育字春卿建州人天聖五年登進士甲科又舉賢良方正入等屢厯外官始擢知制誥翰林學士慶厯五年除樞宻副使是年叅知政事六年復樞宻副使七年罷知許州徙蔡州加資政殿學士知河南府徙陜州永興軍丁父憂服除召兼翰林侍讀學士以疾辭改知汝州又辭以集賢院學士判西京留司御史臺皇祐五年加資政殿大學士判西京提舉醴泉觀判都省除宣徽南院使判延州疾復作請便郡知河中府徙河南府卒於資政殿大學士尚書右丞年五十五贈吏部尚書諡正肅子安度安矩安素安正安本安序安厚安憲安莭有文集五十卷育常知汝州襄城縣宗室多𦵏襄城以中貴人典䕶民患其擾育請所湏當從官給非特省費民甚便之知太常禮院言禮文殘缺願詔諸儒裁定乃詔修禮書故事尚書省集議在朝則先職入省則先官官卑而職髙者嘗托事不至景佑中遂罷兩制清望有議而不集非所以慎重求至當之意乃請使異席不相壓則適中矣衆議是之元昊僭稱帝還所授旌節議者皆謂發兵坑小醜爾育獨曰元昊名為臣其寸土尺賦不入縣官窮漠之外隂僭輿服久矣儻稍易其名猶足順撫而収之奏不報而後卒用其議章懿太后升祔真宗廟言者請覃恩給賞育力諫止既而上語輔臣曰外甚怒執政宜慎之育對曰臣既以身許國何避耶山東盜起上遣中使察視還言盜不足慮也兗州杜衍鄆州富弼山東人甚尊愛之臣以為憂上欲徙二人育在政府曰盜誠無足慮者小人乗間以傾大臣非國家之福議遂寢育知蔡州以伍保法檢制盜賊京師喧傳妖人數十在蔡州詔遣中使以名捕者十人使至請以廵檢兵趣搜山索之育曰必欲得妖人還報耶請留此勿往使者以為然頃之召十人者皆至械送闕下皆以無罪釋告者遂抵法畱司御史臺舊不領民事育在西京河陽人民以張堯佐裁決稽積多詣育育判於紙尾堯佐畏恐即奉行焉夏人既納欵而竝邊種落數侵為患龎籍守并州欲築堡備之育判延安因謂要契未明亟城則争而受患者麟府也乃移文河東又與籍書及疏於朝不報未㡬河外殺驍將郭恩而太原將佐皆以罪去育立朝敢言始自樞宻副使改叅知政事數與宰相賈昌朝議事上前爭辨不已遂復還樞府明年大旱御史中丞髙若訥以大臣廷爭為不肅故雨不時若因而罷之育初加大資政召還上數欲復大用而諫官劉元瑜譖之故有延安之命晩年喜作詩在西臺與舊相宋庠追裴白故事酬唱至數百篇育性識明達所至條教簡而易行辨論古今明白利害使聽之者曉然不疑程琳字天球永寧軍人也大中祥符四年舉服勤詞學科中選授泰寧軍節度推官天禧中召試除直集賢院累擢知制誥權御史中丞樞宻直學士龍閣閣學士正除御史中丞不拜以翰林侍讀學士知開封府改三司使景祐四年叅知政事寳元二年鄭戩知開封府𤼵琳使府吏馮士元抑孀婦市第及買女口責光祿卿知潁州久之復户部侍郎知青州又復吏部知天雄軍又復尚書左丞為資政殿學士及建天雄軍為北京内侍皇甫繼明典營造宫室欲侈大而琳以為方事備邉又困民以土木不可數有論奏上遣御史魚周詢按視遂罷繼明獨命琳遷工部尚書加大學士河北路安撫使慶厯六年建節知永興軍陜西安撫使皇祐元年拜使相判大名府以武昌節制換武勝又換鎮安之本鎮卒年六十九贈中書令諡文簡子嗣隆嗣弼嗣先天聖五年琳館伴契丹使蕭藴杜防藴出坐圖謂琳曰中國使至契丹坐位髙契丹使至中國坐位下請升之琳曰此真宗皇帝所定不可更也防又曰大國之卿可乎琳曰南北兩朝安有大小防不能對上令與宰相議或曰此特細事爾將許之琳曰更欲大者奈何遂止琳知益州上元張燈先戒火備曰有火即救之勿以白果有火終燕人無知者有告振武軍變者監軍以白琳曰軍中動息我自知之茍有謀不待告者来卒不至蜀人歲為社㑹以祀灌口琳曰往時不誅李順故大亂乃捕為首者戮之餘百數配内地或以寃聞上遣使視蜀無事得解在三司或請募商人輸粟京師罷江淮漕運琳曰猾商要價而粟不至奈何又有請并稅名目琳曰使牛皮食鹽之類合為一穀粟黍豆合為一易於句挍可也後世有興利之臣復以舊名増之是重困民無已時也在政府有議重賄唃厮囉使討賊因以其地與之琳曰使唃氏得地是又有一元昊也不若用間使二羌勢離則中國之利矣知永興元昊死諒祚立尚幼以三大將分治其國或謂因各授三將節度使以分弱其勢琳曰幸人之喪非所以示夷狄不如因而撫之議者以為失機㑹初元昊雖叛猶遣使入朝朝議欲誅其使琳曰古者交兵使在其間宜善遣之以示大體其後使者益驕大臣皆咎琳琳曰始不誅以罪有在也今既驕暴其罪誅之以明國法又何患耶琳持重不撓守魏凡十年魏人愛之為立生祠章獻太后時嘗上武后臨朝圖其為人嚴深長於政事平時議論不少下人至朋僚故舊飲酒笑歌不復有勢位之間世或以嗇於財而厚自奉為誚明鎬字化基宻州人大中祥符五年登進士第屢從薛奎辟奎大用盛稱鎬有廊廟才累擢至天章閣待制龍圖閣直學士樞宻直學士自成徳軍入知開封府㑹盜據甘陵為體量安撫使及文彦博宣撫河北以鎬副之賊平進端明殿學士給事中彦博數推功於鎬擢三司使慶歴八年參知政事未㡬發疽薨於位年六十贈禮部尚書諡文烈仁宗初聞其疾亟謂輔臣曰鎬忠亮有勞欲及其未亂一召見之既至惻然謂曰方頼卿謀國事遽有此疾鎬已氣索猶能頓首稱謝翌日遂逝鎬端重寡言所至安静有體臨事不茍為陜西轉運使閲同州廂軍得材武者三百人教以彊弩奏為清邉軍最驍悍其後陜西河東悉置此軍王堯臣字伯庸應天府人天聖五年登進士第累擢知制誥翰林學士權三司使兼端明殿大學士加承㫖羣牧使皇祐三年樞宻副使嘉祐元年叅知政事上欲除樞宻使為掌制學士胡宿所抑止進吏部侍郎薨於位年五十六贈左僕射諡文安子同老明老堯臣為右司諫郭皇后廢且死中外以為宦官閻文應進毒堯臣請先治其左右侍醫者不報后在殯上元節有司俟乗輿觀燒燈堯臣言后已復位號則不當逰幸上為輟張燈一夕在三司時入内都知張永和建議欲収民錢十三萬以助軍費堯臣言於上曰此唐徳宗所以致朱泚之亂也䕫州路轉運使請增鹽井嵗課十餘萬緡事下三司堯臣以為上恩未嘗及逺人而反浚取厚利適以歛怨也皆罷之康定初為陜西體量安撫使上言故事使者所至輒稱詔存問官吏將校而不及民自元昊反三年於今關中之民不勝彫弊宜有以勞徕之上從其請降敇俟賊平蠲其租賦二年又言陜西二十萬兵分屯四路不足以自守涇原最為要害處請萬人以屯渭州以制山外如此賊不敢輕出犯塞也好水川失利韓𤦺降知秦州范仲淹以擅答元昊書降知耀州堯臣言二人皆忠義可任不當置之散地又薦种世衡狄青有將帥才明年葛懐敏敗邠涇以東皆閉壘自守仲淹自將慶州兵捍賊始引去上思其言乃復命安撫陜西而以琦仲淹為招討置府涇州益屯兵三萬人堯臣行邊至得勝寨適弓箭手閉城亂堯臣作書諭以禍福射入城中悉出降又請罷涇原五州營田益募弓箭手於徳順軍又請廢潼闗在樞府二年務裁抑僥倖至有鏤匿名書傳之京城者上信之益不疑乃擢叅知政事堯臣典内外制十餘年文詞温潤得王言體有文集五十卷垂絶遺奏勸上蚤擇宗室之賢者為皇嗣云程戡字勝之許州人天禧三年登進士甲科累擢天章閣待制樞宻直學士進端明殿學士知成都府召見許以還為執政明年遂召為叅知政事時至和元年也嘉祐元年以文彦博親嫌改樞宻副使五年罷為宣徽北院使判延州英宗即位加節度使再任以年過七十告老十數奏不許復以疾吿許還至同州卒年七十七諡康穆戡嘗知瀛州契丹使過稱疾求小幘相見戡曰疾可無相見相見則宜如禮在延州横山酋豪請以兵乗塞而自以其屬取靈夏歸中國戡奏言諒祚數悖慢而多殺戮人人離心今其酋豪如此可許之時英宗不豫大臣重生事不從戡久分帥閫號習邉事世多誚其折節交宦者孫抃字夢得眉州人六世祖長孺喜藏書為樓而置其上蜀人號為書樓孫家天聖六年登進士甲科累擢知制誥翰林學士皇祐中權御史中丞制下諫官奏抃非紏繩才抃手疏言方今士人趨進者多㢘退者少以善求事為精神以能訐人為風采㨗給若嗇夫謂之有議論刻深若酷吏謂之有政事諫官所謂才者無乃在是乎若然臣誠不能也仁宗察其言趣視事其後仁宗欲用耆舊故擢抃叅知政事樞宻副使抃年雖未髙而浸益昬忘語言舉止人以為笑御史韓縝彈奏遂罷政事以太子少傅致事卒年六十九諡文懿抃為中執法數言事内臣王守忠特恩遙領節度抃奏罷之張貴妃薨追册為后且有建陵立廟之議抃固爭不從因伏不起上改容遣之陳執中箠婢出外舍死或曰嬖張殺之事聞命近侍制獄取證左執中弗遣有詔勿推抃奏疏十上竟縁是罷相抃前後多稱薦士大夫居侍從雖久而恬於進取人以為長者隆平集卷八
